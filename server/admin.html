<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿瓦隆 · 管理后台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0c14; color: #f2e5c8; font-family: 'SF Pro Display', -apple-system, sans-serif; font-size: 14px; min-height: 100vh; }

/* ── Login ── */
#login { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
#login h1 { font-size: 22px; color: #d8b06b; font-weight: 800; letter-spacing: 2px; }
#login input { background: rgba(255,255,255,.07); border: 1px solid rgba(216,176,107,.3); border-radius: 10px; color: #f2e5c8; padding: 12px 20px; font-size: 15px; width: 280px; outline: none; text-align: center; }
#login input:focus { border-color: #d8b06b; }
#login button { background: rgba(216,176,107,.2); border: 1px solid rgba(216,176,107,.5); color: #d8b06b; border-radius: 10px; padding: 10px 32px; font-size: 15px; font-weight: 700; cursor: pointer; }
#login button:hover { background: rgba(216,176,107,.35); }
#login .err { color: #e05050; font-size: 13px; min-height: 18px; }

/* ── Layout ── */
#app { display: none; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: rgba(12,14,22,.95); border-right: 1px solid rgba(216,176,107,.14); padding: 20px 0; z-index: 100; display: flex; flex-direction: column; }
.sidebar .logo { padding: 0 20px 20px; font-size: 18px; font-weight: 800; color: #d8b06b; letter-spacing: 2px; border-bottom: 1px solid rgba(216,176,107,.1); margin-bottom: 8px; }
.sidebar .nav-item { padding: 12px 20px; cursor: pointer; font-size: 14px; color: rgba(242,229,200,.5); transition: .15s; display: flex; align-items: center; gap: 10px; }
.sidebar .nav-item:hover { color: #f2e5c8; background: rgba(216,176,107,.06); }
.sidebar .nav-item.active { color: #d8b06b; background: rgba(216,176,107,.12); border-right: 3px solid #d8b06b; }
.sidebar .nav-icon { font-size: 16px; width: 22px; text-align: center; }
.sidebar-review { padding: 10px 20px 14px; border-bottom: 1px solid rgba(216,176,107,.1); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.main { margin-left: 200px; padding: 28px 32px; min-height: 100vh; }

/* ── Section ── */
.module { display: none; }
.module.active { display: block; }
.mod-title { font-size: 20px; font-weight: 800; color: #d8b06b; margin-bottom: 24px; letter-spacing: 1px; }
.section-label { font-size: 11px; font-weight: 700; color: rgba(216,176,107,.6); letter-spacing: 3px; margin: 20px 0 10px; }

/* ── Cards ── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: rgba(12,14,22,.85); border: 1px solid rgba(216,176,107,.14); border-radius: 14px; padding: 20px 18px; }
.stat-val { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
.stat-val.gold { color: #d8b06b; }
.stat-val.blue { color: #4e9eff; }
.stat-val.red { color: #e05050; }
.stat-val.green { color: #3fb950; }
.stat-label { font-size: 11px; color: rgba(242,229,200,.4); letter-spacing: 1px; }

/* ── Table ── */
.panel { background: rgba(12,14,22,.85); border: 1px solid rgba(216,176,107,.14); border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
.panel-header { padding: 14px 18px; border-bottom: 1px solid rgba(216,176,107,.1); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.panel-header select, .panel-header input { background: rgba(255,255,255,.06); border: 1px solid rgba(216,176,107,.2); border-radius: 8px; color: #f2e5c8; padding: 6px 12px; font-size: 13px; outline: none; }
.panel-header select option { background: #0a0c14; }
.panel-header button { background: rgba(216,176,107,.15); border: 1px solid rgba(216,176,107,.35); color: #d8b06b; border-radius: 8px; padding: 6px 16px; font-size: 13px; cursor: pointer; font-weight: 600; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 16px; font-size: 11px; color: rgba(242,229,200,.4); letter-spacing: 1px; font-weight: 600; border-bottom: 1px solid rgba(216,176,107,.1); }
td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.04); }
tr:hover td { background: rgba(216,176,107,.04); }
tr.clickable { cursor: pointer; }
.badge-good { background: rgba(78,158,255,.15); color: #4e9eff; padding: 2px 10px; border-radius: 6px; font-size: 12px; }
.badge-evil { background: rgba(224,80,80,.15); color: #e05050; padding: 2px 10px; border-radius: 6px; font-size: 12px; }
.badge-abort { background: rgba(255,255,255,.08); color: rgba(242,229,200,.45); padding: 2px 10px; border-radius: 6px; font-size: 12px; }
.badge-win { color: #3fb950; }
.badge-lose { color: #e05050; }
.badge-status { background: rgba(216,176,107,.1); color: #d8b06b; padding: 2px 10px; border-radius: 6px; font-size: 12px; }

/* ── Pagination ── */
.pager { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; }
.pager button { background: rgba(216,176,107,.12); border: 1px solid rgba(216,176,107,.3); color: #d8b06b; border-radius: 8px; padding: 6px 18px; cursor: pointer; font-size: 13px; }
.pager button:disabled { opacity: .3; cursor: default; }
.pager span { font-size: 13px; color: rgba(242,229,200,.4); }

/* ── Detail panel ── */
.detail-panel { background: rgba(8,10,18,.9); border: 1px solid rgba(216,176,107,.2); border-radius: 12px; padding: 20px; margin: 10px 16px 16px; }
.detail-panel h4 { color: #d8b06b; font-size: 14px; margin-bottom: 12px; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 16px; }
.detail-item { font-size: 13px; padding: 6px 10px; background: rgba(255,255,255,.03); border-radius: 6px; }
.detail-item .label { color: rgba(242,229,200,.4); font-size: 11px; }

/* ── Toggle ── */
.toggle-wrap { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
.toggle { width: 48px; height: 26px; border-radius: 13px; background: rgba(255,255,255,.1); cursor: pointer; position: relative; transition: .2s; }
.toggle.on { background: rgba(216,176,107,.4); }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 10px; background: #f2e5c8; transition: .2s; }
.toggle.on::after { left: 25px; background: #d8b06b; }
.toggle-label { font-size: 14px; }

/* ── Config textarea ── */
.config-area { background: rgba(255,255,255,.04); border: 1px solid rgba(216,176,107,.2); border-radius: 10px; color: #f2e5c8; font-family: 'SF Mono', monospace; font-size: 13px; padding: 14px; width: 100%; min-height: 120px; resize: vertical; outline: none; }
.config-area:focus { border-color: #d8b06b; }

/* ── Skins grid ── */
.skin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.skin-card { background: rgba(12,14,22,.85); border: 1px solid rgba(216,176,107,.14); border-radius: 14px; padding: 18px; }
.skin-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.skin-id { font-size: 11px; color: rgba(242,229,200,.35); margin-bottom: 12px; }
.skin-status { display: inline-block; padding: 3px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.skin-status.published { background: rgba(63,185,80,.15); color: #3fb950; }
.skin-status.draft { background: rgba(255,255,255,.06); color: rgba(242,229,200,.4); }
.skin-toggle { margin-top: 12px; }

/* ── Sub tabs ── */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap; }
.sub-tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; color: rgba(242,229,200,.5); background: rgba(255,255,255,.04); transition: .15s; }
.sub-tab:hover { color: #f2e5c8; }
.sub-tab.active { color: #d8b06b; background: rgba(216,176,107,.15); }
.sub-content { display: none; }
.sub-content.active { display: block; }

/* ── Toast ── */
#toast { position: fixed; bottom: 30px; right: 30px; background: rgba(216,176,107,.9); color: #0a0c14; padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; transform: translateY(80px); opacity: 0; transition: .3s; z-index: 999; }
#toast.show { transform: translateY(0); opacity: 1; }

/* ── Misc ── */
.text-muted { color: rgba(242,229,200,.35); }
.text-gold { color: #d8b06b; }
.mt-12 { margin-top: 12px; }
.mb-16 { margin-bottom: 16px; }
pre.json { background: rgba(255,255,255,.03); border-radius: 8px; padding: 12px; font-size: 12px; overflow-x: auto; max-height: 400px; color: rgba(242,229,200,.7); white-space: pre-wrap; word-break: break-all; }

/* ── Active rooms table ── */
.rooms-table th, .rooms-table td { padding: 8px 14px; }

/* ── Player detail page ── */
.back-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(216,176,107,.1); border: 1px solid rgba(216,176,107,.25); color: #d8b06b; border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-weight: 600; margin-bottom: 18px; }
.back-btn:hover { background: rgba(216,176,107,.2); }
.player-header { display: flex; align-items: center; gap: 18px; margin-bottom: 24px; }
.player-header .avatar-lg { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(216,176,107,.3); }
.player-header .avatar-emoji { font-size: 48px; line-height: 64px; width: 64px; height: 64px; text-align: center; display: inline-block; }
.player-header .info { display: flex; flex-direction: column; gap: 4px; }
.player-header .info .name { font-size: 20px; font-weight: 700; color: #f2e5c8; }
.player-header .info .meta { font-size: 13px; color: rgba(242,229,200,.4); }
.role-bar-wrap { display: flex; align-items: center; gap: 8px; }
.role-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,.06); flex: 1; max-width: 120px; overflow: hidden; }
.role-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #d8b06b, #f2e5c8); }
.medal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.medal-item { background: rgba(255,255,255,.04); border: 1px solid rgba(216,176,107,.12); border-radius: 10px; padding: 12px; text-align: center; display: flex; flex-direction: column; align-items: center; }
.medal-item .medal-name { font-size: 13px; color: #f2e5c8; margin-bottom: 4px; }
.medal-item .medal-count { font-size: 20px; font-weight: 700; color: #d8b06b; margin-top: auto; padding-top: 6px; }

/* ── AI character cards ── */
.ai-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
.ai-char-card { background: rgba(12,14,22,.85); border: 1px solid rgba(216,176,107,.14); border-radius: 14px; padding: 20px; cursor: pointer; transition: .15s; }
.ai-char-card:hover { border-color: rgba(216,176,107,.4); background: rgba(12,14,22,.95); }
.ai-char-card.selected { border-color: #d8b06b; box-shadow: 0 0 0 1px rgba(216,176,107,.3); }
.ai-char-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.ai-char-header .ai-avatar { font-size: 40px; line-height: 1; }
.ai-char-header .ai-name { font-size: 16px; font-weight: 700; color: #f2e5c8; }
.ai-char-header .ai-style { font-size: 12px; color: rgba(242,229,200,.4); margin-top: 2px; }
.ai-char-stats { display: flex; gap: 16px; margin-bottom: 10px; }
.ai-char-stats .ai-stat { font-size: 12px; color: rgba(242,229,200,.5); }
.ai-char-stats .ai-stat b { color: #d8b06b; font-weight: 700; }
.ai-char-tone { font-size: 12px; color: rgba(242,229,200,.35); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ai-char-catch { font-size: 13px; color: rgba(216,176,107,.7); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ai-edit-panel { background: rgba(8,10,18,.9); border: 1px solid rgba(216,176,107,.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.ai-edit-panel h4 { color: #d8b06b; font-size: 15px; margin-bottom: 14px; }
.ai-edit-row { margin-bottom: 12px; }
.ai-edit-row label { display: block; font-size: 11px; color: rgba(242,229,200,.4); letter-spacing: 1px; margin-bottom: 4px; font-weight: 600; }
.ai-edit-row input, .ai-edit-row textarea { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(216,176,107,.2); border-radius: 8px; color: #f2e5c8; padding: 8px 12px; font-size: 13px; outline: none; font-family: inherit; }
.ai-edit-row textarea { min-height: 60px; resize: vertical; }
.ai-edit-row input:focus, .ai-edit-row textarea:focus { border-color: #d8b06b; }
.ai-save-btn { background: rgba(216,176,107,.15); border: 1px solid rgba(216,176,107,.35); color: #d8b06b; border-radius: 8px; padding: 8px 24px; font-size: 14px; cursor: pointer; font-weight: 600; }
.ai-save-btn:hover { background: rgba(216,176,107,.25); }

/* ── Config role pills ── */
.role-config-section { margin-top: 20px; }
.role-config-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.role-config-label { font-size: 14px; font-weight: 600; color: #d8b06b; min-width: 60px; }
.role-pill { display: inline-block; background: rgba(216,176,107,.12); border: 1px solid rgba(216,176,107,.2); color: #f2e5c8; padding: 3px 12px; border-radius: 14px; font-size: 12px; margin: 2px; }
.role-config-note { font-size: 12px; color: rgba(242,229,200,.3); margin-top: 8px; font-style: italic; }

/* ── Game result reason ── */
.game-result-reason { display: inline-block; background: rgba(216,176,107,.1); border: 1px solid rgba(216,176,107,.15); color: #d8b06b; padding: 4px 14px; border-radius: 8px; font-size: 13px; margin-left: 10px; }

@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar .logo { font-size: 14px; padding: 0 8px 16px; }
  .sidebar .nav-item { padding: 12px 8px; font-size: 12px; justify-content: center; }
  .sidebar .nav-item span:not(.nav-icon) { display: none; }
  .main { margin-left: 60px; padding: 16px; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <h1>阿瓦隆 · 管理后台</h1>
  <input id="key-input" type="password" placeholder="输入管理密钥" autocomplete="off">
  <button onclick="tryLogin()">进入</button>
  <div class="err" id="login-err"></div>
</div>

<!-- App -->
<div id="app">
  <div class="sidebar">
    <div class="logo">阿瓦隆</div>
    <div class="sidebar-review" id="sidebar-review" onclick="toggleReview()">
      <div class="toggle" id="sidebar-review-toggle"></div>
      <span style="font-size:12px" id="sidebar-review-label">审核模式</span>
    </div>
    <div class="nav-item active" data-mod="dashboard"><span class="nav-icon">📊</span><span>仪表盘</span></div>
    <div class="nav-item" data-mod="games"><span class="nav-icon">⚔️</span><span>对战记录</span></div>
    <div class="nav-item" data-mod="players"><span class="nav-icon">👤</span><span>玩家管理</span></div>
    <div class="nav-item" data-mod="ai"><span class="nav-icon">🤖</span><span>AI 管理</span></div>
    <div class="nav-item" data-mod="config"><span class="nav-icon">⚙️</span><span>系统配置</span></div>
    <div class="nav-item" data-mod="skins"><span class="nav-icon">🎨</span><span>皮肤管理</span></div>
    <div class="nav-item" data-mod="assets"><span class="nav-icon">📁</span><span>资源管理</span></div>
  </div>
  <div class="main">

    <!-- Dashboard -->
    <div class="module active" id="mod-dashboard">
      <div class="mod-title">仪表盘</div>
      <div class="stat-grid" id="dash-stats"></div>
      <div class="section-label">在线房间</div>
      <div class="panel" id="dash-rooms"><table class="rooms-table" id="dash-rooms-table"><thead><tr><th>房间号</th><th>房主</th><th>人数</th><th>状态</th><th>阶段</th></tr></thead><tbody></tbody></table></div>
      <div id="dash-room-detail"></div>
      <div class="section-label">最近对局</div>
      <div class="panel"><table id="dash-recent"><thead><tr><th>ID</th><th>房间号</th><th>人数</th><th>胜方</th><th>时间</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- Games -->
    <div class="module" id="mod-games">
      <div class="mod-title">对战记录</div>
      <div id="games-list-view">
        <div class="panel">
          <div class="panel-header">
            <select id="games-status"><option value="">全部状态</option><option value="completed">已完成</option><option value="aborted">已中止</option></select>
            <select id="games-winner"><option value="">全部胜负</option><option value="good">正义胜</option><option value="evil">邪恶胜</option></select>
            <button onclick="loadGames(1)">筛选</button>
          </div>
          <table id="games-table"><thead><tr><th>ID</th><th>房间号</th><th>人数</th><th>胜方</th><th>状态</th><th>时间</th></tr></thead><tbody></tbody></table>
          <div class="pager" id="games-pager"></div>
        </div>
      </div>
      <div id="games-detail-view" style="display:none"></div>
    </div>

    <!-- Players -->
    <div class="module" id="mod-players">
      <div class="mod-title">玩家管理</div>
      <div id="players-list-view">
        <div class="panel">
          <div class="panel-header">
            <input id="players-search" type="text" placeholder="搜索昵称或手机号" style="width:220px">
            <button onclick="loadPlayers(1)">搜索</button>
          </div>
          <table id="players-table"><thead><tr><th>头像</th><th>昵称</th><th>手机号</th><th>对局数</th><th>胜率</th><th>常用角色</th><th>勋章</th><th>注册时间</th></tr></thead><tbody></tbody></table>
          <div class="pager" id="players-pager"></div>
        </div>
      </div>
      <div id="players-detail-view" style="display:none"></div>
    </div>

    <!-- AI -->
    <div class="module" id="mod-ai">
      <div class="mod-title">AI 管理</div>
      <div class="sub-tabs" id="ai-tabs">
        <div class="sub-tab active" data-sub="ai-overview">概览</div>
        <div class="sub-tab" data-sub="ai-evolution">进化日志</div>
        <div class="sub-tab" data-sub="ai-speeches">发言库</div>
        <div class="sub-tab" data-sub="ai-strategies">策略库</div>
        <div class="sub-tab" data-sub="ai-profiles">玩家画像</div>
      </div>
      <div class="sub-content active" id="ai-overview"></div>
      <div class="sub-content" id="ai-evolution"></div>
      <div class="sub-content" id="ai-speeches"></div>
      <div class="sub-content" id="ai-strategies"></div>
      <div class="sub-content" id="ai-profiles"></div>
    </div>

    <!-- Config -->
    <div class="module" id="mod-config">
      <div class="mod-title">系统配置</div>

      <!-- Game defaults -->
      <div class="section-label">游戏默认设置</div>
      <div class="panel" style="padding:20px;margin-bottom:20px" id="cfg-game-defaults"></div>

      <!-- Role config tabs -->
      <div class="section-label">角色配置</div>
      <div class="sub-tabs" id="cfg-role-tabs" style="margin-bottom:12px"></div>
      <div class="panel" style="padding:20px;margin-bottom:20px" id="cfg-role-editor"></div>

      <!-- Raw JSON -->
      <details style="margin-bottom:20px">
        <summary style="cursor:pointer;color:rgba(216,176,107,.5);font-size:12px;margin-bottom:8px">高级：原始 JSON 配置</summary>
        <textarea class="config-area" id="cfg-json" rows="6"></textarea>
        <button class="mt-12" style="background:rgba(216,176,107,.15);border:1px solid rgba(216,176,107,.35);color:#d8b06b;border-radius:8px;padding:8px 24px;font-size:13px;cursor:pointer;font-weight:600;" onclick="saveConfig()">保存 JSON</button>
      </details>
    </div>

    <!-- Skins -->
    <div class="module" id="mod-skins">
      <div class="mod-title">皮肤管理</div>
      <div class="skin-grid" id="skins-grid"></div>
    </div>

    <!-- Assets -->
    <div class="module" id="mod-assets">
      <div class="mod-title">资源管理</div>
      <div id="assets-content"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
// Read key from cookie or localStorage (migrate)
function getCookie(name) { const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)')); return m ? decodeURIComponent(m[1]) : ''; }
function setCookie(name, val, days) { const d = new Date(); d.setTime(d.getTime() + (days||30)*864e5); document.cookie = name+'='+encodeURIComponent(val)+';expires='+d.toUTCString()+';path=/'; }
function delCookie(name) { document.cookie = name+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/'; }
let KEY = getCookie('admin_key') || localStorage.getItem('admin_key') || '';
let currentMod = 'dashboard';
let gamesPage = 1, playersPage = 1;
let expandedGameId = null;
let selectedAiChar = null;

// ── Phase name map ────────────────────────────────────────────────
const PHASE_ZH = {
  waiting: '等待', team: '组队', speaking: '发言', voting: '投票',
  mission: '任务', assassination: '刺杀', end: '结束', ladyOfLake: '湖中仙女'
};
function phaseZh(p) { return PHASE_ZH[p] || p || '-'; }

// ── Utils ──────────────────────────────────────────────────────────
function api(path, opts) {
  const sep = path.includes('?') ? '&' : '?';
  return fetch(`${path}${sep}key=${encodeURIComponent(KEY)}`, opts).then(r => {
    if (r.status === 403) { logout(); throw new Error('forbidden'); }
    return r.json();
  });
}
function ts(epoch) {
  if (!epoch) return '-';
  const d = new Date(typeof epoch === 'number' && epoch < 1e12 ? epoch * 1000 : epoch);
  return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function winBadge(w) {
  if (w === 'good') return '<span class="badge-good">正义</span>';
  if (w === 'evil') return '<span class="badge-evil">邪恶</span>';
  if (w === 'unknown') return '<span class="badge-abort">中断</span>';
  return w || '-';
}
function winBadgeForGame(g) {
  if (g.status === 'aborted' || g.winner === 'unknown') return '<span class="badge-abort">中断</span>';
  return winBadge(g.winner);
}
function resultBadge(r) {
  if (r === 'win') return '<span class="badge-win">胜</span>';
  if (r === 'lose') return '<span class="badge-lose">负</span>';
  return r || '-';
}
function gameResultReason(game, payload) {
  if (game.status === 'aborted') return '对局中断';
  const endReason = payload && payload.endReason;
  const assassination = payload && payload.assassination;
  if (endReason === 'assassination' && assassination) {
    return assassination.hit ? '刺杀成功（邪恶胜）' : '刺杀失败（正义胜）';
  }
  if (endReason === 'three_fails') return '三次任务失败（邪恶胜）';
  // Infer from mission results
  const missionArr = payload && (payload.missionHistory || payload.missionResults);
  if (missionArr) {
    const fails = missionArr.filter(m => !m.success).length;
    const successes = missionArr.filter(m => m.success).length;
    if (game.winner === 'evil' && fails >= 3) return '三次任务失败（邪恶胜）';
    if (game.winner === 'good' && successes >= 3) return '三次任务成功（正义胜）';
  }
  if (game.winner === 'good') return '正义胜';
  if (game.winner === 'evil') return '邪恶胜';
  if (game.winner === 'unknown') return '对局中断';
  return game.winner || '';
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fixAssassination(gameId) {

  if (!confirm(`确认修改第 ${gameId} 局刺杀结果？\n目标: ${targetId}\n刺中: ${hit ? '是（邪恶胜）' : '否（正义胜）'}\n\n这会同步更新所有玩家的胜负、勋章数据。`)) return;
  api(`/api/admin/games/${gameId}/fix-assassination`, {

function loadAiMemory() {
  api('/api/admin/ai/memory').then(d => {
    let html = '';
    const grouped = {};
    (d.memories || []).forEach(m => {
      const name = m.ai_name || m.aiName || '未知';
      if (!grouped[name]) grouped[name] = [];
      grouped[name].push(m);
    });
    for (const [name, mems] of Object.entries(grouped)) {
      const aiIdx = aiCharactersCache.findIndex(c => c.name === name);
      const avUrl = aiIdx >= 0 ? AI_AVATAR_URLS[aiIdx % AI_AVATAR_URLS.length] : '';
      const avHtml = avUrl ? `<img src="${avUrl}" style="width:24px;height:24px;border-radius:50%;vertical-align:middle;margin-right:8px">` : '';
      html += `<div class="section-label" style="margin-top:20px">${avHtml}${esc(name)}（${mems.length}条）</div>`;
      mems.forEach(m => {
        const s = m.summary || m.content || m.data || '';
        // Parse structured summary: [日记|角色|结果] 教训: ... 调整: ... 亮点: ...
        const tagMatch = s.match(/^\[([^\]]+)\]/);
        const tags = tagMatch ? tagMatch[1].split('|').map(t => t.trim()) : [];
        const body = tagMatch ? s.slice(tagMatch[0].length).trim() : s;
        const parts = {};
        body.replace(/教训[：:]\s*/g, '\n教训: ').replace(/调整[：:]\s*/g, '\n调整: ').replace(/亮点[：:]\s*/g, '\n亮点: ').split('\n').forEach(line => {
          const l = line.trim();
          if (l.startsWith('教训:') || l.startsWith('教训：')) parts.lesson = l.replace(/^教训[：:]\s*/, '');
          else if (l.startsWith('调整:') || l.startsWith('调整：')) parts.adjust = l.replace(/^调整[：:]\s*/, '');
          else if (l.startsWith('亮点:') || l.startsWith('亮点：')) parts.highlight = l.replace(/^亮点[：:]\s*/, '');
          else if (l && !parts.main) parts.main = l;
        });
        html += `<div class="panel" style="padding:14px 18px;margin-bottom:8px">`;
        html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">`;
        tags.forEach(t => {
          let color = 'rgba(216,176,107,.7)';
          if (t === '胜' || t === '满足') color = '#3fb950';
          if (t === '败' || t === '挫败') color = '#e05050';
          html += `<span style="background:rgba(255,255,255,.06);padding:2px 10px;border-radius:6px;font-size:12px;color:${color}">${esc(t)}</span>`;
        });
        html += `<span class="text-muted" style="margin-left:auto;font-size:11px">#${m.id} · ${ts(m.created_at)}</span></div>`;
        if (parts.lesson) html += `<div style="font-size:13px;margin-bottom:6px"><span class="text-gold" style="font-size:11px;margin-right:6px">教训</span>${esc(parts.lesson)}</div>`;
        if (parts.adjust) html += `<div style="font-size:13px;margin-bottom:6px"><span style="color:#4e9eff;font-size:11px;margin-right:6px">调整</span>${esc(parts.adjust)}</div>`;
        if (parts.highlight) html += `<div style="font-size:13px;margin-bottom:6px"><span style="color:#3fb950;font-size:11px;margin-right:6px">亮点</span>${esc(parts.highlight)}</div>`;
        if (parts.main && !parts.lesson && !parts.adjust) html += `<div style="font-size:13px">${esc(parts.main)}</div>`;
        html += `</div>`;
      });
    }
    if (!html) html = '<div class="text-muted">暂无 AI 记忆数据</div>';
    document.getElementById('ai-memory').innerHTML = html;
  });
}

  d.categories.forEach(cat => {
    const icon = CATEGORY_ICONS[cat.name] || '📁';
    const label = CATEGORY_NAMES[cat.name] || cat.name;
    const isExpanded = _assetsExpandedCat === cat.name;
    html += `<div class="panel" style="margin-bottom:10px;overflow:hidden">`;
    html += `<div style="padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px" onclick="toggleAssetsCat('${esc(cat.name)}')">`;
    html += `<span style="font-size:20px">${icon}</span>`;
    html += `<div style="flex:1"><div style="font-size:14px;font-weight:600;color:#f2e5c8">${esc(label)}</div><div style="font-size:12px;color:rgba(242,229,200,.35)">${cat.name}/</div></div>`;
    html += `<span style="font-size:12px;color:rgba(242,229,200,.4)">${cat.count} 文件 · ${fmtSize(cat.totalSize)}</span>`;
    html += `<span style="color:rgba(216,176,107,.5);font-size:14px">${isExpanded ? '▲' : '▼'}</span>`;
    html += `</div>`;
    if (isExpanded) {
      html += `<div style="padding:0 18px 16px;border-top:1px solid rgba(255,255,255,.04)">`;
      // Preview grid for images
      const images = cat.files.filter(f => isPreviewable(f.name));
      const others = cat.files.filter(f => !isPreviewable(f.name));
      if (images.length) {
        html += `<div style="display:flex;flex-wrap:wrap;gap:10px;padding-top:14px">`;
        images.forEach(f => {
          html += `<div style="text-align:center;width:80px">`;
          html += `<a href="https://www.awalon.top${f.url}" target="_blank" style="text-decoration:none">`;
          html += `<img src="https://www.awalon.top${f.url}" style="width:64px;height:64px;object-fit:contain;border-radius:8px;border:1px solid rgba(216,176,107,.15);background:rgba(255,255,255,.03)">`;
          html += `</a>`;
          html += `<div style="font-size:10px;color:rgba(242,229,200,.35);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(f.name)}">${esc(f.name)}</div>`;
          html += `<div style="font-size:10px;color:rgba(242,229,200,.2)">${fmtSize(f.size)}</div>`;
          html += `</div>`;
        });
        html += `</div>`;
      }
      if (others.length) {
        html += `<table style="margin-top:12px"><thead><tr><th>文件名</th><th>大小</th><th>链接</th></tr></thead><tbody>`;
        others.forEach(f => {
          html += `<tr><td>${esc(f.name)}</td><td class="text-muted">${fmtSize(f.size)}</td><td><a href="https://www.awalon.top${f.url}" target="_blank" style="color:#d8b06b;font-size:12px">打开</a></td></tr>`;
        });
        html += `</tbody></table>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  });
  document.getElementById('assets-content').innerHTML = html;
}
function toggleAssetsCat(name) {
  _assetsExpandedCat = _assetsExpandedCat === name ? null : name;
  renderAssetsList();
}

// ── Pager ─────────────────────────────────────────────────────────
function renderPager(containerId, page, total, limit, loadFn) {
  const pages = Math.ceil(total / limit);
  const el = document.getElementById(containerId);
  el.innerHTML = `
    <button ${page <= 1 ? 'disabled' : ''} onclick="(${loadFn.name})(${page - 1})">上一页</button>
    <span>${page} / ${pages}（共 ${total} 条）</span>
    <button ${page >= pages ? 'disabled' : ''} onclick="(${loadFn.name})(${page + 1})">下一页</button>
  `;
}

// Enter on key input
document.getElementById('key-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
</script>
</body>
</html>
