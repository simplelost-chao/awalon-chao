<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>验人座位提示 · 设计预览</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e1a28;
    background-image: radial-gradient(ellipse 60% 50% at 50% 80%, rgba(91,200,216,0.06) 0%, transparent 70%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 60px 24px;
    font-family: -apple-system, 'PingFang SC', sans-serif;
  }

  h2 {
    color: rgba(91,200,216,0.45);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: monospace;
  }

  .row {
    display: flex;
    align-items: flex-end;
    gap: 40px;
  }

  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .col-label {
    font-size: 11px;
    color: rgba(160,200,220,0.4);
    letter-spacing: 1.5px;
    font-family: monospace;
  }

  /* ── 基础座位卡 ── */
  .seat-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }

  .seat-avatar-wrap {
    position: relative;
    width: 72px;
    height: 72px;
  }

  .seat-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: rgba(200,220,240,0.7);
    overflow: hidden;
    position: relative;
    z-index: 2;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .seat-no {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: rgba(200,220,240,0.8);
    z-index: 3;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .seat-name {
    font-size: 12px;
    color: rgba(200,220,240,0.65);
  }

  /* ═══════════════════════════════════
     OPTION A：水波纹扩散
  ═══════════════════════════════════ */
  .hint-ripple .seat-avatar {
    border-color: rgba(91,200,216,0.6);
    box-shadow: 0 0 14px rgba(91,200,216,0.35);
  }

  .ripple-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid rgba(91,200,216,0.7);
    animation: ripple-out 2s ease-out infinite;
    z-index: 1;
  }
  .ripple-ring:nth-child(2) { animation-delay: 0.6s; }
  .ripple-ring:nth-child(3) { animation-delay: 1.2s; }

  @keyframes ripple-out {
    0%   { transform: scale(1);   opacity: 0.75; }
    100% { transform: scale(1.9); opacity: 0; }
  }

  /* ═══════════════════════════════════
     OPTION B：光圈呼吸 + 顶部小标签
  ═══════════════════════════════════ */
  .hint-glow .seat-avatar {
    border-color: rgba(91,200,216,0.65);
    box-shadow: 0 0 0 4px rgba(91,200,216,0.12), 0 0 20px rgba(91,200,216,0.3);
    animation: glow-breathe 2s ease-in-out infinite;
  }

  @keyframes glow-breathe {
    0%,100% { box-shadow: 0 0 0 3px rgba(91,200,216,0.1), 0 0 16px rgba(91,200,216,0.25); }
    50%      { box-shadow: 0 0 0 6px rgba(91,200,216,0.18), 0 0 28px rgba(91,200,216,0.45); }
  }

  .hint-tag {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(91,200,216,0.18);
    border: 1px solid rgba(91,200,216,0.45);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    color: #a5f3f0;
    white-space: nowrap;
    z-index: 4;
    backdrop-filter: blur(4px);
    animation: tag-float 2s ease-in-out infinite;
  }

  @keyframes tag-float {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-3px); }
  }

  /* ═══════════════════════════════════
     OPTION C：扫描弧线 + 脉冲点
  ═══════════════════════════════════ */
  .hint-scan .seat-avatar {
    border-color: rgba(91,200,216,0.5);
    box-shadow: 0 0 12px rgba(91,200,216,0.2);
  }

  .scan-arc {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(91,200,216,0.85);
    border-right-color: rgba(91,200,216,0.3);
    animation: spin-arc 2.5s linear infinite;
    z-index: 1;
  }

  @keyframes spin-arc {
    to { transform: rotate(360deg); }
  }

  .scan-dot {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #5bc8d8;
    box-shadow: 0 0 8px rgba(91,200,216,0.8);
    z-index: 4;
    animation: dot-pulse 1.4s ease-in-out infinite;
  }

  @keyframes dot-pulse {
    0%,100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
    50%      { transform: translateX(-50%) scale(1.5); opacity: 1; }
  }

  /* ═══════════════════════════════════
     OPTION D：底部水光条 + 边框发光
  ═══════════════════════════════════ */
  .hint-water .seat-avatar {
    border-color: rgba(91,200,216,0.55);
  }

  .water-base {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(91,200,216,0.55) 0%, transparent 75%);
    z-index: 1;
    animation: water-shimmer 2s ease-in-out infinite;
  }

  @keyframes water-shimmer {
    0%,100% { opacity: 0.5; transform: translateX(-50%) scaleX(1); }
    50%      { opacity: 1;   transform: translateX(-50%) scaleX(1.2); }
  }

  .water-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1.5px solid rgba(91,200,216,0.5);
    animation: water-ring-out 2.2s ease-out infinite;
    z-index: 1;
  }
  .water-ring:nth-child(2) { animation-delay: 1.1s; }

  @keyframes water-ring-out {
    0%   { transform: scale(1);    opacity: 0.6; }
    100% { transform: scale(1.75); opacity: 0; }
  }

  /* divider */
  .divider {
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(91,200,216,0.15), transparent);
  }
</style>
</head>
<body>

<h2>验人座位提示 · 四种方案对比</h2>

<div class="row">

  <!-- 普通座位（对照组） -->
  <div class="col">
    <div class="seat-card">
      <div class="seat-avatar-wrap">
        <div class="seat-avatar">👤</div>
        <div class="seat-no">3</div>
      </div>
    </div>
    <span class="seat-name">ALICE</span>
    <span class="col-label">普通</span>
  </div>

  <div class="divider"></div>

  <!-- A: 水波纹 -->
  <div class="col">
    <div class="seat-card hint-ripple">
      <div class="seat-avatar-wrap">
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        <div class="seat-avatar">👤</div>
        <div class="seat-no">3</div>
      </div>
    </div>
    <span class="seat-name">ALICE</span>
    <span class="col-label">A · 水波纹</span>
  </div>

  <!-- B: 呼吸光晕 + 标签 -->
  <div class="col">
    <div class="seat-card hint-glow">
      <div class="seat-avatar-wrap">
        <div class="hint-tag">可验人</div>
        <div class="seat-avatar">👤</div>
        <div class="seat-no">3</div>
      </div>
    </div>
    <span class="seat-name">ALICE</span>
    <span class="col-label">B · 光晕+标签</span>
  </div>

  <!-- C: 扫描弧 -->
  <div class="col">
    <div class="seat-card hint-scan">
      <div class="seat-avatar-wrap">
        <div class="scan-arc"></div>
        <div class="seat-avatar">👤</div>
        <div class="seat-no">3</div>
        <div class="scan-dot"></div>
      </div>
    </div>
    <span class="seat-name">ALICE</span>
    <span class="col-label">C · 扫描弧</span>
  </div>

  <!-- D: 水光底 -->
  <div class="col">
    <div class="seat-card hint-water">
      <div class="seat-avatar-wrap">
        <div class="water-ring"></div>
        <div class="water-ring"></div>
        <div class="seat-avatar">👤</div>
        <div class="seat-no">3</div>
        <div class="water-base"></div>
      </div>
    </div>
    <span class="seat-name">ALICE</span>
    <span class="col-label">D · 水光底</span>
  </div>

</div>

</body>
</html>
