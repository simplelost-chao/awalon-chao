<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Avalon · Skin Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b11;--surface:#10131c;--card:#161b28;--border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --text:#e8eaf0;--sub:#7a8aa0;--muted:#3a4555;
  --good:#4ade80;--evil:#f87171;--accent:#d9b36b;
  --r:10px;--font:-apple-system,'PingFang SC',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─── */
.hd{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0}
.hd-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text)}
.hd-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
.hd-sep{width:1px;height:20px;background:var(--border)}
.hd-key-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.hd-key-label{font-size:11px;color:var(--sub)}
.hd-key{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--mono);padding:5px 10px;width:260px;outline:none}
.hd-key:focus{border-color:var(--border-hi)}
.hd-key::placeholder{color:var(--muted)}
.hd-key-status{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.hd-key-status.ok{background:var(--good);box-shadow:0 0 6px var(--good)}

/* ─── Skin tabs ─── */
.skin-tabs{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:2px;padding:0 12px;flex-shrink:0;overflow-x:auto}
.skin-tabs::-webkit-scrollbar{display:none}
.stab{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:7px;border:1px solid transparent;cursor:pointer;white-space:nowrap;background:none;transition:all .15s}
.stab:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.stab.active{background:rgba(255,255,255,.07);border-color:var(--border-hi)}
.stab-chip{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.stab-name{font-size:12px;font-weight:600;color:var(--text)}
.stab-id{font-size:10px;color:var(--sub);font-family:var(--mono)}

/* ─── Workspace ─── */
.workspace{flex:1;display:grid;grid-template-columns:230px 1fr 360px;grid-template-rows:1fr;overflow:hidden}

/* ─── Assets Panel ─── */
.panel-assets{overflow-y:auto;min-height:0;border-right:1px solid var(--border);background:var(--surface)}
.panel-assets::-webkit-scrollbar{width:4px}
.panel-assets::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.asset-cat{padding:10px 12px 6px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.asset-item{display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.asset-item:hover{background:rgba(255,255,255,.03)}
.asset-item.active{background:rgba(255,255,255,.06);border-left-color:var(--accent)}
.asset-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--card);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.asset-thumb img{width:100%;height:100%;object-fit:cover}
.asset-thumb.portrait{height:48px}
.asset-info{min-width:0}
.asset-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset-file{font-size:10px;color:var(--sub);font-family:var(--mono)}
.asset-badge{width:8px;height:8px;border-radius:50%;background:var(--good);flex-shrink:0;margin-left:auto;box-shadow:0 0 5px var(--good)}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* ─── Atlas tree ─── */
.atlas-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;color:var(--sub);flex-shrink:0;cursor:pointer}
.atlas-toggle:hover{background:rgba(255,255,255,.08);color:var(--text)}
.slot-children{border-left:2px solid rgba(255,255,255,.06);margin-left:20px}
.slot-item{padding:5px 10px}
.slot-thumb{width:32px;height:32px;border-radius:4px}
.slot-item .asset-name{font-size:11px}
.slot-item .asset-file{font-size:9px}

/* ─── Reference Image ─── */
.ref-img-zone{margin:0 12px 4px;border:1.5px dashed rgba(255,255,255,.12);border-radius:6px;cursor:pointer;transition:border-color .15s;overflow:hidden}
.ref-img-zone:hover{border-color:rgba(255,255,255,.28)}
.ref-img-empty{padding:12px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:11px}
.ref-img-empty span{font-size:18px}
.ref-img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:0 12px 4px}
.ref-img-thumb{position:relative;aspect-ratio:1;overflow:hidden;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:var(--card)}
.ref-img-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.ref-img-thumb:hover .ref-img-thumb-del{opacity:1}
.ref-img-thumb-del{position:absolute;top:3px;right:3px;width:16px;height:16px;background:rgba(200,40,40,.88);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;opacity:0;transition:opacity .15s;line-height:1}
.ref-img-add{aspect-ratio:1;border:1.5px dashed rgba(255,255,255,.14);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);cursor:pointer;transition:all .15s}
.ref-img-add:hover{border-color:rgba(255,255,255,.32);color:var(--sub)}

/* ─── Prompt Panel ─── */
.panel-prompt{display:flex;flex-direction:column;overflow:hidden;padding:0;background:var(--surface)}
.pp-top{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.pp-asset-label{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pp-asset-name{font-size:15px;font-weight:700}
.pp-spec{font-size:11px;color:var(--sub);font-family:var(--mono);padding:2px 8px;background:rgba(255,255,255,.05);border-radius:4px;border:1px solid var(--border)}
.pp-prompt-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.pp-prompt{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:var(--mono);line-height:1.65;padding:14px;resize:none;outline:none;min-height:0}
.pp-prompt:focus{border-color:var(--border-hi)}
.pp-actions{display:flex;gap:8px;padding:12px 20px;flex-shrink:0;border-top:1px solid var(--border)}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all .15s;font-family:var(--font);display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#1a1200;border-color:var(--accent);font-weight:700}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-good{background:rgba(74,222,128,.12);color:var(--good);border-color:rgba(74,222,128,.3)}
.btn-good:hover{background:rgba(74,222,128,.18)}
.pp-result{flex-shrink:0;padding:0 20px 12px}
.pp-result-img{width:100%;max-height:200px;border-radius:var(--r);object-fit:contain;background:var(--card);border:1px solid var(--border);display:none}
.pp-result-img.visible{display:block}
/* ─── Version strip ─── */
.pp-versions{display:none;flex-direction:column;gap:6px;padding:0 20px 10px;flex-shrink:0}
.pp-versions.visible{display:flex}
.pp-versions-label{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:1px}
.pp-versions-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.pp-versions-strip::-webkit-scrollbar{height:3px}
.pp-versions-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.ver-wrap{position:relative;flex-shrink:0;cursor:pointer}
.ver-wrap .ver-del{display:none;position:absolute;top:-4px;left:-4px;width:16px;height:16px;border-radius:50%;background:rgba(220,50,50,.9);color:#fff;font-size:10px;font-weight:700;line-height:16px;text-align:center;z-index:5;cursor:pointer}
.ver-wrap:hover .ver-del{display:block}
.ver-del:hover{background:rgba(255,30,30,1)!important}
.ver-thumb{flex-shrink:0;width:52px;height:52px;border-radius:6px;object-fit:cover;border:2px solid transparent;cursor:pointer;background:var(--card);transition:border-color .15s}
.ver-thumb:hover{border-color:rgba(255,255,255,.3)}
.ver-thumb.active{border-color:var(--accent);box-shadow:0 0 6px rgba(217,179,107,.35)}
.pp-loading{display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100px;color:var(--sub);font-size:12px}
.pp-loading.visible{display:flex}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ─── Batch View ─── */
#batchView{position:fixed;inset:0;z-index:9997;background:var(--bg);flex-direction:column}
.bv-header{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}
.bv-back{background:none;border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .15s}
.bv-back:hover{color:var(--text);border-color:var(--border-hi)}
.bv-title{flex:1;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text)}
.bv-skin-chip{width:14px;height:14px;border-radius:4px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.bv-stop{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:6px;color:#f87171;font-size:12px;padding:5px 12px;cursor:pointer;transition:all .15s}
.bv-stop:disabled{opacity:.4;cursor:default}
.bv-progress-wrap{padding:14px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface)}
.bv-pbar{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:8px}
.bv-pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f0c060);border-radius:4px;transition:width .4s ease;width:0%}
.bv-pinfo{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.bv-pcount{font-size:13px;font-weight:600;color:var(--text)}
.bv-ppct{font-size:13px;font-weight:700;color:var(--accent)}
.bv-pcurrent{font-size:11px;color:var(--muted)}
.bv-list{flex:1;overflow-y:auto;padding:8px 16px 20px}
.bv-list::-webkit-scrollbar{width:4px}
.bv-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.bv-group{display:flex;align-items:center;gap:8px;padding:12px 8px 5px;border-bottom:1px solid var(--border);margin-bottom:4px;cursor:pointer;user-select:none}
.bv-group:hover{background:rgba(255,255,255,.02)}
.bv-group-label{font-size:10px;color:var(--muted);letter-spacing:.5px;font-weight:700;text-transform:uppercase;flex:1}
.bv-group-count{font-size:10px;color:var(--muted);opacity:.6}
.bv-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:7px;margin-bottom:1px;border:1px solid transparent;transition:background .2s,border-color .2s}
.bv-item.active{background:rgba(255,255,255,.04);border-color:var(--border)}
.bv-thumb{width:44px;height:44px;flex-shrink:0;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);overflow:hidden;display:flex;align-items:center;justify-content:center}
.bv-thumb img{width:100%;height:100%;object-fit:cover;border-radius:5px}
.bv-thumb-spin{font-size:18px;animation:spin .8s linear infinite}
.bv-thumb-err{color:#f87171;font-size:14px}
.bv-info{flex:1;min-width:0}
.bv-iname{font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bv-igroup{font-size:10px;color:var(--muted);margin-bottom:1px}
.bv-istatus{font-size:10px;color:var(--sub);display:flex;align-items:center;gap:4px;margin-top:2px}
.bv-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bv-dot-idle{background:rgba(255,255,255,.15)}
.bv-dot-active{background:var(--accent);box-shadow:0 0 5px var(--accent);animation:bvpulse 1s ease-in-out infinite}
.bv-dot-done{background:var(--good)}
.bv-dot-err{background:#f87171}
.bv-done-bar{padding:14px;text-align:center;font-size:13px;color:var(--good);background:rgba(110,222,168,.06);border-top:1px solid rgba(110,222,168,.15);flex-shrink:0;letter-spacing:.3px}
.stab-batch{margin-left:auto;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:11px;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.stab-batch:hover{background:rgba(255,255,255,.08);color:var(--text);border-color:var(--border-hi)}
.stab-manage{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:13px;padding:4px 8px;cursor:pointer;transition:all .15s;flex-shrink:0}
.stab-manage:hover{background:rgba(255,255,255,.08);color:var(--text)}
/* 皮肤管理弹窗 */
#skinManagerOverlay{display:none}
#skinManagerOverlay.open{display:flex!important}
.skm-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.skm-row:last-child{border-bottom:none}
.skm-chip{width:28px;height:28px;border-radius:6px;flex-shrink:0}
.skm-info{flex:1;min-width:0}
.skm-name{display:block;font-size:13px;color:#eef1f7;font-weight:500}
.skm-id{display:block;font-size:10px;color:#7080a8;margin-top:1px}
.skm-toggle{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0}
.skm-toggle input{opacity:0;width:0;height:0}
.skm-slider{position:absolute;inset:0;background:rgba(255,255,255,.15);border-radius:11px;cursor:pointer;transition:.2s}
.skm-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#aeb6c7;border-radius:50%;transition:.2s}
.skm-toggle input:checked + .skm-slider{background:var(--accent)}
.skm-toggle input:checked + .skm-slider:before{transform:translateX(16px);background:#1a1200}
@keyframes bvpulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Batch view — selection bar */
.bv-sel-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface)}
.bv-sel-info{font-size:12px;color:var(--sub);flex:1}
.bv-sel-info b{color:var(--text)}
.bv-filter-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--sub);font-size:10px;padding:3px 9px;cursor:pointer;transition:all .15s;white-space:nowrap}
.bv-filter-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.bv-filter-btn.on{background:rgba(255,255,255,.1);border-color:var(--border-hi);color:var(--text)}
.bv-start-btn{background:var(--accent);border:none;border-radius:6px;color:#000;font-size:12px;font-weight:700;padding:6px 16px;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.bv-start-btn:disabled{opacity:.35;cursor:default}
/* Batch view — item with checkbox */
.bv-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:7px;margin-bottom:1px;border:1px solid transparent;transition:background .2s,border-color .2s,opacity .2s;cursor:pointer}
.bv-item:hover{background:rgba(255,255,255,.03)}
.bv-item.active{background:rgba(255,255,255,.04);border-color:var(--border)}
.bv-item.bv-unselected{opacity:.35}
.bv-cb-wrap{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.bv-cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.bv-has-badge{font-size:9px;background:rgba(110,222,168,.15);color:var(--good);border-radius:3px;padding:1px 5px;white-space:nowrap;flex-shrink:0}
.pp-prompt-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:12px 20px;gap:10px;min-height:0}

/* ─── Phone Preview Panel ─── */
.panel-preview{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;padding:16px 12px;overflow-y:auto}
.panel-preview::-webkit-scrollbar{width:4px}
.panel-preview::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08)}
.preview-tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--card);padding:3px;border-radius:8px;border:1px solid var(--border);overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
.preview-tabs::-webkit-scrollbar{display:none}
.preview-tab{padding:5px 8px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--sub);transition:all .15s;white-space:nowrap;flex:0 0 auto;text-align:center}
.preview-tab.active{background:rgba(255,255,255,.08);color:var(--text)}
.preview-subtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;min-height:0}
.preview-subtabs:empty{margin-bottom:0}
.preview-sub{padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;color:var(--sub);border:1px solid transparent;transition:all .12s;white-space:nowrap}
.preview-sub:hover:not(.active){color:var(--text);background:rgba(255,255,255,.04)}
.preview-sub.active{background:var(--accent);color:#0c0f17;border-color:transparent;font-weight:600}
.preview-sub-sep{width:1px;background:var(--border);margin:0 2px;align-self:stretch}

/* ─── Phone Frame ─── */
.phone-frame{width:280px;height:560px;border-radius:36px;border:8px solid #1a1e2a;box-shadow:0 0 0 1px rgba(255,255,255,.06),0 20px 60px rgba(0,0,0,.6);overflow:hidden;position:relative;flex-shrink:0}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ph-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.ph-bg-color{position:absolute;inset:0;z-index:0}
.ph-mask{position:absolute;inset:0;z-index:1;pointer-events:none}

/* ─── Phone UI: high-fidelity recreation ─── */

/* Nav bar  (44px real → ~28px preview, scale 0.65) */
.ph-nav{position:relative;z-index:10;height:28px;flex-shrink:0;display:flex;align-items:center;padding:0 8px;background:var(--aw-nav-bg,rgba(12,16,24,.88));border-bottom:1px solid var(--aw-nav-border,rgba(255,255,255,.08))}
.ph-nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--aw-text,#eef1f7);letter-spacing:2px;white-space:nowrap}
.ph-nav-back{font-size:8px;color:var(--aw-text,#eef1f7);padding:2px 5px;border-radius:calc(999px * var(--aw-r));border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:var(--aw-input-bg,rgba(255,255,255,.06));display:flex;align-items:center;gap:2px;flex-shrink:0;white-space:nowrap}

/* Scrollable content */
.ph-content{position:relative;z-index:2;flex:1;overflow-y:auto;padding:6px 7px 8px;display:flex;flex-direction:column;gap:5px}
.ph-content::-webkit-scrollbar{display:none}

/* Panel card */
.ph-panel{background:var(--aw-panel,#131720);border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));border-radius:calc(7px * var(--aw-r));padding:7px;box-shadow:0 2px 8px rgba(0,0,0,.40),inset 0 1px 0 rgba(255,255,255,.04)}

/* User header row (left accent border) */
.ph-user-row{display:flex;align-items:center;gap:5px;padding:4px 5px;border-left:2px solid var(--aw-accent,#d9b36b);border-radius:calc(3px * var(--aw-r));background:linear-gradient(90deg,rgba(216,176,107,0.14),transparent);margin-bottom:5px}
.ph-av{width:22px;height:22px;border-radius:calc(50% * var(--aw-r,1));background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15)}
.ph-logout{margin-left:auto;font-size:6px;color:rgba(106,122,154,0.9);padding:1px 5px;border:1px solid rgba(106,122,154,0.3);border-radius:calc(999px * var(--aw-r))}

/* 3-button action grid */
.ph-act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:5px}
.ph-act-btn{background:transparent;border:1px solid rgba(255,255,255,0.18);border-radius:calc(4px * var(--aw-r));padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:2px}

/* Player count pills */
.ph-count-row{display:flex;gap:2px;margin-bottom:5px;overflow:hidden}
.ph-cnt{flex:1;padding:2px 0;border-radius:calc(3px * var(--aw-r));font-size:6px;text-align:center;background:rgba(0,0,0,0.16);border:1px solid rgba(255,255,255,0.12);color:var(--aw-subtext,#aeb6c7);white-space:nowrap}
.ph-cnt.on{background:rgba(216,176,107,0.18);border-color:rgba(216,176,107,0.55);color:var(--aw-accent,#d9b36b);font-weight:700}

/* Role chips — vertical card layout matching real UI */
.ph-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.ph-rchip{padding:4px 5px;border-radius:calc(4px * var(--aw-r));font-size:6px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:20px;line-height:1.3}
.ph-rchip-img{width:15px;height:15px;border-radius:calc(3px * var(--aw-r));object-fit:cover;flex-shrink:0}
.good-chip{background:rgba(30,90,200,0.12);border:1px solid rgba(80,160,255,0.55);color:#d3daea}
.evil-chip{background:rgba(160,35,45,0.12);border:1px solid rgba(220,80,90,0.55);color:#d3daea}
.spec-chip{background:rgba(88,28,135,0.35);border:1px solid rgba(192,132,252,0.4);color:#d4aaff}

/* CTA buttons */
.ph-btn-row{display:flex;gap:4px}
.ph-btn-p{flex:1;padding:6px 0;border-radius:calc(6px * var(--aw-r));font-size:8px;font-weight:700;text-align:center;background:var(--aw-btn-primary-bg,linear-gradient(180deg,#e4c281,#c89b52));color:var(--aw-btn-primary-text,#1a1510)}
.ph-btn-g{flex:1;padding:6px 0;border-radius:calc(6px * var(--aw-r));font-size:8px;text-align:center;background:transparent;border:1px solid var(--aw-btn-ghost-border,rgba(255,255,255,0.2));color:var(--aw-text,#eef1f7)}

/* ── Round table (fills full width, square aspect via padding-bottom:100%) */
.ph-table-area{position:relative;width:100%;padding-bottom:90%;margin-bottom:2px;flex-shrink:0}
.ph-table-inner{position:absolute;inset:0}
.ph-table-circle-bg{position:absolute;width:55%;height:55%;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;overflow:hidden;opacity:0.38;pointer-events:none;transition:opacity .2s}
.ph-table-circle-bg img{width:100%;height:100%;object-fit:cover}
/* Seats — matches production round-table.wxss structure exactly */
.ph-seat{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;width:44px;overflow:visible}
/* avatar wrap: relative so badge/no can be absolutely positioned */
.ph-seat-av-wrap{position:relative;width:30px;height:30px;flex-shrink:0;overflow:visible}
.ph-seat-av{width:30px;height:30px;border-radius:calc(50% * var(--aw-r,1));background:rgba(15,11,8,0.55);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;z-index:2;overflow:hidden}
/* seat number: bottom-right of avatar wrap */
.ph-seat-no{position:absolute;right:-5px;bottom:-3px;min-width:14px;height:14px;padding:0 3px;border-radius:calc(999px * var(--aw-r));display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#e6c17d;background:rgba(10,8,20,0.95);border:1px solid rgba(180,140,60,0.42);z-index:5;line-height:1;box-sizing:border-box}
/* status badge: top-left of avatar wrap */
.ph-seat-badge{position:absolute;top:-3px;left:-3px;width:14px;height:14px;border-radius:calc(50% * var(--aw-r,1));background:rgba(8,11,18,0.96);border:1px solid transparent;display:flex;align-items:center;justify-content:center;z-index:10}
.ph-seat-badge.speak{border-color:rgba(251,191,36,0.8);box-shadow:0 0 4px rgba(251,191,36,0.45)}
.ph-seat-badge.voted{border-color:rgba(52,211,153,0.8)}
.ph-seat-badge.voting{border-color:rgba(251,191,36,0.8)}
.ph-seat-badge.mission{border-color:rgba(251,191,36,0.8);box-shadow:0 0 3px rgba(251,191,36,0.35)}
/* crown: absolute above avatar wrap */
.ph-crown{position:absolute;top:-10px;font-size:9px;line-height:1;z-index:5}
.ph-seat-name{font-size:7px;color:#d0d8e8;text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;max-width:44px}
/* role pill: absolute below the whole seat card */
.ph-seat-below{position:absolute;top:calc(100% + 2px);left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;width:52px;pointer-events:none}
.ph-seat-role-pill{display:flex;align-items:center;max-width:52px;padding:1px 5px;border-radius:calc(999px * var(--aw-r));overflow:hidden;white-space:nowrap;font-size:7px;color:#fff;border:1px solid transparent}
.ph-seat-role-pill.good{background:rgba(7,50,120,0.55);border-color:rgba(78,158,255,0.45);color:#bfdbfe}
.ph-seat-role-pill.merlin{background:rgba(80,30,150,0.55);border-color:rgba(180,130,255,0.4);color:#d4aaff}
.ph-seat-role-pill.evil{background:rgba(110,12,12,0.6);border-color:rgba(220,60,60,0.4);color:#fca5a5}
/* faction glow on avatar */
.ph-seat.good .ph-seat-av{border-color:var(--aw-good-glow,rgba(78,158,255,0.85));box-shadow:0 0 6px var(--aw-good-shadow,rgba(78,158,255,0.45));background:var(--aw-good-seat-bg,rgba(7,50,120,0.35))}
.ph-seat.evil .ph-seat-av{border-color:var(--aw-evil-glow,rgba(220,60,60,0.8));box-shadow:0 0 5px var(--aw-evil-shadow,rgba(200,40,40,0.38));background:var(--aw-evil-seat-bg,rgba(35,6,6,0.92))}
.ph-seat.merlin .ph-seat-av{border-color:rgba(180,130,255,0.85);box-shadow:0 0 6px rgba(160,100,255,0.45);background:rgba(25,12,55,0.9)}
.ph-seat.me .ph-seat-av{border-color:rgba(233,191,112,0.95)!important;box-shadow:0 0 0 2px rgba(233,191,112,0.22)!important}
/* center result states */
.ph-center-result{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;z-index:2;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:54px}
.ph-center-result-title{font-size:9px;font-weight:700;line-height:1.3;letter-spacing:1px}
.ph-center-result-sub{font-size:7px;color:rgba(255,255,255,0.55);line-height:1.3}
.ph-center-result.mission-progress .ph-center-result-title{color:var(--aw-accent,#fbbf24)}
.ph-center-result.success .ph-center-result-title{color:var(--aw-success,#72e0a0)}
.ph-center-result.fail .ph-center-result-title{color:var(--aw-fail,#f07070)}
/* center state mini-toggle above round table */
.ph-center-toggle{display:flex;gap:2px;padding:2px 4px;justify-content:center;flex-shrink:0}
.ph-ct-btn{font-size:5.5px;padding:2px 5px;border-radius:calc(3px * var(--aw-r));border:1px solid rgba(255,255,255,.12);color:var(--aw-subtext,#aeb6c7);cursor:pointer;background:rgba(0,0,0,.2)}
.ph-ct-btn.active{background:rgba(255,255,255,.1);color:var(--aw-text,#eef1f7);border-color:rgba(255,255,255,.25)}
/* game detail (对战详情) page */
.ph-ghc{border-radius:calc(8px * var(--aw-r));overflow:hidden;margin-bottom:6px;position:relative;flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,.45)}
.ph-ghc-bar{height:3px}
.ph-ghc-bar.win{background:linear-gradient(90deg,rgba(80,200,120,.8),rgba(40,160,80,.4))}
.ph-ghc-bar.lose{background:linear-gradient(90deg,rgba(220,80,80,.8),rgba(160,40,40,.4))}
.ph-ghc-body{padding:7px 8px 6px}
.ph-ghc-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ph-ghc-id{font-size:7px;color:var(--aw-subtext,#aeb6c7)}
.ph-ghc-id-num{font-size:9px;font-weight:700;color:var(--aw-text,#eef1f7)}
.ph-ghc-result-tag{display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:calc(999px * var(--aw-r));font-size:7px;font-weight:700}
.ph-ghc-result-tag.win{background:rgba(60,160,100,.2);border:1px solid rgba(100,220,150,.5);color:#72e0a0}
.ph-ghc-result-tag.lose{background:rgba(160,40,40,.2);border:1px solid rgba(220,90,90,.5);color:#f07070}
.ph-ghc-dot{width:4px;height:4px;border-radius:calc(50% * var(--aw-r,1))}
.ph-ghc-dot.win{background:#72e0a0}
.ph-ghc-dot.lose{background:#f07070}
.ph-ghc-hero-row{display:flex;gap:8px;align-items:flex-start}
.ph-ghc-portrait-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.ph-ghc-portrait{width:36px;height:36px;border-radius:calc(50% * var(--aw-r,1));overflow:hidden;border:2px solid rgba(255,255,255,.2);background:rgba(20,14,4,.8);display:flex;align-items:center;justify-content:center;font-size:18px}
.ph-ghc-role-pill{font-size:6px;padding:1px 6px;border-radius:calc(999px * var(--aw-r));background:var(--aw-evil-chip-bg,rgba(180,50,50,.25));border:1px solid var(--aw-evil-chip-border,rgba(220,90,90,.4));color:var(--aw-evil-chip-text,#fca5a5);white-space:nowrap}
.ph-ghc-role-pill.good{background:var(--aw-good-chip-bg,rgba(7,50,120,.35));border-color:var(--aw-good-chip-border,rgba(78,158,255,.4));color:var(--aw-good-chip-text,#bfdbfe)}
.ph-ghc-player-name{font-size:10px;font-weight:700;color:var(--aw-text,#eef1f7);margin-bottom:4px}
.ph-ghc-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
.ph-ghc-meta-item{display:flex;align-items:center;gap:2px;font-size:6px;color:var(--aw-subtext,#aeb6c7)}
.ph-ghc-meta-val.evil{color:#fca5a5}
.ph-ghc-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.ph-ghc-medal-row{display:flex;flex-wrap:wrap;gap:3px}
.ph-ghc-medal{display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:calc(999px * var(--aw-r));background:var(--aw-medal-bg,rgba(200,144,42,.15));border:1px solid var(--aw-medal-border,rgba(200,144,42,.35));font-size:6px;color:var(--aw-medal-color,#d4a043)}
.ph-section-hd{font-size:7px;font-weight:700;color:var(--aw-subtext,#aeb6c7);letter-spacing:1px;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.06)}
/* round table compact for history detail */
.ph-table-area-sm{position:relative;width:100%;padding-bottom:78%;flex-shrink:0}

/* Section chip label */
.ph-sec-chip{display:inline-flex;align-items:center;font-size:7px;font-weight:700;color:var(--aw-subtext,#aeb6c7);letter-spacing:1px;margin-bottom:3px;padding:2px 7px;border-radius:calc(999px * var(--aw-r));background:rgba(255,255,255,0.05);border:1px solid var(--aw-panel-border,rgba(255,255,255,.08))}

/* Mission pills */
.ph-pills-row{display:flex;gap:3px}
.ph-pill{flex:1;min-height:38px;border-radius:calc(5px * var(--aw-r));border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:rgba(0,0,0,0.22);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 1px;gap:1px}
.ph-pill.success{background:rgba(60,160,100,0.18);border-color:rgba(100,220,150,0.55)}
.ph-pill.fail{background:rgba(160,40,40,0.18);border-color:rgba(230,90,90,0.55)}
.ph-pill.current{background:rgba(190,145,60,0.18);border-color:rgba(220,180,90,0.7)}
.ph-pill.future{opacity:0.6}
.ph-pill-icon{font-size:9px;font-weight:bold;line-height:1}
.ph-pill.success .ph-pill-icon{color:#72e0a0}
.ph-pill.fail .ph-pill-icon{color:#f07070}
.ph-pill-lbl{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);line-height:1}
.ph-pill-curnum{font-size:13px;font-weight:700;color:#f0e0a0;line-height:1}

/* Bottom action panel — fixed to bottom of phone */
.ph-action-panel{position:relative;z-index:10;flex-shrink:0;background:var(--aw-panel,rgba(19,23,31,.82));border-top:1px solid var(--aw-nav-border,rgba(255,255,255,.08));padding:7px 8px 18px}
.ph-vote-title{font-size:7px;color:var(--aw-subtext,#aeb6c7);text-align:center;margin-bottom:5px}
.ph-vote-team{display:flex;gap:14px;justify-content:center;margin-bottom:5px}
.ph-vote-av{width:22px;height:22px;border-radius:calc(50% * var(--aw-r,1));background:rgba(12,10,8,0.5);border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));display:flex;align-items:center;justify-content:center;font-size:11px}
.ph-vote-name{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);text-align:center;margin-top:2px}
.ph-vote-divider{width:100%;height:1px;background:var(--aw-input-bg,rgba(255,255,255,.06));margin:4px 0}
.ph-vote-btns{display:flex;gap:3px}
.ph-vote-yes{flex:1;background:var(--aw-btn-primary-bg,linear-gradient(180deg,#e4c281,#c89b52));color:var(--aw-btn-primary-text,#1a1510);border-radius:calc(5px * var(--aw-r));padding:5px 0;font-size:8px;font-weight:700;text-align:center}
.ph-vote-no{flex:1;background:transparent;border:1px solid var(--aw-btn-ghost-border,rgba(255,255,255,0.2));color:var(--aw-text,#eef1f7);border-radius:calc(5px * var(--aw-r));padding:5px 0;font-size:8px;text-align:center}

/* Identity card */
.ph-role-big{display:flex;flex-direction:column;align-items:center;padding:8px 6px 6px}
.ph-role-img-big{width:52px;height:52px;border-radius:calc(50% * var(--aw-r,1));overflow:hidden;border:2px solid var(--aw-accent,#d9b36b);margin-bottom:5px;background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ph-faction-tag{padding:2px 8px;border-radius:calc(999px * var(--aw-r));font-size:6.5px;margin-bottom:7px}
.ph-role-desc{font-size:6.5px;color:var(--aw-subtext,#aeb6c7);line-height:1.6;text-align:center;max-width:220px;margin-bottom:6px}

/* Known players list */
.ph-known-list{display:flex;flex-direction:column;gap:3px}
.ph-known-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:calc(4px * var(--aw-r));background:var(--aw-input-bg,rgba(255,255,255,.06));border:1px solid var(--aw-input-border,rgba(255,255,255,.14))}
.ph-known-av{width:18px;height:18px;border-radius:calc(50% * var(--aw-r,1));background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.ph-known-badge{min-width:14px;height:14px;padding:0 3px;border-radius:calc(999px * var(--aw-r));display:flex;align-items:center;justify-content:center;background:rgba(236,196,118,0.96);color:#20160d;font-size:6px;font-weight:700;line-height:1;margin-left:auto;flex-shrink:0}
.ph-known-role{padding:1px 5px;border-radius:calc(999px * var(--aw-r));font-size:6px}
.ph-known-role.evil{background:rgba(110,12,12,0.5);border:1px solid rgba(220,60,60,0.4);color:#fca5a5}
.ph-known-role.good{background:rgba(7,50,120,0.4);border:1px solid rgba(78,158,255,0.4);color:#bfdbfe}

/* ── Panel header (gold left-border + gradient) used across stats/history ── */
.ph-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-left:2px solid #d8b06b;background:linear-gradient(90deg,rgba(216,176,107,0.16),transparent);border-bottom:1px solid rgba(216,176,107,0.10);margin-bottom:0;border-radius:0}
.ph-panel-title{color:#f2e5c8;font-size:8px;font-weight:700;letter-spacing:1px}
.ph-panel-sub{color:rgba(216,176,107,0.5);font-size:6.5px}

/* ── Mission vote table ── */
.ph-mission-table{width:100%;border-radius:calc(5px * var(--aw-r));overflow:hidden;border:1px solid var(--aw-panel-border,rgba(255,255,255,.08))}
.ph-mt-head{display:grid;background:rgba(255,255,255,0.04);padding:3px 5px;font-size:5.5px;font-weight:700;color:var(--aw-subtext,#aeb6c7);letter-spacing:0.5px}
.ph-mt-row{display:grid;padding:3.5px 5px;border-top:1px solid rgba(255,255,255,0.05);align-items:center}
.ph-mt-row:nth-child(even){background:rgba(255,255,255,0.02)}
.ph-mt-round{font-size:5.5px;font-weight:700;color:var(--aw-subtext,#aeb6c7)}
.ph-mt-team{display:flex;gap:2px;align-items:center}
.ph-mt-av{width:11px;height:11px;border-radius:calc(50% * var(--aw-r,1));background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:6px;border:1px solid rgba(255,255,255,.12)}
.ph-mt-votes{display:flex;gap:2px;align-items:center}
.ph-mt-v{font-size:6px;font-weight:700;min-width:10px;text-align:center}
.ph-mt-v.y{color:#50dc8c}.ph-mt-v.n{color:#ff6b6b}
.ph-mt-result{font-size:6px;font-weight:700;padding:1px 4px;border-radius:calc(999px * var(--aw-r))}
.ph-mt-result.ok{background:rgba(80,220,140,0.15);color:#50dc8c;border:1px solid rgba(80,220,140,0.3)}
.ph-mt-result.ng{background:rgba(220,80,80,0.15);color:#ff6b6b;border:1px solid rgba(220,80,80,0.3)}

/* ── AI speak / chat section ── */
.ph-speak-list{display:flex;flex-direction:column;gap:4px}
.ph-speak-row{display:flex;align-items:flex-start;gap:4px}
.ph-speak-row.me{flex-direction:row-reverse}
.ph-speak-av{width:16px;height:16px;border-radius:calc(50% * var(--aw-r,1));background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;border:1px solid rgba(255,255,255,.12)}
.ph-speak-wrap{display:flex;flex-direction:column;gap:1px;max-width:76%}
.ph-speak-wrap.me{align-items:flex-end}
.ph-speak-nm{font-size:5px;color:var(--aw-subtext,#aeb6c7);margin:0 2px}
.ph-speak-bubble{padding:4px 6px;border-radius:calc(5px * var(--aw-r));font-size:6px;line-height:1.55;color:var(--aw-text,#eef1f7)}
.ph-speak-bubble.other{background:var(--aw-input-bg,rgba(255,255,255,.07));border:1px solid var(--aw-input-border,rgba(255,255,255,.12))}
.ph-speak-bubble.me{background:linear-gradient(135deg,rgba(216,176,107,0.22),rgba(216,176,107,0.12));border:1px solid rgba(216,176,107,0.28);color:#f2e5c8}
.ph-speak-bubble.ai{background:rgba(78,158,255,0.10);border:1px solid rgba(78,158,255,0.22);color:#bfdbfe}

/* ── Stats overview ── */
.ph-ov-nums{display:flex;align-items:center;padding:8px 8px 6px}
.ph-ov-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.ph-ov-num{font-size:20px;font-weight:900;line-height:1;letter-spacing:-1px}
.ph-ov-lbl{font-size:5.5px;color:rgba(255,255,255,0.3);letter-spacing:2px}
.ph-ov-divider{width:1px;height:30px;background:rgba(216,176,107,0.15)}

/* Faction bar */
.ph-faction-wrap{padding:0 7px 8px}
.ph-faction-bar-labels{display:flex;justify-content:space-between;margin-bottom:3px}
.ph-faction-bar-track{height:4px;border-radius:calc(999px * var(--aw-r));background:rgba(255,255,255,0.06);overflow:hidden;display:flex}
.ph-faction-bar-good{height:100%;background:var(--aw-faction-good,linear-gradient(90deg,#2a6ab0,#4e9eff))}
.ph-faction-bar-evil{height:100%;background:var(--aw-faction-evil,linear-gradient(90deg,#c03030,#e05050))}
.ph-faction-cards{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px}
.ph-fc{border-radius:calc(5px * var(--aw-r));padding:5px 6px}
.ph-fc.good{background:rgba(78,158,255,0.07);border:1px solid rgba(78,158,255,0.22)}
.ph-fc.evil{background:rgba(220,60,60,0.07);border:1px solid rgba(220,60,60,0.22)}
.ph-fc-title{display:block;font-size:6.5px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.ph-fc.good .ph-fc-title{color:#7ac7ff}.ph-fc.evil .ph-fc-title{color:#ff8080}
.ph-fc-big{font-size:13px;font-weight:900;line-height:1}
.ph-fc.good .ph-fc-big{color:#4e9eff}.ph-fc.evil .ph-fc-big{color:#e05050}
.ph-fc-small{font-size:5.5px;color:rgba(255,255,255,0.3)}
.ph-fc-rate{display:block;font-size:7px;font-weight:600;margin-top:1px}
.ph-fc.good .ph-fc-rate{color:#6edea8}.ph-fc.evil .ph-fc-rate{color:#ff9898}

/* Role grid */
.ph-role-grid{display:grid;grid-template-columns:1fr 1fr}
.ph-role-cell{padding:7px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border-right:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);position:relative}
.ph-role-cell:nth-child(2n){border-right:none}
.ph-role-cell:nth-last-child(1),.ph-role-cell:nth-last-child(2){border-bottom:none}
.ph-role-cell-topbar{position:absolute;top:0;left:0;right:0;height:1.5px}
.ph-role-cell-topbar.good{background:linear-gradient(90deg,transparent,rgba(78,158,255,0.7) 50%,transparent)}
.ph-role-cell-topbar.evil{background:linear-gradient(90deg,transparent,rgba(220,80,80,0.7) 50%,transparent)}
.ph-gauge{position:relative;width:36px;height:36px;margin-top:3px}
.ph-gauge-ring{position:absolute;top:0;left:0;width:36px;height:36px;border-radius:calc(50% * var(--aw-r,1))}
.ph-gauge-inner{position:absolute;top:4px;left:4px;width:28px;height:28px;border-radius:calc(50% * var(--aw-r,1));background:rgba(14,18,28,0.96);overflow:hidden;display:flex;align-items:center;justify-content:center}
.ph-gauge-inner img{width:100%;height:100%;object-fit:cover;border-radius:calc(50% * var(--aw-r,1))}
.ph-rs-name{font-size:7px;font-weight:700;text-align:center}
.ph-rs-name.good{color:#7ac7ff}.ph-rs-name.evil{color:#ff8a8a}
.ph-rs-games{font-size:5.5px;color:rgba(255,255,255,0.3)}
.ph-rs-rate{font-size:9px;font-weight:900;line-height:1}
.ph-rs-rate.hi{color:#50dc8c}.ph-rs-rate.lo{color:#ff8080}.ph-rs-rate.na{color:rgba(255,255,255,.18);font-size:8px}

/* Skin picker */
.ph-skin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:5px 5px 6px}
.ph-skin-card{border-radius:calc(4px * var(--aw-r));border:1.5px solid rgba(255,255,255,0.1);padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;background:rgba(255,255,255,0.03)}
.ph-skin-card.on{border-color:var(--aw-accent,#d9b36b);background:rgba(217,179,107,0.06)}
.ph-skin-dots{display:flex;gap:2px;align-items:center;justify-content:center;height:12px}
.ph-skin-dot{width:7px;height:7px;border-radius:calc(50% * var(--aw-r,1));border:0.5px solid rgba(255,255,255,0.15)}
.ph-skin-name{font-size:5.5px;color:rgba(220,210,190,0.75);text-align:center}
.ph-skin-check{position:absolute;top:1px;right:2px;font-size:6px;color:var(--aw-accent,#d9b36b)}

/* ── History cards ── */
.ph-hc{position:relative;overflow:hidden;border-radius:calc(8px * var(--aw-r));border:1px solid var(--aw-panel-border,rgba(255,255,255,.08));margin-bottom:6px;background:var(--aw-bg-2,#0c101c);box-shadow:0 2px 8px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.04)}
.ph-hc.win{border-color:rgba(80,220,140,0.28)}
.ph-hc.lose{border-color:rgba(220,80,80,0.25)}
.ph-hc.spec{border-color:rgba(216,176,107,0.28)}
.ph-hc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.ph-hc.win::before{background:linear-gradient(180deg,rgba(80,220,140,0.85),rgba(80,220,140,0.1))}
.ph-hc.lose::before{background:linear-gradient(180deg,rgba(220,80,80,0.85),rgba(220,80,80,0.1))}
.ph-hc.spec::before{background:linear-gradient(180deg,rgba(216,176,107,0.8),rgba(216,176,107,0.1))}
.ph-hc-body{padding:6px 7px 5px 9px;position:relative}
.ph-hc-top{display:flex;align-items:flex-start;gap:5px}
.ph-hc-av{width:28px;height:28px;border-radius:calc(50% * var(--aw-r,1));border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:rgba(20,26,44,0.9);font-size:13px}
.ph-hc-av.good{border-color:#4e9eff;box-shadow:0 0 6px rgba(78,158,255,0.3)}
.ph-hc-av.evil{border-color:#e05050;box-shadow:0 0 6px rgba(220,80,80,0.3)}
.ph-hc-av img{width:100%;height:100%;object-fit:cover;border-radius:calc(50% * var(--aw-r,1))}
.ph-hc-info{flex:1;min-width:0}
.ph-hc-headrow{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:2px}
.ph-hc-rolename{font-size:8px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-hc-rolename.good{color:#7ac7ff}.ph-hc-rolename.evil{color:#ff8a8a}
.ph-hc-badge{display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:calc(999px * var(--aw-r));border:1px solid transparent;flex-shrink:0}
.ph-hc-badge.win{background:rgba(80,220,140,0.12);border-color:rgba(80,220,140,0.35)}
.ph-hc-badge.lose{background:rgba(220,80,80,0.12);border-color:rgba(220,80,80,0.32)}
.ph-hc-badge-dot{width:4px;height:4px;border-radius:calc(50% * var(--aw-r,1))}
.ph-hc-badge.win .ph-hc-badge-dot{background:#50dc8c}
.ph-hc-badge.lose .ph-hc-badge-dot{background:#ff6b6b}
.ph-hc-badge-txt{font-size:6px;font-weight:700;letter-spacing:1px}
.ph-hc-badge.win .ph-hc-badge-txt{color:#50dc8c}
.ph-hc-badge.lose .ph-hc-badge-txt{color:#ff8080}
.ph-hc-meta{display:flex;align-items:center;gap:3px;line-height:1}
.ph-hc-metaitem{font-size:6px;color:rgba(200,210,230,0.42)}
.ph-hc-metasep{width:3px;height:3px;border-radius:calc(50% * var(--aw-r,1));background:rgba(255,255,255,0.18);flex-shrink:0}
.ph-hc-bottom{display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin-top:5px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.055)}
.ph-hc-medal{display:flex;align-items:center;gap:2px;padding:2px 5px;border-radius:calc(999px * var(--aw-r));background:rgba(216,176,107,0.06);border:1px solid rgba(216,176,107,0.16)}
.ph-hc-medal-txt{font-size:5.5px;color:rgba(216,176,107,0.72)}
/* medals in role stats */
.ph-medal-section{padding:6px 8px}
.ph-medal-section+.ph-medal-section{border-top:1px solid rgba(255,255,255,0.06);padding-top:6px}
.ph-medal-section-title{display:block;font-size:7px;font-weight:700;letter-spacing:1px;margin-bottom:5px;padding-left:4px}
.ph-medal-section-title.good{color:#7ac7ff;border-left:2px solid rgba(78,158,255,0.6)}
.ph-medal-section-title.evil{color:#ff8a8a;border-left:2px solid rgba(220,80,80,0.6)}
.ph-medal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.ph-medal-card{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 3px;border-radius:calc(6px * var(--aw-r));background:rgba(216,176,107,0.05);border:1px solid rgba(216,176,107,0.14);text-align:center}
.ph-medal-zero{opacity:0.32}
.ph-medal-name{font-size:5.5px;color:rgba(242,229,200,0.75);line-height:1.3}
.ph-medal-cnt{font-size:8px;font-weight:800;color:#d8b06b}
.ph-hc-time{margin-left:auto;font-size:5.5px;color:rgba(200,210,230,0.3);white-space:nowrap}

/* pagination */
.ph-pagination{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:8px 14px 12px;background:linear-gradient(0deg,rgba(6,8,15,1) 55%,rgba(6,8,15,.6) 80%,transparent);display:flex;align-items:center;justify-content:center;gap:12px}

/* ── Bottom panel toggle (发言/投票/任务) ── */
.ph-panel-toggle{display:flex;gap:1px;padding:3px 8px 3px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;z-index:10}
.ph-toggle-btn{flex:1;text-align:center;padding:3px 0;font-size:6.5px;color:var(--aw-subtext,#aeb6c7);cursor:pointer;border-radius:calc(3px * var(--aw-r));transition:all .1s}
.ph-toggle-btn.active{background:rgba(255,255,255,.09);color:var(--aw-text,#eef1f7);font-weight:700}

/* ── Speak panel (发言) ── */
.ph-spk-card{position:relative;z-index:10;flex-shrink:0;background:var(--aw-panel,rgba(19,23,31,.82));border-top:1px solid var(--aw-nav-border,rgba(255,255,255,.08));padding:6px 8px 18px}
.ph-spk-accent{height:2px;background:linear-gradient(90deg,transparent,var(--aw-accent,#d9b36b) 50%,transparent);margin:-6px -8px 5px}
.ph-spk-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ph-spk-av{width:22px;height:22px;border-radius:calc(50% * var(--aw-r,1));background:rgba(12,10,8,.5);border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;position:relative}
.ph-spk-dot{position:absolute;right:-2px;top:-2px;width:6px;height:6px;border-radius:calc(50% * var(--aw-r,1));background:#4ade80;border:1px solid rgba(0,0,0,.5)}
.ph-spk-info{flex:1;min-width:0}
.ph-spk-nm{font-size:8px;font-weight:700;color:var(--aw-text,#eef1f7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ph-spk-hint{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);margin-top:1px}
.ph-spk-timer{font-size:9px;font-weight:700;color:var(--aw-accent,#d9b36b);flex-shrink:0}
.ph-spk-track{height:3px;background:rgba(255,255,255,.06);border-radius:calc(999px * var(--aw-r));overflow:hidden;margin-bottom:5px}
.ph-spk-fill{height:100%;border-radius:calc(999px * var(--aw-r));background:var(--aw-accent,#d9b36b)}
.ph-spk-divider{width:100%;height:1px;background:var(--aw-input-bg,rgba(255,255,255,.06));margin:4px 0}
.ph-spk-input-row{display:flex;gap:3px;margin-bottom:3px}
.ph-spk-input{flex:1;background:var(--aw-input-bg,rgba(255,255,255,.06));border:1px solid var(--aw-input-border,rgba(255,255,255,.14));border-radius:calc(4px * var(--aw-r));color:var(--aw-subtext,#aeb6c7);font-size:7px;padding:3px 5px}
.ph-spk-send{background:linear-gradient(180deg,#e4c281,#c89b52);color:#1a1510;border-radius:calc(4px * var(--aw-r));padding:3px 8px;font-size:7px;font-weight:700;flex-shrink:0}
.ph-spk-end{width:100%;background:transparent;border:1px solid var(--aw-btn-ghost-border,rgba(255,255,255,.2));color:var(--aw-btn-ghost-text,#eef1f7);border-radius:calc(4px * var(--aw-r));padding:4px;font-size:7px;text-align:center}

/* ── End-game reveal grid ── */
.ph-reveal-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ph-reveal-card{border-radius:calc(5px * var(--aw-r));padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;border:1px solid transparent;position:relative}
.ph-reveal-card.good{background:rgba(7,50,120,.22);border-color:rgba(78,158,255,.32)}
.ph-reveal-card.evil{background:rgba(100,15,15,.28);border-color:rgba(220,60,60,.32)}
.ph-reveal-av{width:26px;height:26px;border-radius:calc(50% * var(--aw-r,1));display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;flex-shrink:0}
.ph-reveal-av.good{border:1.5px solid rgba(78,158,255,.72);box-shadow:0 0 6px rgba(78,158,255,.28);background:rgba(7,40,110,.4)}
.ph-reveal-av.evil{border:1.5px solid rgba(220,60,60,.72);box-shadow:0 0 6px rgba(200,40,40,.28);background:rgba(45,6,6,.8)}
.ph-reveal-av img{width:100%;height:100%;object-fit:cover}
.ph-reveal-nm{font-size:6.5px;font-weight:700;color:var(--aw-text,#eef1f7)}
.ph-reveal-role{font-size:5.5px;padding:1px 5px;border-radius:calc(999px * var(--aw-r))}
.ph-reveal-role.good{background:rgba(7,50,120,.4);border:1px solid rgba(78,158,255,.4);color:#bfdbfe}
.ph-reveal-role.evil{background:rgba(100,15,15,.5);border:1px solid rgba(220,60,60,.4);color:#fca5a5}
.ph-reveal-dead{position:absolute;top:2px;right:3px;font-size:7px;opacity:.65}
/* Result banner */
.ph-end-banner{border-radius:calc(8px * var(--aw-r));padding:8px 10px;text-align:center;margin-bottom:4px}
.ph-end-banner.good-win{background:linear-gradient(135deg,rgba(7,50,120,.55),rgba(12,14,30,.90));border:1px solid rgba(78,158,255,.42)}
.ph-end-banner.evil-win{background:linear-gradient(135deg,rgba(100,15,15,.60),rgba(16,6,6,.92));border:1px solid rgba(220,60,60,.40)}
.ph-end-title{font-size:14px;font-weight:900;letter-spacing:2px;line-height:1.2}
.ph-end-banner.good-win .ph-end-title{color:#7ac7ff;text-shadow:0 0 16px rgba(78,158,255,.6)}
.ph-end-banner.evil-win .ph-end-title{color:#ff8a8a;text-shadow:0 0 16px rgba(220,80,80,.6)}
.ph-end-sub{font-size:6.5px;margin-top:3px;opacity:.55}
.ph-pg-arrow{width:22px;height:22px;border-radius:calc(50% * var(--aw-r,1));background:rgba(255,255,255,0.07);border:1px solid rgba(216,176,107,0.28);color:#d8b06b;font-size:12px;display:flex;align-items:center;justify-content:center}
.ph-pg-indicator{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:22px}
.ph-pg-num{font-size:11px;font-weight:700;line-height:1;color:#d8b06b}
.ph-pg-lbl{font-size:5px;letter-spacing:2px;color:rgba(200,210,230,0.35)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* ─── Mobile ─── */
.mob-nav{display:none}
@media(max-width:768px){
  body{overflow:hidden}
  /* Header: compact, hide subtitle and key input */
  .hd{padding:0 12px;gap:8px}
  .hd-sep,.hd-hint{display:none}
  /* hd-key-wrap 在移动端保留（只是一个按钮），hd-key-btn 隐藏 */
  .hd-key-btn{display:none!important}
  /* Skin tabs: smaller */
  .stab{padding:5px 10px}
  .stab-id{display:none}
  /* Workspace: show one panel at a time via flex column */
  .workspace{
    display:flex;flex-direction:column;
    grid-template-columns:unset;
    overflow:hidden;
  }
  .panel-assets,.panel-prompt,.panel-preview{
    display:none;border:none;flex:1;min-height:0;overflow-y:auto;
    padding-bottom:64px; /* clear fixed mob-nav */
  }
  .panel-assets.mob-active,.panel-prompt.mob-active,.panel-preview.mob-active{
    display:flex;flex-direction:column;
  }
  /* Preview panel: full screen, tabs float as overlay, phone centered */
  .panel-preview.mob-active{
    padding:0;overflow:hidden;position:relative;
    padding-bottom:56px;/* clear mob-nav */
    align-items:center;justify-content:flex-start;
    padding-top:36px;/* clear floating tab bar */
  }
  /* Preview tabs: float at top as translucent overlay */
  .panel-preview .preview-tabs{
    position:absolute;top:0;left:0;right:0;z-index:50;
    width:100%;margin-bottom:0;border-radius:0;
    border:none;border-bottom:1px solid rgba(255,255,255,.08);
    background:rgba(9,11,17,.88);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;justify-content:flex-start;
    padding:5px 8px;
  }
  .panel-preview .preview-tabs::-webkit-scrollbar{display:none}
  .panel-preview .preview-tab{flex:0 0 auto;white-space:nowrap;font-size:11px;padding:5px 14px}
  /* Phone frame: strip chrome, keep natural size for transform-scale */
  /* pointer-events:none prevents scaled hit-area from blocking mob-nav taps */
  .phone-frame{
    border:none!important;border-radius:0!important;
    box-shadow:none!important;
    transform-origin:top center;
    flex-shrink:0;
    pointer-events:none;
  }
  /* Hide helper tip on mobile, float the action buttons */
  #previewHint{display:none}
  #previewBtns{
    position:fixed;bottom:62px;right:12px;z-index:200;
    flex-direction:column;gap:6px;align-items:flex-end;
    margin:0;
  }
  #fsBtn{margin:0;font-size:10px;padding:4px 10px}
  /* Prompt panel: block layout on mobile so overflow-y:auto actually scrolls */
  .panel-prompt.mob-active{display:block;overflow-y:auto;overflow-x:hidden}
  .pp-prompt-area{flex:none;overflow:visible;display:block;min-height:0}
  .pp-prompt-wrap{flex:none;overflow:visible;display:block}
  .pp-top{padding:12px 14px 10px}
  .pp-actions{flex-wrap:wrap;padding:10px 14px;gap:8px}
  .btn{padding:10px 14px;font-size:13px}
  .pp-result-img{max-height:260px}
  .pp-prompt{flex:none;width:100%;min-height:100px;height:auto;resize:vertical;box-sizing:border-box}
  /* Bottom nav */
  .mob-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    height:56px;background:var(--surface);border-top:1px solid var(--border);
  }
  .mob-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;cursor:pointer;color:var(--sub);font-size:10px;transition:color .15s;
    -webkit-tap-highlight-color:transparent;border:none;background:none;
  }
  .mob-nav-btn.active{color:var(--accent)}
  .mob-nav-icon{font-size:11px;font-weight:700;letter-spacing:.5px;line-height:1;opacity:.7}
  /* Atlas grid slightly larger cells on mobile */
  #atlasGrid{gap:8px!important}
  /* Stitch progress text */
  #stitchProgress{padding:0 14px 8px}
  /* Asset panel: restore bottom padding so items aren't hidden behind mob-nav */
  .panel-assets.mob-active{
    padding-bottom:64px;
    -webkit-overflow-scrolling:touch;
    overflow-y:scroll;
  }
  /* Key modal */
  .mob-key-modal{
    display:none;position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.7);align-items:flex-end;
  }
  .mob-key-modal.open{display:flex}
  .mob-key-sheet{
    width:100%;background:var(--surface);border-radius:16px 16px 0 0;
    padding:20px 16px 36px;border-top:1px solid var(--border);
  }
  .mob-key-sheet label{font-size:12px;color:var(--sub);display:block;margin-bottom:8px}
  .mob-key-sheet input{
    width:100%;background:var(--card);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:14px;padding:10px 12px;
    font-family:var(--mono);outline:none;
  }
  .mob-key-close{margin-top:12px;width:100%;padding:12px;border-radius:8px;
    background:var(--accent);color:#1a1200;font-weight:700;font-size:14px;
    border:none;cursor:pointer}
}
@media(min-width:769px){
  .hd-key-btn{display:none!important}
  .mob-key-modal{display:none!important}
}

/* ── Fullscreen preview overlay ──────────────────────────── */
#fsOverlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#000;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
#fsOverlay.open{display:block}
#fsClose{
  position:absolute;top:max(env(safe-area-inset-top,0px),16px);right:16px;
  width:32px;height:32px;border-radius:50%;z-index:10;
  background:rgba(0,0,0,.60);border:1px solid rgba(255,255,255,.20);
  color:#fff;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
  -webkit-tap-highlight-color:transparent;
}
#fsContent{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#fsPhoneScreen{
  width:280px;height:560px;

  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  flex-shrink:0;
}
/* Tap-to-fullscreen zone on phone frame */
#fsTapZone{
  display:none;position:absolute;inset:0;z-index:10;cursor:pointer;
}
/* Fullscreen entry button (desktop) */
#fsBtn{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;padding:5px 12px;border-radius:6px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);

}

  .panel-preview>.preview-tabs{
    flex-shrink:0;width:100%;box-sizing:border-box;
    margin-bottom:0;border-radius:0;

    padding:5px 8px;
  }
  /* Subtabs as submenu row between tabs and phone */

    flex-shrink:0;width:100%;box-sizing:border-box;
    padding:5px 12px;margin-bottom:0;
    border-bottom:1px solid rgba(255,255,255,.07);
    background:rgba(9,11,17,.5);
    justify-content:center;gap:8px;
  }
  .panel-preview>.preview-subtabs .preview-sub{font-size:11px;padding:4px 12px}
  /* Phone wrapper fills remaining space */
  #phoneWrapper{
    flex:1;width:100%;overflow:hidden;min-height:0;
    display:flex;justify-content:center;align-items:flex-start;
  }
  .phone-frame{transform-origin:top center}

/* ── 素材库顶部按钮 ── */
.panel-batch-btn{font-size:11px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--sub);cursor:pointer;transition:all .15s;white-space:nowrap}
.panel-batch-btn:hover{background:rgba(255,255,255,.1);color:var(--text);border-color:var(--border-hi)}
/* ── 统一配置面板 ── */
#settingsOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;justify-content:flex-end;align-items:stretch}

@keyframes spSlideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.sp-section{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.07)}

.sp-input:focus{border-color:rgba(255,255,255,.3)}
/* ── New Skin Wizard ─────────────────────────────────── */
#nwOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:3000;align-items:center;justify-content:center}

.nw-lbl{display:block;font-size:11px;color:#7080a8;margin:12px 0 4px}

.nw-inp{width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#eef1f7;font-size:13px;padding:8px 10px;outline:none;font-family:inherit}
.nw-inp:focus{border-color:rgba(255,255,255,.3)}

.nw-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nw-tone-btn{padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#aeb6c7;font-size:12px;cursor:pointer;text-align:center;transition:all .15s}
.nw-tone-btn.on{border-color:var(--accent);background:rgba(217,179,107,.12);color:#eef1f7;font-weight:600}
.nw-prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.nw-prev-card{border-radius:8px;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);position:relative}
.nw-prev-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.nw-prev-card-lbl{font-size:10px;color:#aeb6c7;padding:4px 6px;text-align:center;background:rgba(0,0,0,.25)}
.nw-spin-box{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:24px;animation:nwspin 1s linear infinite}

.nw-prev-regen{position:absolute;top:4px;right:4px;display:none;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.22);color:#eef1f7;font-size:9px;padding:2px 6px;border-radius:4px;cursor:pointer}

.nw-prog-list{display:flex;flex-direction:column;gap:5px}
.nw-prog-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;background:rgba(255,255,255,.04);font-size:12px;color:#7080a8;transition:all .2s}
.nw-prog-row.run{background:rgba(217,179,107,.08);color:#d9b36b}

.nw-prog-icon{width:16px;text-align:center;flex-shrink:0}
.nw-hint{font-size:11px;color:#7080a8;line-height:1.6}
.nw-ref-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}

/* ── 组件工坊 (Component Workshop) ── */
#cwOverlay{position:fixed;inset:0;z-index:9999;background:#080c14;display:none;flex-direction:column;overflow:hidden}

.cw-hd{display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(255,255,255,.04);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.cw-hd-info{flex:1;min-width:0}
.cw-hd-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cw-hd-sub{font-size:11px;color:var(--sub);margin-top:2px}
.cw-prog{display:flex;gap:5px;align-items:center;flex-shrink:0}
.cw-prog-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s}
.cw-prog-dot.done{background:var(--good)}
.cw-prog-dot.run{background:#60a0f8;animation:cwPulse .7s infinite alternate}
@keyframes cwPulse{from{opacity:.35}to{opacity:1}}
.cw-body{flex:1;min-height:0;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:20px}
.cw-section{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cw-sec-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025)}
.cw-sec-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.cw-sec-count{font-size:11px;color:var(--sub)}
.cw-batch-btn{font-size:10px;padding:3px 10px;background:rgba(96,160,248,.1);border:1px solid rgba(96,160,248,.28);border-radius:4px;color:#60a0f8;cursor:pointer;white-space:nowrap;transition:all .15s}
.cw-batch-btn:hover:not(:disabled){background:rgba(96,160,248,.22)}
.cw-batch-btn:disabled{opacity:.45;cursor:default}
.cw-grid{display:grid;gap:10px;padding:12px}
.cw-grid.scene{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
.cw-grid.roles{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
.cw-grid.icons{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
.cw-card{display:flex;flex-direction:column;gap:5px}
.cw-thumb{width:100%;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;aspect-ratio:1}
.cw-thumb.portrait{aspect-ratio:9/16}
.cw-thumb.landscape{aspect-ratio:16/9}
.cw-thumb img{width:100%;height:100%;object-fit:cover;border-radius:5px}
.cw-thumb-ph{font-size:24px;opacity:.2}
.cw-card-name{font-size:10px;color:var(--sub);text-align:center;line-height:1.3}
.cw-gen-btn{font-size:10px;padding:3px 0;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:4px;color:var(--sub);cursor:pointer;transition:all .15s;text-align:center;width:100%}
.cw-gen-btn:hover:not(:disabled){background:rgba(255,255,255,.12);color:var(--text)}
.cw-gen-btn.running{color:#60a0f8;border-color:rgba(96,160,248,.4);pointer-events:none}
.cw-gen-btn.done{color:var(--good);border-color:rgba(110,222,168,.3)}
.cw-finish-btn{padding:7px 18px;background:linear-gradient(135deg,var(--accent),var(--accent));border:none;border-radius:7px;color:var(--accent-text,#fff);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;white-space:nowrap}
.cw-finish-btn:hover{filter:brightness(1.12)}
/* 配置区 */
.cw-cfg{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;flex-shrink:0;background:rgba(255,255,255,.02)}
.cw-cfg-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.cw-cfg-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.cw-cfg-lbl{font-size:10px;color:var(--sub);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.cw-cfg-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px 9px;outline:none;width:100%;box-sizing:border-box;resize:none;font-family:inherit}
.cw-cfg-input:focus{border-color:rgba(217,179,107,.5);background:rgba(255,255,255,.07)}
.cw-tone-btn{font-size:11px;padding:4px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;color:var(--sub);cursor:pointer;transition:all .15s}
.cw-tone-btn.active{background:rgba(217,179,107,.15);border-color:rgba(217,179,107,.5);color:var(--accent)}
/* 组件卡片 */
.cwc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:12px}
.cwc-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.cwc-preview{flex:0 0 auto}
.cwc-footer{display:flex;align-items:center;gap:6px;padding:6px 8px;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap;min-height:34px}
.cwc-name{font-size:11px;color:var(--sub);flex:1;white-space:nowrap}
.cwc-btns{display:flex;flex-wrap:wrap;gap:4px}
.cwc-gen-btn{font-size:10px;padding:2px 8px;background:rgba(96,160,248,.1);border:1px solid rgba(96,160,248,.28);border-radius:4px;color:#60a0f8;cursor:pointer;white-space:nowrap;transition:all .15s}
.cwc-gen-btn:hover:not(:disabled){background:rgba(96,160,248,.2)}
.cwc-gen-btn.done{color:var(--good);border-color:rgba(110,222,168,.3);background:rgba(110,222,168,.05)}
.cwc-gen-btn.running{opacity:.6;pointer-events:none}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-dot"></div>
  <span class="hd-title">AVALON · SKIN STUDIO</span>

  <div class="hd-key-wrap">
    <button onclick="openSettings()" title="API Key / 皮肤管理"
      style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:12px;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:all .15s"
      onmouseover="this.style.background='rgba(255,255,255,.12)';this.style.color='var(--text)'"
      onmouseout="this.style.background='rgba(255,255,255,.06)';this.style.color='var(--sub)'">

    <!-- 隐藏 input 供全局 JS 引用 -->
    <input id="apiKey" type="password" style="display:none" oninput="onKeyInput()">
    <span id="modelBadge" style="display:none"></span>
  </div>
  <!-- Mobile: compact settings button -->
  <button class="hd-key-btn" style="display:none;margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:11px;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:5px" onclick="openSettings()">
    ⚙ 配置
  </button>
</div>
<!-- Batch generation full-screen view (populated dynamically) -->
<div id="batchView" style="display:none"></div>


<!-- Mobile bottom nav -->
<div class="mob-nav" id="mobNav">
  <button class="mob-nav-btn" id="mobTabAssets" onclick="switchMobilePanel('assets')">
    <span class="mob-nav-icon">选图</span>素材库

  <button class="mob-nav-btn active" id="mobTabPreview" onclick="switchMobilePanel('preview')">

    <input type="password" id="mobApiKey" placeholder="sk-..." oninput="onMobKeyInput()">
    <button class="mob-key-close" onclick="document.getElementById('mobKeyModal').classList.remove('open')">完成</button>
  </div>

<div class="skin-tabs" id="skinTabs"></div>

<div class="workspace">
  <!-- ── Left: Asset list ── -->
  <div class="panel-assets" id="assetPanel"></div>

  <!-- ── Middle: Prompt + Generate ── -->
  <div class="panel-prompt" id="promptPanel">

      <div class="pp-asset-label" id="ppLabel" style="display:flex;align-items:center;justify-content:space-between;gap:8px">

      </div>
    </div>
    <!-- Atlas grid view (shown when atlas parent selected) -->
    <div id="atlasView" style="display:none;padding:12px 14px 4px;flex:1;overflow-y:auto;min-height:0">

      <div id="atlasGrid" style="display:grid;gap:6px"></div>
    </div>

<!-- ── 统一配置面板 ── -->
<div id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div id="settingsPanel" style="background:#171a21;border-left:1px solid rgba(255,255,255,.1);width:380px;max-width:95vw;display:flex;flex-direction:column;overflow:hidden;animation:spSlideIn .18s ease">

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px" id="modelBtns">
          <button onclick="setModel('doubao')" id="modelBtn-doubao"
            style="flex:1;padding:7px 0;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--sub);transition:all .15s">
            豆包 Seedream
          </button>
          <button onclick="setModel('gemini')" id="modelBtn-gemini"
            style="flex:1;padding:7px 0;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--sub);transition:all .15s">
            Gemini Imagen 4
          </button>
          <button onclick="setModel('dalle')" id="modelBtn-dalle"
            style="flex:1;padding:7px 0;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--sub);transition:all .15s">
            DALL·E 3
          </button>
        </div>
        <input id="spApiKey" type="password" placeholder="当前模型的 API Key"
          class="sp-input" oninput="onSpKeyInput()"
          style="width:100%;font-family:var(--mono);box-sizing:border-box">
      </div>

      <!-- Section: 皮肤列表 -->
      <div class="sp-section">
        <div class="sp-section-title">皮肤列表</div>
        <div style="font-size:11px;color:#7080a8;margin-bottom:10px">开启的皮肤显示在顶部标签栏中</div>
        <div id="spSkinList"></div>
        <button onclick="closeSettings();openNewSkin()"
          style="margin-top:12px;width:100%;padding:9px;background:rgba(217,179,107,.10);border:1px dashed rgba(217,179,107,.40);border-radius:8px;color:#d9b36b;font-size:12px;cursor:pointer;font-weight:500;transition:background .15s"
          onmouseover="this.style.background='rgba(217,179,107,.18)'"
          onmouseout="this.style.background='rgba(217,179,107,.10)'">+ 新建皮肤</button>
      </div>

    </div>
    <!-- 固定底部保存按钮 -->
    <div style="flex-shrink:0;padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);background:#171a21">
      <button onclick="saveSettings()" style="width:100%;padding:11px;background:rgba(217,179,107,.15);border:1px solid rgba(217,179,107,.45);border-radius:8px;color:#d9b36b;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s"
        onmouseover="this.style.background='rgba(217,179,107,.25)'"
        onmouseout="this.style.background='rgba(217,179,107,.15)'">保存</button>
    </div>
  </div>
</div>

<!-- ── 新建皮肤向导 ── -->
<div id="nwOverlay" onclick="if(event.target===this)closeNewSkin()">
  <div class="nw-modal">
    <div class="nw-hd">
      <span class="nw-title" id="nwTitle">新建皮肤</span>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="nw-dots" id="nwDots"></div>
        <button onclick="closeNewSkin()" style="background:none;border:none;color:#aeb6c7;font-size:18px;cursor:pointer;padding:0 4px">✕</button>
      </div>
    </div>
    <div class="nw-body" id="nwBody"></div>
    <div class="nw-ft" id="nwFt"></div>
  </div>
</div>
<input type="file" id="nwRefInput" accept="image/*" multiple style="display:none" onchange="nwHandleRefUpload(event)">

<!-- ── 组件工坊 ── -->
<div id="cwOverlay">
  <div class="cw-hd">
    <div class="cw-hd-info">
      <div class="cw-hd-title">新建皮肤 · 组件工坊</div>
      <div class="cw-hd-sub" id="cwSub">配置皮肤信息，逐组生成组件</div>
    </div>
    <div class="cw-prog" id="cwProg"></div>
    <button class="cw-finish-btn" onclick="cwFinish()">完成皮肤 ✓</button>
    <button onclick="cwClose()" style="background:none;border:none;color:#aeb6c7;font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0">✕</button>
  </div>
  <!-- 皮肤配置区 -->
  <div class="cw-cfg" id="cwCfg">
    <div class="cw-cfg-row">
      <div class="cw-cfg-field">
        <label class="cw-cfg-lbl">皮肤名称</label>
        <input class="cw-cfg-input" id="cwName" placeholder="如：星空幻境" oninput="cwAutoId()">
      </div>
      <div class="cw-cfg-field">
        <label class="cw-cfg-lbl">皮肤 ID</label>
        <input class="cw-cfg-input" id="cwId" placeholder="如：starry-dream" style="font-family:var(--mono)">
      </div>
      <div class="cw-cfg-field" style="flex:0 0 auto">
        <label class="cw-cfg-lbl">强调色</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="color" id="cwAccent" value="#d9b36b" style="width:34px;height:34px;border:none;border-radius:6px;cursor:pointer;background:none;padding:0">
          <span id="cwAccentHex" style="font-size:11px;color:var(--sub);font-family:var(--mono)">#d9b36b</span>
        </div>
      </div>
      <div class="cw-cfg-field" style="flex:0 0 auto">
        <label class="cw-cfg-lbl">基调</label>
        <div style="display:flex;gap:6px">
          <button class="cw-tone-btn active" id="cwToneDark" onclick="cwSetTone(true)">深色</button>
          <button class="cw-tone-btn" id="cwToneLight" onclick="cwSetTone(false)">浅色</button>
        </div>
      </div>
    </div>
    <div class="cw-cfg-field" style="width:100%">
      <label class="cw-cfg-lbl">风格描述 <span style="color:var(--sub);font-weight:400">（AI 根据此生成所有组件）</span></label>
      <textarea class="cw-cfg-input" id="cwStyle" rows="2"
        placeholder="如：dark gothic dungeon, pen-and-ink etching on aged parchment, Inscryption inspired, amber candlelight, near-black background"></textarea>
    </div>
  </div>
  <div class="cw-body" id="cwBody"></div>
</div>

<!-- ── Fullscreen preview overlay ── -->
<div id="fsOverlay">
  <button id="fsClose" onclick="exitFullscreen();event.stopPropagation()">✕</button>
  <div id="fsContent">
    <div id="fsPhoneScreen"></div>
  </div>
</div>

function getRoleSlotPrompt(skinId, slotId) {
  const style = ROLE_SLOT_STYLE[skinId] || ROLE_SLOT_STYLE['dark-gold'];
  const charMap = skinId === 'celestial' ? ROLE_CHAR_DESC_CELESTIAL : ROLE_CHAR_DESC;
  const char  = charMap[slotId] || ROLE_CHAR_DESC[slotId] || slotId;
  return `${style} ${char}`;
}

function getMedalSlotPrompt(skinId, slotId, slotName) {
  const atlasPrompt = PROMPTS[skinId]?.['medals-atlas'] || '';
  // Extract style header (before Row 1)
  const styleEnd = atlasPrompt.indexOf('Row 1:');
  const styleHeader = styleEnd > 0 ? atlasPrompt.slice(0, styleEnd).trim() : atlasPrompt.slice(0, 200);
  // Extract this icon's description from the atlas prompt
  const nameMatch = atlasPrompt.match(new RegExp(`\\[([^\\]]*${slotName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}[^\\]]*)\\]`,'i'));
  const iconDesc = nameMatch ? nameMatch[1] : slotName;
  return `Single icon only. ${styleHeader} Single icon cell: [${iconDesc}]. Square 1:1, icon centered with even margins, no other icons, no grid, no text.`;
}

function loadSkinActive() {
  try { return JSON.parse(localStorage.getItem('skinActive') || 'null') || {}; } catch { return {}; }
}
function saveSkinActive(map) {
  localStorage.setItem('skinActive', JSON.stringify(map));
  // 异步同步到服务器（不阻塞 UI）
  fetch('/api/studio-settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ skinActive: map })
  }).catch(() => {});
}
async function syncSettingsFromServer() {
  try {
    const res = await fetch('/api/studio-settings');
    if (!res.ok) return;
    const data = await res.json();
    if (data.skinActive && typeof data.skinActive === 'object') {
      // 服务器数据覆盖本地（服务器为主）
      skinActive = data.skinActive;
      localStorage.setItem('skinActive', JSON.stringify(skinActive));
      renderSkinTabs();
      renderSpSkinList();
    }
  } catch {}
}
let skinActive = loadSkinActive();

  skinActive[id] = v;

}
