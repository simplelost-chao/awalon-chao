<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Avalon · Skin Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b11;--surface:#10131c;--card:#161b28;--border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --text:#e8eaf0;--sub:#7a8aa0;--muted:#3a4555;
  --good:#4ade80;--evil:#f87171;--accent:#d9b36b;
  --r:10px;--font:-apple-system,'PingFang SC',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─── */
.hd{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0}
.hd-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text)}
.hd-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
.hd-sep{width:1px;height:20px;background:var(--border)}
.hd-key-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.hd-key-label{font-size:11px;color:var(--sub)}
.hd-key{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--mono);padding:5px 10px;width:260px;outline:none}
.hd-key:focus{border-color:var(--border-hi)}
.hd-key::placeholder{color:var(--muted)}
.hd-key-status{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.hd-key-status.ok{background:var(--good);box-shadow:0 0 6px var(--good)}

/* ─── Skin tabs ─── */
.skin-tabs{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:2px;padding:0 12px;flex-shrink:0;overflow-x:auto}
.skin-tabs::-webkit-scrollbar{display:none}
.stab{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:7px;border:1px solid transparent;cursor:pointer;white-space:nowrap;background:none;transition:all .15s}
.stab:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.stab.active{background:rgba(255,255,255,.07);border-color:var(--border-hi)}
.stab-chip{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.stab-name{font-size:12px;font-weight:600;color:var(--text)}
.stab-id{font-size:10px;color:var(--sub);font-family:var(--mono)}

/* ─── Workspace ─── */
.workspace{flex:1;display:grid;grid-template-columns:230px 1fr 360px;overflow:hidden}

/* ─── Assets Panel ─── */
.panel-assets{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
.panel-assets::-webkit-scrollbar{width:4px}
.panel-assets::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.asset-cat{padding:10px 12px 6px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.asset-item{display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.asset-item:hover{background:rgba(255,255,255,.03)}
.asset-item.active{background:rgba(255,255,255,.06);border-left-color:var(--accent)}
.asset-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--card);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.asset-thumb img{width:100%;height:100%;object-fit:cover}
.asset-thumb.portrait{height:48px}
.asset-info{min-width:0}
.asset-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset-file{font-size:10px;color:var(--sub);font-family:var(--mono)}
.asset-badge{width:8px;height:8px;border-radius:50%;background:var(--good);flex-shrink:0;margin-left:auto;box-shadow:0 0 5px var(--good)}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ─── Prompt Panel ─── */
.panel-prompt{display:flex;flex-direction:column;overflow:hidden;padding:0}
.pp-top{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.pp-asset-label{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pp-asset-name{font-size:15px;font-weight:700}
.pp-spec{font-size:11px;color:var(--sub);font-family:var(--mono);padding:2px 8px;background:rgba(255,255,255,.05);border-radius:4px;border:1px solid var(--border)}
.pp-prompt-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.pp-prompt{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:var(--mono);line-height:1.65;padding:14px;resize:none;outline:none;min-height:0}
.pp-prompt:focus{border-color:var(--border-hi)}
.pp-actions{display:flex;gap:8px;padding:12px 20px;flex-shrink:0;border-top:1px solid var(--border)}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all .15s;font-family:var(--font);display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#1a1200;border-color:var(--accent);font-weight:700}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-good{background:rgba(74,222,128,.12);color:var(--good);border-color:rgba(74,222,128,.3)}
.btn-good:hover{background:rgba(74,222,128,.18)}
.pp-result{flex-shrink:0;padding:0 20px 12px}
.pp-result-img{width:100%;max-height:200px;border-radius:var(--r);object-fit:contain;background:var(--card);border:1px solid var(--border);display:none}
.pp-result-img.visible{display:block}
.pp-loading{display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100px;color:var(--sub);font-size:12px}
.pp-loading.visible{display:flex}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pp-prompt-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:12px 20px;gap:10px;min-height:0}

/* ─── Phone Preview Panel ─── */
.panel-preview{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;padding:16px 12px;overflow-y:auto}
.panel-preview::-webkit-scrollbar{width:4px}
.panel-preview::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08)}
.preview-tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--card);padding:3px;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.preview-tab{padding:5px 8px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--sub);transition:all .15s;white-space:nowrap;flex:1;text-align:center}
.preview-tab.active{background:rgba(255,255,255,.08);color:var(--text)}

/* ─── Phone Frame ─── */
.phone-frame{width:280px;height:560px;border-radius:36px;border:8px solid #1a1e2a;box-shadow:0 0 0 1px rgba(255,255,255,.06),0 20px 60px rgba(0,0,0,.6);overflow:hidden;position:relative;flex-shrink:0}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ph-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.ph-bg-color{position:absolute;inset:0;z-index:0}
.ph-mask{position:absolute;inset:0;z-index:1;pointer-events:none}

/* ─── Phone UI: high-fidelity recreation ─── */

/* Nav bar  (44px real → ~28px preview, scale 0.65) */
.ph-nav{position:relative;z-index:10;height:28px;flex-shrink:0;display:flex;align-items:center;padding:0 8px;background:var(--aw-nav-bg,rgba(12,16,24,.88));border-bottom:1px solid var(--aw-nav-border,rgba(255,255,255,.08))}
.ph-nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--aw-text,#eef1f7);letter-spacing:2px;white-space:nowrap}
.ph-nav-back{font-size:8px;color:var(--aw-text,#eef1f7);padding:2px 5px;border-radius:999px;border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:var(--aw-input-bg,rgba(255,255,255,.06));display:flex;align-items:center;gap:2px;flex-shrink:0;white-space:nowrap}

/* Scrollable content */
.ph-content{position:relative;z-index:2;flex:1;overflow-y:auto;padding:6px 7px 8px;display:flex;flex-direction:column;gap:5px}
.ph-content::-webkit-scrollbar{display:none}

/* Panel card */
.ph-panel{background:var(--aw-panel,rgba(19,23,31,.82));border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));border-radius:7px;padding:7px}

/* User header row (left accent border) */
.ph-user-row{display:flex;align-items:center;gap:5px;padding:4px 5px;border-left:2px solid var(--aw-accent,#d9b36b);border-radius:3px;background:linear-gradient(90deg,rgba(216,176,107,0.14),transparent);margin-bottom:5px}
.ph-av{width:22px;height:22px;border-radius:50%;background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15)}
.ph-logout{margin-left:auto;font-size:6px;color:rgba(106,122,154,0.9);padding:1px 5px;border:1px solid rgba(106,122,154,0.3);border-radius:999px}

/* 3-button action grid */
.ph-act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:5px}
.ph-act-btn{background:transparent;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:2px}

/* Player count pills */
.ph-count-row{display:flex;gap:2px;margin-bottom:5px;overflow:hidden}
.ph-cnt{flex:1;padding:2px 0;border-radius:3px;font-size:6px;text-align:center;background:rgba(0,0,0,0.16);border:1px solid rgba(255,255,255,0.12);color:var(--aw-subtext,#aeb6c7);white-space:nowrap}
.ph-cnt.on{background:rgba(216,176,107,0.18);border-color:rgba(216,176,107,0.55);color:var(--aw-accent,#d9b36b);font-weight:700}

/* Role chips */
.ph-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.ph-rchip{padding:2px 5px;border-radius:999px;font-size:6.5px;display:flex;align-items:center;gap:2px;line-height:1.3}
.good-chip{background:rgba(7,50,120,0.35);border:1px solid rgba(78,158,255,0.45);color:#bfdbfe}
.evil-chip{background:rgba(110,12,12,0.50);border:1px solid rgba(220,60,60,0.45);color:#fca5a5}
.spec-chip{background:rgba(88,28,135,0.35);border:1px solid rgba(192,132,252,0.4);color:#d4aaff}

/* CTA buttons */
.ph-btn-row{display:flex;gap:4px}
.ph-btn-p{flex:1;padding:6px 0;border-radius:6px;font-size:8px;font-weight:700;text-align:center;background:linear-gradient(180deg,#e4c281,#c89b52);color:#1a1510}
.ph-btn-g{flex:1;padding:6px 0;border-radius:6px;font-size:8px;text-align:center;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--aw-text,#eef1f7)}

/* ── Round table (fills full width, square aspect via padding-bottom:100%) */
.ph-table-area{position:relative;width:100%;padding-bottom:90%;margin-bottom:2px;flex-shrink:0}
.ph-table-inner{position:absolute;inset:0}
.ph-table-circle-bg{position:absolute;width:55%;height:55%;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;overflow:hidden;opacity:0.38;pointer-events:none}
.ph-table-circle-bg img{width:100%;height:100%;object-fit:cover}
/* Seats positioned by % (same formula as production: cx=50,cy=50,r=39) */
.ph-seat{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;width:30px}
.ph-seat-av{width:22px;height:22px;border-radius:50%;position:relative;background:rgba(15,11,8,0.55);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px}
.ph-seat-no{position:absolute;right:-4px;bottom:-2px;min-width:11px;height:11px;padding:0 2px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:5.5px;font-weight:700;color:#e6c17d;background:rgba(10,8,20,0.95);border:1px solid rgba(180,140,60,0.42);z-index:5;line-height:1;box-sizing:border-box}
.ph-seat-name{font-size:5.5px;color:#d0d8e8;text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;max-width:30px}
.ph-crown{font-size:7px;line-height:1;margin-bottom:1px}
/* faction glow */
.ph-seat.good .ph-seat-av{border-color:rgba(78,158,255,0.85);box-shadow:0 0 6px rgba(78,158,255,0.45);background:rgba(7,50,120,0.35)}
.ph-seat.evil .ph-seat-av{border-color:rgba(220,60,60,0.8);box-shadow:0 0 5px rgba(200,40,40,0.38);background:rgba(35,6,6,0.92)}
.ph-seat.me .ph-seat-av{border-color:rgba(233,191,112,0.95)!important;box-shadow:0 0 0 2px rgba(233,191,112,0.22)!important}

/* Section chip label */
.ph-sec-chip{display:inline-flex;align-items:center;font-size:7px;font-weight:700;color:var(--aw-subtext,#aeb6c7);letter-spacing:1px;margin-bottom:3px;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid var(--aw-panel-border,rgba(255,255,255,.08))}

/* Mission pills */
.ph-pills-row{display:flex;gap:3px}
.ph-pill{flex:1;min-height:38px;border-radius:5px;border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:rgba(0,0,0,0.22);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 1px;gap:1px}
.ph-pill.success{background:rgba(60,160,100,0.18);border-color:rgba(100,220,150,0.55)}
.ph-pill.fail{background:rgba(160,40,40,0.18);border-color:rgba(230,90,90,0.55)}
.ph-pill.current{background:rgba(190,145,60,0.18);border-color:rgba(220,180,90,0.7)}
.ph-pill.future{opacity:0.6}
.ph-pill-icon{font-size:9px;font-weight:bold;line-height:1}
.ph-pill.success .ph-pill-icon{color:#72e0a0}
.ph-pill.fail .ph-pill-icon{color:#f07070}
.ph-pill-lbl{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);line-height:1}
.ph-pill-curnum{font-size:13px;font-weight:700;color:#f0e0a0;line-height:1}

/* Bottom action panel — fixed to bottom of phone */
.ph-action-panel{position:relative;z-index:10;flex-shrink:0;background:var(--aw-panel,rgba(19,23,31,.82));border-top:1px solid var(--aw-nav-border,rgba(255,255,255,.08));padding:7px 8px 9px}
.ph-vote-title{font-size:7px;color:var(--aw-subtext,#aeb6c7);text-align:center;margin-bottom:5px}
.ph-vote-team{display:flex;gap:14px;justify-content:center;margin-bottom:5px}
.ph-vote-av{width:22px;height:22px;border-radius:50%;background:rgba(12,10,8,0.5);border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));display:flex;align-items:center;justify-content:center;font-size:11px}
.ph-vote-name{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);text-align:center;margin-top:2px}
.ph-vote-divider{width:100%;height:1px;background:var(--aw-input-bg,rgba(255,255,255,.06));margin:4px 0}
.ph-vote-btns{display:flex;gap:3px}
.ph-vote-yes{flex:1;background:linear-gradient(180deg,#e4c281,#c89b52);color:#1a1510;border-radius:5px;padding:5px 0;font-size:8px;font-weight:700;text-align:center}
.ph-vote-no{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--aw-text,#eef1f7);border-radius:5px;padding:5px 0;font-size:8px;text-align:center}

/* Identity card */
.ph-role-big{display:flex;flex-direction:column;align-items:center;padding:8px 6px 6px}
.ph-role-img-big{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid var(--aw-accent,#d9b36b);margin-bottom:5px;background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ph-faction-tag{padding:2px 8px;border-radius:999px;font-size:6.5px;margin-bottom:7px}
.ph-role-desc{font-size:6.5px;color:var(--aw-subtext,#aeb6c7);line-height:1.6;text-align:center;max-width:220px;margin-bottom:6px}

/* Known players list */
.ph-known-list{display:flex;flex-direction:column;gap:3px}
.ph-known-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:4px;background:var(--aw-input-bg,rgba(255,255,255,.06));border:1px solid var(--aw-input-border,rgba(255,255,255,.14))}
.ph-known-av{width:18px;height:18px;border-radius:50%;background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.ph-known-badge{min-width:14px;height:14px;padding:0 3px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(236,196,118,0.96);color:#20160d;font-size:6px;font-weight:700;line-height:1;margin-left:auto;flex-shrink:0}
.ph-known-role{padding:1px 5px;border-radius:999px;font-size:6px}
.ph-known-role.evil{background:rgba(110,12,12,0.5);border:1px solid rgba(220,60,60,0.4);color:#fca5a5}
.ph-known-role.good{background:rgba(7,50,120,0.4);border:1px solid rgba(78,158,255,0.4);color:#bfdbfe}

/* ── Panel header (gold left-border + gradient) used across stats/history ── */
.ph-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-left:2px solid #d8b06b;background:linear-gradient(90deg,rgba(216,176,107,0.16),transparent);border-bottom:1px solid rgba(216,176,107,0.10);margin-bottom:0;border-radius:0}
.ph-panel-title{color:#f2e5c8;font-size:8px;font-weight:700;letter-spacing:1px}
.ph-panel-sub{color:rgba(216,176,107,0.5);font-size:6.5px}

/* ── Stats overview ── */
.ph-ov-nums{display:flex;align-items:center;padding:8px 8px 6px}
.ph-ov-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.ph-ov-num{font-size:20px;font-weight:900;line-height:1;letter-spacing:-1px}
.ph-ov-lbl{font-size:5.5px;color:rgba(255,255,255,0.3);letter-spacing:2px}
.ph-ov-divider{width:1px;height:30px;background:rgba(216,176,107,0.15)}

/* Faction bar */
.ph-faction-wrap{padding:0 7px 8px}
.ph-faction-bar-labels{display:flex;justify-content:space-between;margin-bottom:3px}
.ph-faction-bar-track{height:4px;border-radius:999px;background:rgba(255,255,255,0.06);overflow:hidden;display:flex}
.ph-faction-bar-good{height:100%;background:linear-gradient(90deg,#2a6ab0,#4e9eff)}
.ph-faction-bar-evil{height:100%;background:linear-gradient(90deg,#c03030,#e05050)}
.ph-faction-cards{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px}
.ph-fc{border-radius:5px;padding:5px 6px}
.ph-fc.good{background:rgba(78,158,255,0.07);border:1px solid rgba(78,158,255,0.22)}
.ph-fc.evil{background:rgba(220,60,60,0.07);border:1px solid rgba(220,60,60,0.22)}
.ph-fc-title{display:block;font-size:6.5px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.ph-fc.good .ph-fc-title{color:#7ac7ff}.ph-fc.evil .ph-fc-title{color:#ff8080}
.ph-fc-big{font-size:13px;font-weight:900;line-height:1}
.ph-fc.good .ph-fc-big{color:#4e9eff}.ph-fc.evil .ph-fc-big{color:#e05050}
.ph-fc-small{font-size:5.5px;color:rgba(255,255,255,0.3)}
.ph-fc-rate{display:block;font-size:7px;font-weight:600;margin-top:1px}
.ph-fc.good .ph-fc-rate{color:#6edea8}.ph-fc.evil .ph-fc-rate{color:#ff9898}

/* Role grid */
.ph-role-grid{display:grid;grid-template-columns:1fr 1fr}
.ph-role-cell{padding:7px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border-right:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);position:relative}
.ph-role-cell:nth-child(2n){border-right:none}
.ph-role-cell:nth-last-child(1),.ph-role-cell:nth-last-child(2){border-bottom:none}
.ph-role-cell-topbar{position:absolute;top:0;left:0;right:0;height:1.5px}
.ph-role-cell-topbar.good{background:linear-gradient(90deg,transparent,rgba(78,158,255,0.7) 50%,transparent)}
.ph-role-cell-topbar.evil{background:linear-gradient(90deg,transparent,rgba(220,80,80,0.7) 50%,transparent)}
.ph-gauge{position:relative;width:36px;height:36px;margin-top:3px}

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let currentSkin = 'dark-gold';
let currentAsset = null;
let generatedAssets = {}; // 'skinId:assetId' -> dataURL
let lastGeneratedUrl = null;
let currentPreviewTab = 'home';

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('openai_key');
  if (saved) { document.getElementById('apiKey').value = saved; updateKeyStatus(); }
  renderSkinTabs();
  renderAssets();
  selectAsset('home-bg');
  renderPreview();
});

function onKeyInput() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) localStorage.setItem('openai_key', k);
  updateKeyStatus();
}
function updateKeyStatus() {
  const k = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('keyStatus');
  el.classList.toggle('ok', k.startsWith('sk-'));
  document.getElementById('btnGenerate').disabled = !currentAsset || !k.startsWith('sk-');
}

// ══════════════════════════════════════════════════════════════
// SKIN TABS
// ══════════════════════════════════════════════════════════════
function renderSkinTabs() {
  const container = document.getElementById('skinTabs');
  container.innerHTML = Object.entries(SKINS).map(([id, s]) => `
    <button class="stab ${id===currentSkin?'active':''}" onclick="selectSkin('${id}')">
      <div class="stab-chip" style="background:${s.chip};border-color:${s.chipBorder}"></div>
      <span class="stab-name">${s.name}</span>
      <span class="stab-id">${id}</span>
    </button>`).join('');
}

function selectSkin(id) {
  currentSkin = id;
  renderSkinTabs();
  renderAssets();
  if (currentAsset) selectAsset(currentAsset);
  renderPreview();
}

// ══════════════════════════════════════════════════════════════
// ASSET LIST
// ══════════════════════════════════════════════════════════════
function getAssetUrl(skinId, asset) {
  const key = `${skinId}:${asset.id}`;
  if (generatedAssets[key]) return generatedAssets[key];
  if (skinId === 'dark-gold') return `${CDN}/${asset.cdnFile || asset.file}`;
  return null;
}

function renderAssets() {
  const container = document.getElementById('assetPanel');
  const cats = [...new Set(ASSETS.map(a => a.cat))];
  container.innerHTML = cats.map(cat => {
    const items = ASSETS.filter(a => a.cat === cat);
    return `<div class="asset-cat">${cat}</div>` + items.map(a => {
      const url = getAssetUrl(currentSkin, a);
      const key = `${currentSkin}:${a.id}`;
      const hasGen = !!generatedAssets[key];
      const thumbContent = url
        ? `<img src="${url}" onerror="this.parentElement.textContent='${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':a.tag==='good'?'⚔️':'🗡️'}'"/>`
        : `<span style="font-size:16px">${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':a.tag==='good'?'⚔️':'🗡️'}</span>`;
      return `<div class="asset-item ${a.id===currentAsset?'active':''}" onclick="selectAsset('${a.id}')">
        <div class="asset-thumb">${thumbContent}</div>
        <div class="asset-info">
          <div class="asset-name">${a.name}</div>
          <div class="asset-file">${a.file.split('/').pop()}</div>
        </div>
        <div class="tag-dot" style="background:${a.tagColor}"></div>
        ${hasGen ? '<div class="asset-badge"></div>' : ''}
      </div>`;
    }).join('');
  }).join('');
}

function selectAsset(id) {
  currentAsset = id;
  const asset = ASSETS.find(a => a.id === id);
  const prompt = PROMPTS[currentSkin]?.[id] || '';

  document.getElementById('ppName').textContent = asset.name;
  document.getElementById('ppSpec').textContent = asset.spec;
  document.getElementById('ppPrompt').value = prompt;

  // Show current generated result if any
  const key = `${currentSkin}:${id}`;
  const resultImg = document.getElementById('ppResultImg');
  if (generatedAssets[key]) {
    resultImg.src = generatedAssets[key];
    resultImg.classList.add('visible');
    lastGeneratedUrl = generatedAssets[key];
    document.getElementById('btnApply').style.display = '';
    document.getElementById('btnDownload').style.display = '';
  } else {
    resultImg.classList.remove('visible');
    lastGeneratedUrl = null;
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnDownload').style.display = 'none';
  }

  const k = document.getElementById('apiKey').value.trim();
  document.getElementById('btnGenerate').disabled = !k.startsWith('sk-');
  renderAssets();
}

// ══════════════════════════════════════════════════════════════
// GENERATION
// ══════════════════════════════════════════════════════════════
async function generate() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || !currentAsset) return;

  const asset = ASSETS.find(a => a.id === currentAsset);
  const prompt = document.getElementById('ppPrompt').value.trim();
  if (!prompt) return;

  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('ppLoading').classList.add('visible');
  document.getElementById('ppResultImg').classList.remove('visible');
  document.getElementById('btnApply').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';

  try {
    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'dall-e-3',
        prompt,
        n: 1,
        size: asset.dalleSize,
        quality: 'hd',
        response_format: 'b64_json'
      })
    });
    if (!res.ok) {
      const err = await res.json();
      alert('API 错误: ' + (err.error?.message || res.status));
      return;
    }
    const data = await res.json();
    const b64 = data.data[0].b64_json;
    const ext = asset.file.endsWith('.png') ? 'png' : 'jpeg';
    const dataUrl = `data:image/${ext};base64,${b64}`;

    const key2 = `${currentSkin}:${currentAsset}`;
    generatedAssets[key2] = dataUrl;
    lastGeneratedUrl = dataUrl;

    const img = document.getElementById('ppResultImg');
    img.src = dataUrl;
    img.classList.add('visible');
    document.getElementById('btnApply').style.display = '';
    document.getElementById('btnDownload').style.display = '';
    renderAssets();
  } catch(e) {
    alert('请求失败: ' + e.message);
  } finally {
    document.getElementById('ppLoading').classList.remove('visible');
    const k = document.getElementById('apiKey').value.trim();
    document.getElementById('btnGenerate').disabled = !k.startsWith('sk-');
  }
}

function applyToPreview() {
  renderPreview();
}

function downloadResult() {
  if (!lastGeneratedUrl) return;
  const asset = ASSETS.find(a => a.id === currentAsset);
  const a = document.createElement('a');
  a.href = lastGeneratedUrl;
  a.download = `${currentSkin}-${asset.file.split('/').pop()}`;
  a.click();
}

function copyPrompt() {
  const t = document.getElementById('ppPrompt').value;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制 Prompt', 2000);
  });
}

// PHONE PREVIEW
// ══════════════════════════════════════════════════════════════
function setPreviewTab(tab, el) {
  currentPreviewTab = tab;
  document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPreview();
}

function getSkinVar(skinId, v) {
  return SKINS[skinId].vars[v] || '';
}

function getBgUrl(skinId, type) {
  const assetId = type === 'home' ? 'home-bg' : 'in-game-bg';
  return getAssetUrl(skinId, ASSETS.find(a => a.id === assetId));
}

function getTableUrl(skinId) {
  return getAssetUrl(skinId, ASSETS.find(a => a.id === 'table'));
}

function getRoleUrl(skinId, roleId) {
  return getAssetUrl(skinId, ASSETS.find(a => a.id === roleId));
}

function inlineVars(skinId) {
  return Object.entries(SKINS[skinId].vars).map(([k,v]) => `${k}:${v}`).join(';');
}

function renderPreview() {
  const frame = document.getElementById('phoneFrame');
  const skin = SKINS[currentSkin];
  const vars = inlineVars(currentSkin);
  const isDark = skin.isDark;

  // Resolve background image: prefer generated → CDN (dark-gold) → CSS color
  function bgLayer(type) {
    const id = type === 'home' ? 'home-bg' : 'in-game-bg';
    const gen = generatedAssets[`${currentSkin}:${id}`];
    const cdn = currentSkin === 'dark-gold'
      ? (type === 'home' ? 'https://www.awalon.top/mp-assets/home-bg-optimized.jpg' : 'https://www.awalon.top/mp-assets/in-game-bg-optimized.jpg')
      : null;
    const url = gen || cdn;
    if (url) return `<img src="${url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0" onerror="this.style.display='none'">`;
    return `<div style="position:absolute;inset:0;z-index:0;background:${skin.vars['--aw-bg']||'#090b11'}"></div>`;
  }

  // Dark overlay mask (matches production: rgba(10,12,18) gradient)
  const maskDiv = isDark
    ? `<div style="position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(10,12,18,.58) 0%,rgba(10,12,18,.86) 100%)"></div>`
    : '';

  function tableImgUrl() {
    return generatedAssets[`${currentSkin}:table`] || (currentSkin === 'dark-gold' ? 'https://www.awalon.top/mp-assets/table.png' : null);
  }

      ? [{e:'🌙',nm:'月影',seat:4,role:'莫德雷德'},{e:'⚡',nm:'雷鸣',seat:6,role:'爪牙'}]
      : [{e:'🌙',nm:'月影',seat:4},{e:'⚡',nm:'雷鸣',seat:6}];
    const knownHtml = knownPlayers.map(p => `
      <div class="ph-known-row">
        <div class="ph-known-av">${p.e}</div>
        <span style="font-size:7px;color:var(--aw-text)">${p.nm}</span>
        ${p.role ? `<span class="ph-known-role evil">${p.role}</span>` : ''}
        <span class="ph-known-badge">${p.seat}</span>
      </div>`).join('');

    frame.innerHTML = `
    <div class="phone-screen" style="${vars};position:relative;display:flex;flex-direction:column">
      ${bgLayer('game')}${maskDiv}
      <div class="ph-nav">
        <div class="ph-nav-back">← 返回</div>
        <div class="ph-nav-title">1234 号房</div>
      </div>
      <div class="ph-content">
        <div style="display:flex;gap:3px">
          <div style="flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:4px 0;font-size:7px;text-align:center;color:var(--aw-text)">房间 1234 ▼</div>
          <div style="flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:4px 0;font-size:7px;text-align:center;color:var(--aw-text)">收起身份 ▲</div>
        </div>
        <div class="ph-panel">
          <div style="font-size:7px;font-weight:700;color:var(--aw-subtext);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">身份卡</div>
          <div class="ph-role-big">
            <div class="ph-role-img-big" style="border-color:${nameClr}">${rImgHtml}</div>
            <div style="font-size:13px;font-weight:700;color:${nameClr};margin-bottom:3px">${roleAsset.name}</div>
            <div class="ph-faction-tag" style="background:${fBg};border:1px solid ${fBdr};color:${fClr}">${fTxt}</div>
            <div class="ph-role-desc">${desc}</div>
          </div>
          <div style="border-top:1px solid var(--aw-panel-border);padding-top:6px">
            <div style="font-size:7px;font-weight:600;color:var(--aw-subtext);margin-bottom:4px">${isEvil?'你知道的邪恶队友：':'你知道的邪恶身份：'}</div>
            <div class="ph-known-list">${knownHtml}</div>
          </div>
        </div>
      </div>
    </div>`;
  }
}
</script>
</body>
</html>
