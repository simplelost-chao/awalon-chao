}
function nwStep1Ft() {
  return `<button class="btn btn-ghost" onclick="closeNewSkin()">取消</button>
    <button class="btn btn-primary" onclick="nwGoStep2()">生成预览 →</button>`;
}
function nwAutoId() {
  if (nwState.skinId) return;
  // simple slug from name
  const id = nwState.skinName.toLowerCase()
    .replace(/[\u4e00-\u9fa5]/g, c => '')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,20)
    || ('skin-' + Date.now().toString(36).slice(-4));
  nwState.skinId = id;
  const el = document.getElementById('nwId');
  if (el) el.value = id;
}
function nwHandleRefUpload(e) {
  const files = [...e.target.files];
  e.target.value = '';
  let pending = files.length;
  if (!pending) return;
  files.forEach(f => {
    const fr = new FileReader();
    fr.onload = ev => {
      nwState.refImages.push(ev.target.result);
      if (--pending === 0) {
        // 所有文件读完后一次性重渲染参考图条带
        const strip = document.getElementById('nwRefStrip');
        if (strip) strip.innerHTML =
          nwState.refImages.map((url,i) => `<img class="nw-ref-thumb" src="${url}" title="点击删除" onclick="nwRemoveRef(${i})">`).join('')
          + `<div class="nw-ref-add" onclick="document.getElementById('nwRefInput').click()">+</div>`;
      }
    };
    fr.readAsDataURL(f);
  });
}
function nwRemoveRef(i) {
  nwState.refImages.splice(i, 1);
  nwRender();
}
function nwGoStep2() {
  if (!nwState.skinName.trim()) { alert('请输入皮肤名称'); return; }
  if (!nwState.styleDesc.trim()) { alert('请输入风格描述'); return; }
  if (!nwState.skinId.trim()) nwAutoId();
  // ID 冲突提示，不静默修改
  if (SKINS[nwState.skinId]) {
    const newId = nwState.skinId + '-' + Date.now().toString(36).slice(-3);
    if (!confirm(`皮肤 ID「${nwState.skinId}」已存在，将自动改为「${newId}」，继续？`)) return;
    nwState.skinId = newId;
    const el = document.getElementById('nwId');
    if (el) el.value = newId;
  }
  // 清空上次生成数据，取消僵尸任务
  nwGenToken++;
  nwState.previews = {};
  nwState.allAssets = {};
  nwState.step = 2;
  nwRender();
}

// ── Step 2: 生成预览 ─────────────────────────────────────────
function nwStep2Body() {
  return `<p class="nw-hint" style="margin:0 0 14px">正在生成 ${NW_PREV_IDS.length} 张预览图，请稍候…</p>
    <div class="nw-prev-grid" id="nwPrevGrid">
      ${NW_PREV_IDS.map(id => `
        <div class="nw-prev-card" id="nwprev-${id}">
          <div class="nw-spin-box">⏳</div>
          <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>
        </div>`).join('')}
    </div>`;
}
function nwStep2Ft() {
  return `<span class="nw-hint" id="nwPrevStatus">生成中…</span>`;
}
async function nwGeneratePreviews() {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('请先在⚙配置里填入有效的 API Key'); nwState.step=1; nwRender(); return; }
  const myToken = ++nwGenToken; // 用于检测是否被取消
  const prompts = buildNWPrompts(nwState);
  const doubao = isDoubaoKey(key);
  const gemini = isGeminiKey(key);
  let ok = 0;
  for (const id of NW_PREV_IDS) {
    if (nwGenToken !== myToken) return; // 已被取消（用户返回修改）
    const card = document.getElementById(`nwprev-${id}`);
    if (!card) continue; // fix: 原来是 break，导致后续图片全部跳过
    card.querySelector('.nw-spin-box').textContent = '🔄';
    try {
      const { b64, mimeType } = doubao
        ? await callDoubao(key, prompts[id], NW_SIZES[id])
        : gemini
          ? await callGemini(key, prompts[id], NW_SIZES[id])
          : await callOpenAI(key, prompts[id], NW_SIZES[id]);
      const ext = mimeType ? mimeType.split('/')[1] : 'jpeg';
      const dataUrl = doubao ? await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`) : `data:image/${ext};base64,${b64}`;
      nwState.previews[id] = dataUrl;
      if (nwGenToken !== myToken) return; // 生成完但已取消
      card.innerHTML = `<img src="${dataUrl}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block">
        <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
      ok++;
    } catch(e) {
      if (nwGenToken !== myToken) return;
      card.innerHTML = `<div style="padding:12px;font-size:10px;color:#f87171;text-align:center">❌ ${e.message.slice(0,60)}</div>
        <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
    }
  }
  if (nwGenToken !== myToken) return;
  const st = document.getElementById('nwPrevStatus');
  if (st) st.textContent = `完成 ${ok}/${NW_PREV_IDS.length}`;
  if (ok > 0) { setTimeout(() => { if (nwState && nwGenToken === myToken) { nwState.step=3; nwRender(); } }, 600); }
}

// ── Step 3: 预览确认 ─────────────────────────────────────────
function nwStep3Body() {
  const chips = Object.entries(nwState.previews).map(([id, url]) => `
    <div class="nw-prev-card" id="nwprev-${id}">
      <img src="${url}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block">
      <button class="nw-prev-regen" onclick="nwRegenOne('${id}')">重新生成</button>
      <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>
    </div>`).join('');
  const empty = NW_PREV_IDS.filter(id => !nwState.previews[id]).map(id => `
    <div class="nw-prev-card" id="nwprev-${id}">
      <div style="padding:20px;text-align:center;font-size:11px;color:#f87171">生成失败</div>
      <button class="nw-prev-regen" style="display:block;position:static;margin:0 auto 6px" onclick="nwRegenOne('${id}')">重试</button>
      <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>
    </div>`).join('');
  return `<p class="nw-hint" style="margin:0 0 12px">以下是根据你的风格描述生成的预览。确认后将生成全部 ${NW_ALL_IDS.length} 张素材。</p>
    <div class="nw-prev-grid">${chips}${empty}</div>
    <div style="margin-top:14px;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:8px;font-size:11px;color:#7080a8">
      <b style="color:#aeb6c7">皮肤：</b>${nwState.skinName} &nbsp;·&nbsp;
      <b style="color:#aeb6c7">ID：</b>${nwState.skinId} &nbsp;·&nbsp;
      <b style="color:#aeb6c7">基调：</b>${nwState.isDark?'深色':'浅色'} &nbsp;·&nbsp;
      <b style="color:#aeb6c7">强调色：</b><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${nwState.accentColor};vertical-align:middle;margin-right:3px"></span>${nwState.accentColor}
    </div>`;
}
function nwStep3Ft() {
  return `<button class="btn btn-ghost" onclick="nwGenToken++;nwState.step=1;nwRender()">← 返回修改</button>
    <button class="btn btn-primary" onclick="window.open('/tools/component-workshop.html','_blank')">确认，进入组件工坊 →</button>`;
}
async function nwRegenOne(id) {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('需要 API Key'); return; }
  const prompts = buildNWPrompts(nwState);
  const doubao = isDoubaoKey(key);
  const gemini = isGeminiKey(key);
  const card = document.getElementById(`nwprev-${id}`); // fix: 用 ID 直接查找，不靠文字内容匹配
  if (card) card.innerHTML = `<div class="nw-spin-box">🔄</div><div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
  try {
    const { b64, mimeType } = doubao
      ? await callDoubao(key, prompts[id], NW_SIZES[id])
      : gemini
        ? await callGemini(key, prompts[id], NW_SIZES[id])
        : await callOpenAI(key, prompts[id], NW_SIZES[id]);
    const ext = mimeType ? mimeType.split('/')[1] : 'jpeg';
    const dataUrl = doubao ? await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`) : `data:image/${ext};base64,${b64}`;
    nwState.previews[id] = dataUrl;
    nwRender();
  } catch(e) {
    if (card) card.innerHTML = `<div style="padding:12px;font-size:10px;color:#f87171;text-align:center">❌ ${e.message.slice(0,60)}</div><button class="nw-prev-regen" style="display:block;position:static;margin:0 auto 6px" onclick="nwRegenOne('${id}')">重试</button><div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
  }
}

function nwStep4Body() {
  const rows = NW_ALL_IDS.map(id => {
    const pre = nwState.previews[id];

      <span class="nw-prog-icon">${icon}</span>

function nwStep4Ft() {
  return `<span class="nw-hint" id="nwAllStatus">生成中，请勿关闭页面…</span>`;
}

async function nwGenerateAll() {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('需要 API Key'); return; }
  const prompts = buildNWPrompts(nwState);
  const doubao = isDoubaoKey(key);
  const gemini = isGeminiKey(key);
  let done = 0;

  for (const id of NW_ALL_IDS) {
    // 如果预览阶段已生成，直接复用并持久化
    const existing = nwState.allAssets[id] || nwState.previews[id];
    if (existing) {
      nwState.allAssets[id] = existing;
      // fix: 预览图也必须写入 generatedAssets/IDB，否则皮肤刷新后丢失
      const gKey = `${nwState.skinId}:${id}`;
      generatedAssets[gKey] = existing;
      idbSave(gKey, existing);
      pushVersion(gKey, existing);
      nwSetRow(id, 'ok', '✅', '来自预览');
      done++;
      continue;
    }
    nwSetRow(id, 'run', '🔄', '生成中…');
    try {
      const { b64, mimeType } = doubao
        ? await callDoubao(key, prompts[id], NW_SIZES[id])
        : gemini
          ? await callGemini(key, prompts[id], NW_SIZES[id])
          : await callOpenAI(key, prompts[id], NW_SIZES[id]);
      const ext = mimeType ? mimeType.split('/')[1] : 'jpeg';
      const dataUrl = doubao ? await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`) : `data:image/${ext};base64,${b64}`;
      // 上传到服务器
      let storeUrl = dataUrl;
      try {
        const sv = await fetch('/api/save-asset', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ skinId: nwState.skinId, assetId: id, dataUrl }) });
        if (sv.ok) { const sd = await sv.json(); if (sd.assetUrl) storeUrl = sd.assetUrl; }
      } catch(_) {}
      nwState.allAssets[id] = storeUrl;
      const gKey = `${nwState.skinId}:${id}`;
      generatedAssets[gKey] = storeUrl;
      idbSave(gKey, storeUrl);
      pushVersion(gKey, storeUrl);
      done++;
      nwSetRow(id, 'ok', '✅', '完成');
    } catch(e) {
      nwSetRow(id, 'err', '❌', e.message.slice(0,30));
    }
  }

  // Finalize skin
  const entry = buildNWSkinEntry(nwState);
  SKINS[nwState.skinId] = entry;
  try {
    const custom = JSON.parse(localStorage.getItem('customSkins') || '{}');
    custom[nwState.skinId] = entry;
    localStorage.setItem('customSkins', JSON.stringify(custom));
  } catch(_) {}
  setSkinActive(nwState.skinId, true);
  renderSkinTabs();

  const st = document.getElementById('nwAllStatus');
  if (st) st.textContent = `完成 ${done}/${NW_ALL_IDS.length}`;
  document.getElementById('nwFt').innerHTML =
    `<span class="nw-hint" style="color:var(--good)">✅ 皮肤「${nwState.skinName}」已创建！</span>
     <button class="btn btn-primary" onclick="closeNewSkin();selectSkin('${nwState.skinId}')">去查看皮肤</button>`;
}

function nwSetRow(id, cls, icon, txt) {
  const row = document.getElementById(`nwrow-${id}`);
  const st  = document.getElementById(`nwst-${id}`);
  if (row) { row.className = `nw-prog-row ${cls}`; row.querySelector('.nw-prog-icon').textContent = icon; }
  if (st) st.textContent = txt;
}

// ── 提示词构建 ───────────────────────────────────────────────
function buildNWPrompts(state) {
  const { styleDesc: s, accentColor: acc, isDark } = state;
  const tone = isDark ? 'dark moody tone, deep shadows' : 'bright airy tone, vibrant light colors';
  const BG   = `Mobile game environment background art. Style: ${s}. ${tone}. Accent color ${acc}. No text, no UI, no figures.`;
  const CH   = `Single character bust portrait. Art style: ${s}. Head and upper chest, face fills 70-80% of frame. ${tone}. Accent ${acc}. Square 1:1. No text.`;
  const UI   = `Mobile game UI icon asset. Style: ${s}. ${tone}. Accent ${acc}. Isolated on soft background. No text.`;
  return {
    'home-bg':       `${BG} Grand majestic home screen scenery, epic wide establishing shot. Vertical 9:16.`,
    'in-game-bg':    `${BG} In-game playing screen, detailed atmospheric interior or landscape, immersive. Vertical 9:16.`,
    'table':         `Top-down overhead view of round game table. Style: ${s}. ${tone}. Table circle fills 96% of frame. Pure white flat background outside table edge. Square 1:1. No figures.`,
    'quest-success': `${BG} Triumphant victory scene, glorious golden light celebration atmosphere. Landscape 16:9.`,
    'quest-fail':    `${BG} Somber defeat scene, melancholy muted palette, fading atmosphere. Landscape 16:9.`,
    'history-icon':  `${UI} Historical records icon — ancient scroll, book, or tome motif. Style: ${s}.`,
    'stats-icon':    `${UI} Achievement stats icon — trophy, crown, or ranking columns motif. Style: ${s}.`,
    'kill-icon':     `${UI} Assassination icon — elegant dagger or blade motif. Style: ${s}.`,
    'roles-atlas':   `Character portrait grid 4×4, style: ${s}. Each cell: square bust portrait, head+chest only, face centered, NO full body. Row1: [Merlin elderly sage white beard wise eyes ornate robes]; [Percival young earnest knight armor]; [Loyal Knight silver armor calm]; [Lancelot golden armor heroic]. Row2: [Assassin dark hood only sharp eyes]; [Morgana cold beauty dark gown violet eyes]; [Mordred dark armor cunning]; [Oberon worn traveler suspicious]. Row3: [Minion full hood only two glowing eyes visible]; [Evil Lancelot corrupted armor tormented]; [empty]; [empty]. Row4: 4×[empty]. ${tone}. Thin divider lines. No text.`,
    'merlin':        `${CH} Merlin — visibly elderly sage, long flowing white beard, wise kind eyes, elaborate ornate robes with mystical patterns.`,
    'percival':      `${CH} Percival — young earnest brave face, knight armor, bright sincere eyes, heroic bearing.`,
    'arthur_loyal':  `${CH} Loyal Knight — dependable angular face, plain silver armor, calm honest eyes, humble steady.`,
    'lancelot_good': `${CH} Lancelot champion — confident heroic face, gleaming golden armor, warm strong eyes.`,
    'assassin':      `${CH} The Assassin — dark hood drawn over lower face, ONLY sharp cold calculating eyes visible above hood.`,
    'morgana':       `${CH} Morgana — elegant cold beauty, long dark hair, striking violet eyes, dark elaborate gown.`,
    'mordred':       `${CH} Mordred — dark armored, cunning narrowed eyes, cold scheming dangerous expression.`,
    'oberon':        `${CH} Oberon wanderer — worn dusty travel clothes, unkempt hair, hollow suspicious darting eyes.`,
    'minion':        `${CH} The Minion — hood fully over entire face, ONLY two glowing eyes visible inside dark void.`,
    'lancelot_evil': `${CH} Evil Lancelot — once-golden armor now blackened and cracked, tormented haunted grief-filled expression.`,
  };
}

// ── 皮肤条目构建 ─────────────────────────────────────────────
function buildNWSkinEntry({ skinName, accentColor, bgColor, borderStyle, isDark }) {
  const acc = accentColor || '#d9b36b';
  const bg  = bgColor || (isDark ? '#0f1115' : '#f0f2f6');
  const r   = borderStyle === 'sharp' ? '0' : '1';
  const lum = nwLuminance(bg); // 0=纯黑 1=纯白
  const dark = lum < 0.35;     // 重新根据实际背景色判断深浅

  // 衍生色
  const bg2      = dark ? nwShift(bg, 10) : nwShift(bg, -10);
  const panelBg  = nwRgba(dark ? nwShift(bg, 8) : bg, dark ? 0.85 : 0.90);
  const navBg    = nwRgba(dark ? nwShift(bg, -4) : nwShift(bg, 4), dark ? 0.92 : 0.94);
  const textCol  = dark ? '#eef1f7' : '#1a1c24';
  const subCol   = dark ? '#aeb6c7' : '#6b7080';
  const mutedCol = dark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.08)';

  // 面板边框 & 按钮从强调色衍生 → 这是让皮肤「有风格」的关键
  const panelBorder    = nwRgba(acc, dark ? 0.45 : 0.30);
  const navBorder      = nwRgba(acc, dark ? 0.20 : 0.14);
  const inputBorder    = nwRgba(acc, dark ? 0.28 : 0.22);
  const btnBorder      = nwRgba(acc, dark ? 0.55 : 0.35);
  const inputBg        = dark ? nwRgba(acc, 0.05) : 'rgba(255,255,255,.75)';
  const accTextAuto    = nwLuminance(acc) > 0.45 ? '#1a1200' : '#ffffff';

  // Chip 渐变用真实背景色
  const chip       = `linear-gradient(135deg,${bg},${dark ? nwShift(bg,18) : nwShift(bg,-12)})`;
  const chipBorder = nwRgba(acc, 0.55);

  // ── 阵营色（从强调色衍生默认值，CC 分析后会覆盖为皮肤专属色） ──────────────
  // 好人：偏蓝，邪恶：偏红，保持语义清晰
  const goodColor    = '#4e9eff';
  const evilColor    = '#e05050';
  const successColor = dark ? '#72e0a0' : '#1a8c52';
  const failColor    = dark ? '#f07070' : '#c03030';
  const medalColor   = acc;  // 默认用强调色作为勋章色

  return {
    name: skinName, chip, chipBorder, isDark: dark, custom: true,
    vars: {
      // ── 基础 ──
      '--aw-bg':               bg,
      '--aw-bg-2':             bg2,
      '--aw-panel':            panelBg,
      '--aw-panel-border':     panelBorder,
      '--aw-text':             textCol,
      '--aw-subtext':          subCol,
      '--aw-accent':           acc,
      '--aw-accent-text':      accTextAuto,
      '--aw-nav-bg':           navBg,
      '--aw-nav-border':       navBorder,
      '--aw-input-bg':         inputBg,
      '--aw-input-border':     inputBorder,
      '--aw-btn-ghost-border': btnBorder,
      '--aw-btn-ghost-text':   textCol,
      '--aw-r':                r,
      // ── 主按钮（投票"是"） ──
      '--aw-btn-primary-bg':   `linear-gradient(180deg,${nwShift(acc,30)},${acc})`,
      '--aw-btn-primary-text': nwLuminance(acc) > 0.45 ? '#1a1200' : '#ffffff',
      // ── 好人阵营 ──
      '--aw-good-glow':        'rgba(78,158,255,0.85)',
      '--aw-good-shadow':      'rgba(78,158,255,0.45)',
      '--aw-good-seat-bg':     'rgba(7,50,120,0.35)',
      '--aw-good-chip-bg':     'rgba(7,50,120,.35)',

// 工坊运行状态
let cwAssets  = {};  // id → dataUrl
let cwRunning = {};  // id → true
let cwIsDark  = true;

// 用 dark-gold（默认皮肤）的 CDN 资产预填充工坊卡片
function cwGetDefaultAssets() {
  const def = {};
  // 场景 + 图标：从 ASSETS 找 cdnFile
  for (const id of NW_ALL_IDS) {
    // 优先：dark-gold 已生成的自定义图
    const gUrl = generatedAssets[`dark-gold:${id}`];
    if (gUrl) { def[id] = gUrl; continue; }
    // 其次：ASSETS 里的 cdnFile（场景/图标类）
    const a = ASSETS.find(x => x.id === id);
    if (a?.cdnFile) { def[id] = `${CDN}/${a.cdnFile}`; }
  }
  // 角色头像：从 ROLE_SLOTS 找 cdnFile
  if (typeof ROLE_SLOTS !== 'undefined') {
    for (const slot of ROLE_SLOTS) {
      if (!slot?.id || !NW_ALL_IDS.includes(slot.id)) continue;
      const gUrl = generatedAssets[`dark-gold:${slot.id}`];
      if (gUrl) { def[slot.id] = gUrl; continue; }
      if (slot.cdnFile) def[slot.id] = `${CDN}/${slot.cdnFile}`;
    }
  }
  return def;
}

// 从配置输入框读取当前状态
function cwReadState() {
  const name   = (document.getElementById('cwName')?.value || '').trim();
  const rawId  = (document.getElementById('cwId')?.value || '').trim();
  const style  = (document.getElementById('cwStyle')?.value || '').trim();
  const accent = document.getElementById('cwAccent')?.value || '#d9b36b';
  const isDark = cwIsDark;
  // 自动生成 ID：全小写、空格→连字符、去掉非字母数字
  const skinId = rawId || name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') || 'new-skin';
  const skinName = name || '新皮肤';
  return { skinId, skinName, styleDesc: style, accentColor: accent,
           bgColor: isDark ? '#0f1115' : '#f0f2f6', borderStyle: 'round', isDark,
           previews: {}, allAssets: cwAssets };
}

function cwAutoId() {
  const name = (document.getElementById('cwName')?.value || '').trim();
  const idEl = document.getElementById('cwId');
  if (idEl && !idEl.dataset.manual) {
    idEl.value = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  }
}

function cwSetTone(dark) {
  cwIsDark = dark;
  document.getElementById('cwToneDark').classList.toggle('active', dark);
  document.getElementById('cwToneLight').classList.toggle('active', !dark);
}

function openCompWorkshop() {
  cwRunning = {};
  cwIsDark  = true;
  // 始终先用默认皮肤资产填底
  cwAssets = cwGetDefaultAssets();

  // 如果从 wizard 过来，继承配置和已生成图（覆盖默认值）
  if (nwState) {
    Object.assign(cwAssets, nwState.previews || {}, nwState.allAssets || {});
    document.getElementById('cwName').value   = nwState.skinName   || '';
    document.getElementById('cwId').value     = nwState.skinId     || '';
    document.getElementById('cwStyle').value  = nwState.styleDesc  || '';
    document.getElementById('cwAccent').value = nwState.accentColor|| '#d9b36b';
    document.getElementById('cwAccentHex').textContent = nwState.accentColor || '#d9b36b';
    cwIsDark = nwState.isDark !== false;
    cwSetTone(cwIsDark);
    closeNewSkin();
  } else {
    // 独立打开：清空表单，图集用默认资产打底
    document.getElementById('cwName').value  = '';
    document.getElementById('cwId').value    = '';
    document.getElementById('cwStyle').value = '';
    document.getElementById('cwAccent').value = '#d9b36b';
    document.getElementById('cwAccentHex').textContent = '#d9b36b';
    cwSetTone(true);
    document.getElementById('cwId').dataset.manual = '';
  }
  document.getElementById('cwOverlay').classList.add('open');
  // 监听 ID 手动编辑
  const idEl = document.getElementById('cwId');
  idEl.oninput = () => { idEl.dataset.manual = '1'; };
  // 监听颜色变化
  document.getElementById('cwAccent').oninput = (e) => {
    document.getElementById('cwAccentHex').textContent = e.target.value;
  };
  cwRender();
}

function cwClose() {
  document.getElementById('cwOverlay').classList.remove('open');
  nwState = null;
}

// ── 组件预览：皮肤 CSS 变量字符串 ───────────────────────────────
function cwGetPreviewVarsStr() {
  try {
    const entry = buildNWSkinEntry(cwReadState());
    return Object.entries(entry.vars).map(([k,v])=>`${k}:${v}`).join(';');
  } catch(_) { return ''; }
}

    { id:'c-roles-atlas', title:'角色头像组', assets:['roles-atlas','merlin','percival','assassin','morgana'],
      render: (a) => {
        const roles = ['merlin','percival','arthur_loyal','lancelot_good','assassin','morgana','mordred','oberon'];
        return `<div style="padding:6px;background:var(--aw-bg)">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px">
            ${roles.map(id=>`<div style="aspect-ratio:1;border-radius:calc(4px * var(--aw-r));border:1px solid var(--aw-panel-border);overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--aw-bg-2)">
              ${a[id]?`<img src="${a[id]}" style="width:100%;height:100%;object-fit:cover">`:
              `<span style="font-size:10px">${CW_PH[id]||'👤'}</span>`}
            </div>`).join('')}
          </div>
        </div>`;
      }
    },
  ]},
];

// ── 渲染工坊主体 ─────────────────────────────────────────────────
function cwRender() {
  const allAssetIds = CW_COMP_GROUPS.flatMap(g => g.comps.flatMap(c => c.assets));
  const unique = [...new Set(allAssetIds)];
  const done = unique.filter(id => cwAssets[id] && !cwAssets[id].startsWith(CDN)).length;
  const total = unique.length;
  document.getElementById('cwSub').textContent =
    `展示当前皮肤效果 · 已自定义 ${done} / ${total} 个资产`;

  const prog = document.getElementById('cwProg');
  if (prog) prog.innerHTML = unique.map(id =>
    `<div class="cw-prog-dot ${cwRunning[id]?'run':
      (cwAssets[id]&&!cwAssets[id].startsWith(CDN))?'done':''}"></div>`
  ).join('');

  const vars = cwGetPreviewVarsStr();
  document.getElementById('cwBody').innerHTML =
    CW_COMP_GROUPS.map(g => cwRenderCompGroup(g, vars)).join('');
}

function cwRenderCompGroup(g, vars) {
  const assetIds = [...new Set(g.comps.flatMap(c => c.assets))];
  const running  = assetIds.some(id => cwRunning[id]);
  const cards    = g.comps.map(c => cwRenderCompCard(c, vars)).join('');
  return `<div class="cw-section">
    <div class="cw-sec-hd">
      <span>${g.icon}</span>
      <span class="cw-sec-title">${g.title}</span>
      ${assetIds.length ? `<button class="cw-batch-btn" id="cwbatch-${g.id}"
        onclick="cwBatchGroup('${g.id}')" ${running?'disabled':''}>
        ${running ? '生成中…' : '批量生成素材'}
      </button>` : ''}
    </div>
    <div class="cwc-grid">${cards}</div>
  </div>`;
}

function cwRenderCompCard(comp, vars) {
  const preview = comp.render(cwAssets);
  const genBtns = comp.assets.map(id => {
    const running = cwRunning[id];
    const isCustom = cwAssets[id] && !cwAssets[id].startsWith(CDN);
    return `<button class="cwc-gen-btn ${running?'running':isCustom?'done':''}"
      id="cwcbtn-${id}" onclick="cwGenerateOne('${id}')" ${running?'disabled':''}>
      ${running?'生成中…':isCustom?'重生成':NW_NAMES[id]||id}
    </button>`;
  }).join('');
  return `<div class="cwc-card">
    <div class="cwc-preview" style="${vars}">${preview}</div>
    <div class="cwc-footer">
      <span class="cwc-name">${comp.title}</span>
      ${genBtns ? `<div class="cwc-btns">${genBtns}</div>` : ''}
    </div>
  </div>`;
}

// 生成完一个资产后重渲整个 body（简单可靠）
function cwRerenderBody() {
  const vars = cwGetPreviewVarsStr();
  // 顶部进度
  const allAssetIds = [...new Set(CW_COMP_GROUPS.flatMap(g => g.comps.flatMap(c => c.assets)))];
  const done = allAssetIds.filter(id => cwAssets[id] && !cwAssets[id].startsWith(CDN)).length;
  document.getElementById('cwSub').textContent =
    `展示当前皮肤效果 · 已自定义 ${done} / ${allAssetIds.length} 个资产`;
  const prog = document.getElementById('cwProg');
  if (prog) prog.innerHTML = allAssetIds.map(id =>
    `<div class="cw-prog-dot ${cwRunning[id]?'run':
      (cwAssets[id]&&!cwAssets[id].startsWith(CDN))?'done':''}"></div>`
  ).join('');
  // 逐张卡片只更新生成按钮状态，不重渲整个预览（保持流畅）
  for (const g of CW_COMP_GROUPS) {
    for (const comp of g.comps) {
      for (const id of comp.assets) {
        const btn = document.getElementById(`cwcbtn-${id}`);
        if (!btn) continue;
        const running = cwRunning[id];
        const isCustom = cwAssets[id] && !cwAssets[id].startsWith(CDN);
        btn.className = `cwc-gen-btn ${running?'running':isCustom?'done':''}`;
        btn.disabled  = !!running;
        btn.textContent = running?'生成中…':isCustom?'重生成':NW_NAMES[id]||id;
      }
      // 更新预览区图片（仅替换 img 标签）
      const previewEl = document.querySelector(`[data-comp-id="${comp.id}"] .cwc-preview`);
      if (previewEl) previewEl.style.cssText = vars || '';
    }
    // 更新批量按钮
    const assetIds = [...new Set(g.comps.flatMap(c => c.assets))];
    const running  = assetIds.some(id => cwRunning[id]);
    const bb = document.getElementById(`cwbatch-${g.id}`);
    if (bb) { bb.disabled = running; bb.textContent = running?'生成中…':'批量生成素材'; }
  }
}

async function cwGenerateOne(id) {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('需要配置 API Key'); return; }
  if (cwRunning[id]) return;
  cwRunning[id] = true;
  cwRerenderBody();
  try {
    const state   = cwReadState();
    const prompts = buildNWPrompts(state);
    const doubao  = isDoubaoKey(key);
    const gemini  = isGeminiKey(key);
    const { b64, mimeType } = doubao
      ? await callDoubao(key, prompts[id], NW_SIZES[id])
      : gemini
        ? await callGemini(key, prompts[id], NW_SIZES[id])
        : await callOpenAI(key, prompts[id], NW_SIZES[id]);
    const ext = mimeType ? mimeType.split('/')[1] : 'jpeg';
    cwAssets[id] = doubao
      ? await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`)
      : `data:image/${ext};base64,${b64}`;
  } catch(e) {
    alert(`生成「${NW_NAMES[id]||id}」失败：${e.message.slice(0,80)}`);
  }
  delete cwRunning[id];
  // 重新渲染含该资产的所有组件预览
  cwRender();
}

async function cwBatchGroup(groupId) {
  const g = CW_COMP_GROUPS.find(x => x.id === groupId);
  if (!g) return;
  const ids = [...new Set(g.comps.flatMap(c => c.assets))];
  for (const id of ids) {
    if (!cwRunning[id]) await cwGenerateOne(id);
  }
}

async function cwFinish() {
  const state  = cwReadState();
  const skinId = state.skinId;
  if (!skinId) { alert('请先填写皮肤名称'); return; }

  // 持久化所有已生成资产
  for (const id of NW_ALL_IDS) {
    const dataUrl = cwAssets[id];
    if (!dataUrl) continue;
    const gKey = `${skinId}:${id}`;
    generatedAssets[gKey] = dataUrl;
    idbSave(gKey, dataUrl);
    pushVersion(gKey, dataUrl);
    try {
      const sv = await fetch('/api/save-asset', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ skinId, assetId: id, dataUrl })
      });
      if (sv.ok) {
        const sd = await sv.json();
        if (sd.assetUrl) { generatedAssets[gKey] = sd.assetUrl; idbSave(gKey, sd.assetUrl); }
      }
    } catch(_) {}
  }

  // 创建皮肤条目
  const entry = buildNWSkinEntry(state);
  SKINS[skinId] = entry;
  try {
    const custom = JSON.parse(localStorage.getItem('customSkins') || '{}');
    custom[skinId] = entry;
    localStorage.setItem('customSkins', JSON.stringify(custom));
  } catch(_) {}
  setSkinActive(skinId, true);
  renderSkinTabs();

  document.getElementById('cwOverlay').classList.remove('open');
  nwState = null;
  selectSkin(skinId);
  alert(`皮肤「${state.skinName}」已创建！`);
}
</script>
