<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Avalon · Skin Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b11;--surface:#10131c;--card:#161b28;--border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --text:#e8eaf0;--sub:#7a8aa0;--muted:#3a4555;
  --good:#4ade80;--evil:#f87171;--accent:#d9b36b;
  --r:10px;--font:-apple-system,'PingFang SC',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─── */
.hd{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0}
.hd-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text)}
.hd-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
.hd-sep{width:1px;height:20px;background:var(--border)}
.hd-key-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.hd-key-label{font-size:11px;color:var(--sub)}
.hd-key{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--mono);padding:5px 10px;width:260px;outline:none}
.hd-key:focus{border-color:var(--border-hi)}
.hd-key::placeholder{color:var(--muted)}
.hd-key-status{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.hd-key-status.ok{background:var(--good);box-shadow:0 0 6px var(--good)}

/* ─── Skin tabs ─── */
.skin-tabs{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:2px;padding:0 12px;flex-shrink:0;overflow-x:auto}
.skin-tabs::-webkit-scrollbar{display:none}
.stab{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:7px;border:1px solid transparent;cursor:pointer;white-space:nowrap;background:none;transition:all .15s}
.stab:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.stab.active{background:rgba(255,255,255,.07);border-color:var(--border-hi)}
.stab-chip{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.stab-name{font-size:12px;font-weight:600;color:var(--text)}
.stab-id{font-size:10px;color:var(--sub);font-family:var(--mono)}

/* ─── Workspace ─── */
.workspace{flex:1;display:grid;grid-template-columns:230px 1fr 360px;overflow:hidden}

/* ─── Assets Panel ─── */
.panel-assets{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
.panel-assets::-webkit-scrollbar{width:4px}
.panel-assets::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.asset-cat{padding:10px 12px 6px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.asset-item{display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.asset-item:hover{background:rgba(255,255,255,.03)}
.asset-item.active{background:rgba(255,255,255,.06);border-left-color:var(--accent)}
.asset-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--card);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.asset-thumb img{width:100%;height:100%;object-fit:cover}
.asset-thumb.portrait{height:48px}
.asset-info{min-width:0}
.asset-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset-file{font-size:10px;color:var(--sub);font-family:var(--mono)}
.asset-badge{width:8px;height:8px;border-radius:50%;background:var(--good);flex-shrink:0;margin-left:auto;box-shadow:0 0 5px var(--good)}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ─── Prompt Panel ─── */
.panel-prompt{display:flex;flex-direction:column;overflow:hidden;padding:0}
.pp-top{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.pp-asset-label{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pp-asset-name{font-size:15px;font-weight:700}
.pp-spec{font-size:11px;color:var(--sub);font-family:var(--mono);padding:2px 8px;background:rgba(255,255,255,.05);border-radius:4px;border:1px solid var(--border)}
.pp-prompt-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.pp-prompt{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:var(--mono);line-height:1.65;padding:14px;resize:none;outline:none;min-height:0}
.pp-prompt:focus{border-color:var(--border-hi)}
.pp-actions{display:flex;gap:8px;padding:12px 20px;flex-shrink:0;border-top:1px solid var(--border)}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all .15s;font-family:var(--font);display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#1a1200;border-color:var(--accent);font-weight:700}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-good{background:rgba(74,222,128,.12);color:var(--good);border-color:rgba(74,222,128,.3)}
.btn-good:hover{background:rgba(74,222,128,.18)}
.pp-result{flex-shrink:0;padding:0 20px 12px}
.pp-result-img{width:100%;max-height:200px;border-radius:var(--r);object-fit:contain;background:var(--card);border:1px solid var(--border);display:none}
.pp-result-img.visible{display:block}
.pp-loading{display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100px;color:var(--sub);font-size:12px}
.pp-loading.visible{display:flex}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pp-prompt-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:12px 20px;gap:10px;min-height:0}

/* ─── Phone Preview Panel ─── */
.panel-preview{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;padding:16px 12px;overflow-y:auto}
.panel-preview::-webkit-scrollbar{width:4px}
.panel-preview::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08)}
.preview-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--card);padding:3px;border-radius:8px;border:1px solid var(--border)}
.preview-tab{padding:5px 14px;border-radius:6px;font-size:11px;cursor:pointer;color:var(--sub);transition:all .15s}
.preview-tab.active{background:rgba(255,255,255,.08);color:var(--text)}

/* ─── Phone Frame ─── */
.phone-frame{width:280px;height:560px;border-radius:36px;border:8px solid #1a1e2a;box-shadow:0 0 0 1px rgba(255,255,255,.06),0 20px 60px rgba(0,0,0,.6);overflow:hidden;position:relative;flex-shrink:0}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ph-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.ph-bg-color{position:absolute;inset:0;z-index:0}
.ph-mask{position:absolute;inset:0;z-index:1;pointer-events:none}

/* Phone UI elements using --aw-* vars */
.ph-nav{position:relative;z-index:10;height:44px;display:flex;align-items:center;padding:0 12px;gap:8px;background:var(--aw-nav-bg,rgba(12,16,24,.88));border-bottom:1px solid var(--aw-nav-border,rgba(255,255,255,.08));backdrop-filter:blur(8px);flex-shrink:0}
.ph-nav-back{font-size:11px;color:var(--aw-text,#eef1f7);display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:var(--aw-input-bg,rgba(255,255,255,.06))}
.ph-nav-title{font-size:13px;font-weight:700;color:var(--aw-text,#eef1f7);position:absolute;left:50%;transform:translateX(-50%);letter-spacing:2px}
.ph-nav-right{margin-left:auto;font-size:18px}

.ph-content{position:relative;z-index:5;flex:1;overflow:hidden;padding:10px 10px 0;display:flex;flex-direction:column;gap:8px}
.ph-panel{background:var(--aw-panel,rgba(19,23,31,.82));border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));border-radius:14px;padding:12px;backdrop-filter:blur(4px)}
.ph-panel-title{font-size:10px;font-weight:700;color:var(--aw-subtext,#aeb6c7);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.ph-input{background:var(--aw-input-bg,rgba(255,255,255,.06));border:1px solid var(--aw-input-border,rgba(255,255,255,.14));border-radius:8px;padding:7px 10px;font-size:11px;color:var(--aw-subtext,#aeb6c7);margin-bottom:7px}
.ph-btn-row{display:flex;gap:6px}
.ph-btn-primary{flex:1;background:var(--aw-accent,#d9b36b);color:var(--aw-accent-text,#1a1200);border-radius:8px;padding:7px;font-size:11px;font-weight:700;text-align:center}
.ph-btn-ghost{flex:1;background:transparent;border:1px solid var(--aw-btn-ghost-border,rgba(255,255,255,.22));color:var(--aw-btn-ghost-text,#eef1f7);border-radius:8px;padding:7px;font-size:11px;text-align:center}

.ph-room-card{background:var(--aw-input-bg,rgba(255,255,255,.06));border:1px solid var(--aw-input-border,rgba(255,255,255,.1));border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between}
.ph-room-code{font-size:12px;font-weight:700;color:var(--aw-accent,#d9b36b);font-family:var(--mono)}
.ph-room-meta{font-size:10px;color:var(--aw-subtext,#aeb6c7);margin-top:2px}
.ph-room-join{font-size:10px;color:var(--aw-accent-text,#1a1200);background:var(--aw-accent,#d9b36b);padding:3px 8px;border-radius:6px;font-weight:700}

/* Round table */
.ph-table-wrap{position:relative;width:160px;height:160px;margin:0 auto;flex-shrink:0}
.ph-table-circle{width:100%;height:100%;border-radius:50%;border:2px solid var(--aw-accent,#d9b36b);background:var(--aw-panel,rgba(19,23,31,.82));overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--aw-subtext,#aeb6c7)}
.ph-table-img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ph-seat{position:absolute;width:26px;height:26px;border-radius:50%;background:var(--aw-panel,rgba(19,23,31,.82));border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));display:flex;align-items:center;justify-content:center;font-size:10px}

/* Mission pills */
.ph-pills{display:flex;gap:4px;padding:0 4px}
.ph-pill{flex:1;height:32px;border-radius:7px;border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:rgba(0,0,0,.22);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:var(--aw-subtext,#aeb6c7)}
.ph-pill.current{background:rgba(190,145,60,.18);border-color:rgba(220,180,90,.6)}
.ph-pill.success{background:rgba(60,160,100,.18);border-color:rgba(100,220,150,.5);color:var(--good)}
.ph-pill.fail{background:rgba(160,40,40,.18);border-color:rgba(230,90,90,.5);color:var(--evil)}

/* Action panel */
.ph-action{position:relative;z-index:10;background:var(--aw-panel,rgba(19,23,31,.82));border-top:1px solid var(--aw-nav-border,rgba(255,255,255,.08));padding:10px;flex-shrink:0;backdrop-filter:blur(8px)}
.ph-action-title{font-size:10px;color:var(--aw-subtext,#aeb6c7);text-align:center;margin-bottom:7px}
.ph-chip-row{display:flex;gap:5px;justify-content:center;margin-bottom:7px}
.ph-chip{padding:4px 8px;border-radius:999px;font-size:9px;border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:var(--aw-input-bg,rgba(255,255,255,.06));color:var(--aw-subtext,#aeb6c7);display:flex;align-items:center;gap:4px}
.ph-chip-avatar{width:16px;height:16px;border-radius:50%;background:var(--aw-bg-2,#161b24);font-size:8px;display:flex;align-items:center;justify-content:center}
.ph-confirm-btn{width:100%;background:var(--aw-accent,#d9b36b);color:var(--aw-accent-text,#1a1200);border-radius:10px;padding:8px;font-size:11px;font-weight:700;text-align:center}

/* Role card (for role detail view) */
.ph-role-card{background:var(--aw-panel,rgba(19,23,31,.82));border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));border-radius:12px;padding:10px;display:flex;gap:10px;align-items:center}
.ph-role-img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--aw-bg-2,#161b24);border:2px solid var(--aw-accent,#d9b36b);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ph-role-name{font-size:13px;font-weight:700;color:var(--aw-accent,#d9b36b)}
.ph-role-desc{font-size:10px;color:var(--aw-subtext,#aeb6c7);line-height:1.5;margin-top:3px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-dot"></div>
  <span class="hd-title">AVALON · SKIN STUDIO</span>
  <div class="hd-sep"></div>
  <span style="font-size:11px;color:var(--sub)">左选素材 · 中间生成 · 右预览效果</span>
  <div class="hd-key-wrap">
    <span class="hd-key-label">OpenAI Key</span>
    <div class="hd-key-status" id="keyStatus"></div>
    <input class="hd-key" id="apiKey" type="password" placeholder="sk-..." oninput="onKeyInput()">
  </div>
</div>

<div class="skin-tabs" id="skinTabs"></div>

<div class="workspace">
  <!-- ── Left: Asset list ── -->
  <div class="panel-assets" id="assetPanel"></div>

  <!-- ── Middle: Prompt + Generate ── -->
  <div class="panel-prompt">
    <div class="pp-top">
      <div class="pp-asset-label" id="ppLabel">
        <span class="pp-asset-name" id="ppName">← 选择左侧素材</span>
        <span class="pp-spec" id="ppSpec"></span>
      </div>
    </div>
    <div class="pp-prompt-area">
      <textarea class="pp-prompt" id="ppPrompt" placeholder="点击左侧素材查看对应 Prompt…"></textarea>
      <div class="pp-loading" id="ppLoading">
        <div class="spinner"></div>
        <span>正在生成…</span>
      </div>
      <img class="pp-result-img" id="ppResultImg" alt="生成结果">
    </div>
    <div class="pp-actions">
      <button class="btn btn-primary" id="btnGenerate" onclick="generate()" disabled>⚡ 生成图片</button>
      <button class="btn btn-ghost" id="btnCopy" onclick="copyPrompt()">复制 Prompt</button>
      <button class="btn btn-good" id="btnApply" onclick="applyToPreview()" style="display:none">✓ 应用到预览</button>
      <button class="btn btn-ghost" id="btnDownload" onclick="downloadResult()" style="display:none">↓ 下载</button>
    </div>
  </div>

  <!-- ── Right: Phone Preview ── -->
  <div class="panel-preview">
    <div class="preview-tabs">
      <div class="preview-tab active" onclick="setPreviewTab('home',this)">主页</div>
      <div class="preview-tab" onclick="setPreviewTab('game',this)">游戏中</div>
      <div class="preview-tab" onclick="setPreviewTab('role',this)">身份牌</div>
    </div>
    <div class="phone-frame" id="phoneFrame">
      <!-- Filled by JS -->
    </div>
    <div style="margin-top:10px;font-size:10px;color:var(--muted);text-align:center">生成图片后点「应用到预览」即时生效</div>
  </div>
</div>

<script>

// DATA

const SKINS = {

};

const CDN = 'https://www.awalon.top/mp-assets';

// STATE

let currentSkin = 'dark-gold';
let currentAsset = null;
let generatedAssets = {}; // 'skinId:assetId' -> dataURL
let lastGeneratedUrl = null;
let currentPreviewTab = 'home';

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('openai_key');
  if (saved) { document.getElementById('apiKey').value = saved; updateKeyStatus(); }
  renderSkinTabs();
  renderAssets();
  selectAsset('home-bg');
  renderPreview();
});

function onKeyInput() {
  const k = document.getElementById('apiKey').value.trim();
  if (k) localStorage.setItem('openai_key', k);
  updateKeyStatus();
}
function updateKeyStatus() {
  const k = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('keyStatus');
  el.classList.toggle('ok', k.startsWith('sk-'));
  document.getElementById('btnGenerate').disabled = !currentAsset || !k.startsWith('sk-');
}

// ══════════════════════════════════════════════════════════════
// SKIN TABS
// ══════════════════════════════════════════════════════════════
function renderSkinTabs() {
  const container = document.getElementById('skinTabs');
  container.innerHTML = Object.entries(SKINS).map(([id, s]) => `
    <button class="stab ${id===currentSkin?'active':''}" onclick="selectSkin('${id}')">
      <div class="stab-chip" style="background:${s.chip};border-color:${s.chipBorder}"></div>
      <span class="stab-name">${s.name}</span>
      <span class="stab-id">${id}</span>
    </button>`).join('');
}

function selectSkin(id) {
  currentSkin = id;
  renderSkinTabs();
  renderAssets();
  if (currentAsset) selectAsset(currentAsset);
  renderPreview();
}

// ══════════════════════════════════════════════════════════════
// ASSET LIST
// ══════════════════════════════════════════════════════════════
function getAssetUrl(skinId, asset) {
  const key = `${skinId}:${asset.id}`;
  if (generatedAssets[key]) return generatedAssets[key];
  if (skinId === 'dark-gold') return `${CDN}/${asset.cdnFile || asset.file}`;
  return null;
}

function renderAssets() {
  const container = document.getElementById('assetPanel');
  const cats = [...new Set(ASSETS.map(a => a.cat))];
  container.innerHTML = cats.map(cat => {
    const items = ASSETS.filter(a => a.cat === cat);
    return `<div class="asset-cat">${cat}</div>` + items.map(a => {
      const url = getAssetUrl(currentSkin, a);
      const key = `${currentSkin}:${a.id}`;
      const hasGen = !!generatedAssets[key];
      const thumbContent = url
        ? `<img src="${url}" onerror="this.parentElement.textContent='${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':a.tag==='good'?'⚔️':'🗡️'}'"/>`
        : `<span style="font-size:16px">${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':a.tag==='good'?'⚔️':'🗡️'}</span>`;
      return `<div class="asset-item ${a.id===currentAsset?'active':''}" onclick="selectAsset('${a.id}')">
        <div class="asset-thumb">${thumbContent}</div>
        <div class="asset-info">
          <div class="asset-name">${a.name}</div>
          <div class="asset-file">${a.file.split('/').pop()}</div>
        </div>
        <div class="tag-dot" style="background:${a.tagColor}"></div>
        ${hasGen ? '<div class="asset-badge"></div>' : ''}
      </div>`;
    }).join('');
  }).join('');
}

function selectAsset(id) {
  currentAsset = id;
  const asset = ASSETS.find(a => a.id === id);
  const prompt = PROMPTS[currentSkin]?.[id] || '';

  document.getElementById('ppName').textContent = asset.name;
  document.getElementById('ppSpec').textContent = asset.spec;
  document.getElementById('ppPrompt').value = prompt;

  // Show current generated result if any
  const key = `${currentSkin}:${id}`;
  const resultImg = document.getElementById('ppResultImg');
  if (generatedAssets[key]) {
    resultImg.src = generatedAssets[key];
    resultImg.classList.add('visible');
    lastGeneratedUrl = generatedAssets[key];
    document.getElementById('btnApply').style.display = '';
    document.getElementById('btnDownload').style.display = '';
  } else {
    resultImg.classList.remove('visible');
    lastGeneratedUrl = null;
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnDownload').style.display = 'none';
  }

  const k = document.getElementById('apiKey').value.trim();
  document.getElementById('btnGenerate').disabled = !k.startsWith('sk-');
  renderAssets();
}

// ══════════════════════════════════════════════════════════════
// GENERATION
// ══════════════════════════════════════════════════════════════
async function generate() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || !currentAsset) return;

  const asset = ASSETS.find(a => a.id === currentAsset);
  const prompt = document.getElementById('ppPrompt').value.trim();
  if (!prompt) return;

  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('ppLoading').classList.add('visible');
  document.getElementById('ppResultImg').classList.remove('visible');
  document.getElementById('btnApply').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';

  try {
    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'dall-e-3',
        prompt,
        n: 1,
        size: asset.dalleSize,
        quality: 'hd',
        response_format: 'b64_json'
      })
    });
    if (!res.ok) {
      const err = await res.json();
      alert('API 错误: ' + (err.error?.message || res.status));
      return;
    }
    const data = await res.json();
    const b64 = data.data[0].b64_json;
    const ext = asset.file.endsWith('.png') ? 'png' : 'jpeg';
    const dataUrl = `data:image/${ext};base64,${b64}`;

    const key2 = `${currentSkin}:${currentAsset}`;
    generatedAssets[key2] = dataUrl;
    lastGeneratedUrl = dataUrl;

    const img = document.getElementById('ppResultImg');
    img.src = dataUrl;
    img.classList.add('visible');
    document.getElementById('btnApply').style.display = '';
    document.getElementById('btnDownload').style.display = '';
    renderAssets();
  } catch(e) {
    alert('请求失败: ' + e.message);
  } finally {
    document.getElementById('ppLoading').classList.remove('visible');
    const k = document.getElementById('apiKey').value.trim();
    document.getElementById('btnGenerate').disabled = !k.startsWith('sk-');
  }
}

function applyToPreview() {
  renderPreview();
}

function downloadResult() {
  if (!lastGeneratedUrl) return;
  const asset = ASSETS.find(a => a.id === currentAsset);
  const a = document.createElement('a');
  a.href = lastGeneratedUrl;
  a.download = `${currentSkin}-${asset.file.split('/').pop()}`;
  a.click();
}

function copyPrompt() {
  const t = document.getElementById('ppPrompt').value;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制 Prompt', 2000);
  });
}

// ══════════════════════════════════════════════════════════════
// PHONE PREVIEW
// ══════════════════════════════════════════════════════════════
function setPreviewTab(tab, el) {
  currentPreviewTab = tab;
  document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPreview();
}

function getSkinVar(skinId, v) {
  return SKINS[skinId].vars[v] || '';
}

function getBgUrl(skinId, type) {
  const assetId = type === 'home' ? 'home-bg' : 'in-game-bg';
  return getAssetUrl(skinId, ASSETS.find(a => a.id === assetId));
}

function getTableUrl(skinId) {
  return getAssetUrl(skinId, ASSETS.find(a => a.id === 'table'));
}

function getRoleUrl(skinId, roleId) {
  return getAssetUrl(skinId, ASSETS.find(a => a.id === roleId));
}

function inlineVars(skinId) {
  return Object.entries(SKINS[skinId].vars).map(([k,v]) => `${k}:${v}`).join(';');
}

function renderPreview() {
  const frame = document.getElementById('phoneFrame');
  const skin = SKINS[currentSkin];
  const vars = inlineVars(currentSkin);
  const bgUrl = getBgUrl(currentSkin, currentPreviewTab === 'home' ? 'home' : 'game');
  const bgHtml = bgUrl
    ? `<img class="ph-bg" src="${bgUrl}" onerror="this.style.display='none'">`
    : `<div class="ph-bg-color" style="background:${skin.vars['--aw-bg']||'#000'}"></div>`;
  const maskStyle = skin.isDark
    ? 'background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,rgba(0,0,0,.7) 100%)'
    : 'background:none';

  if (currentPreviewTab === 'home') {
    frame.innerHTML = `
    <div class="phone-screen" style="${vars}">
      ${bgHtml}
      <div class="ph-mask" style="${maskStyle}"></div>
      <div class="ph-nav">
        <div class="ph-nav-back">◂ 返回</div>
        <div class="ph-nav-title">AVALON</div>
        <div class="ph-nav-right">👤</div>
      </div>
      <div class="ph-content">
        <div class="ph-panel">
          <div class="ph-panel-title">创建或加入房间</div>
          <div class="ph-input">输入房间号…</div>
          <div class="ph-btn-row">
            <div class="ph-btn-primary">创建房间</div>
            <div class="ph-btn-ghost">加入房间</div>
          </div>
        </div>
        <div class="ph-panel">
          <div class="ph-panel-title">大厅 · 3 个房间</div>
          <div class="ph-room-card">
            <div><div class="ph-room-code">#8821</div><div class="ph-room-meta">7人 · 标准配置</div></div>
            <div class="ph-room-join">加入</div>
          </div>
          <div style="height:6px"></div>
          <div class="ph-room-card">
            <div><div class="ph-room-code">#4413</div><div class="ph-room-meta">10人 · 全角色</div></div>
            <div class="ph-room-join">加入</div>
          </div>
        </div>
      </div>
    </div>`;
  } else if (currentPreviewTab === 'game') {
    const tableUrl = getTableUrl(currentSkin);
    const tableContent = tableUrl
      ? `<img class="ph-table-img" src="${tableUrl}" onerror="this.textContent='圆桌'">`
      : '<span style="font-size:9px;text-align:center;padding:4px">圆桌</span>';
    const seats = [
      [50,0],[92,14],[114,52],[100,92],[60,110],[18,92],[2,52],[24,14]
    ].map(([x,y],i) => `<div class="ph-seat" style="left:${x}%;top:${y}%;transform:translate(-50%,-50%)">👤</div>`).join('');

    frame.innerHTML = `
    <div class="phone-screen" style="${vars}">
      ${bgHtml}
      <div class="ph-mask" style="${maskStyle}"></div>
      <div class="ph-nav">
        <div class="ph-nav-back">◂</div>
        <div class="ph-nav-title">房间 #8821</div>
        <div class="ph-nav-right" style="font-size:10px;margin-left:auto;color:var(--aw-accent)">● 在线</div>
      </div>
      <div class="ph-content" style="padding-top:8px;gap:6px">
        <div class="ph-table-wrap">${tableContent}${seats}</div>
        <div class="ph-pills">
          <div class="ph-pill success">✓<span>R1</span></div>
          <div class="ph-pill fail">✗<span>R2</span></div>
          <div class="ph-pill current"><span>R3</span><span>3人</span></div>
          <div class="ph-pill"><span>R4</span></div>
          <div class="ph-pill"><span>R5</span></div>
        </div>
      </div>
      <div class="ph-action">
        <div class="ph-action-title">队长选择 3 名队员出任务</div>
        <div class="ph-chip-row">
          <div class="ph-chip"><div class="ph-chip-avatar">😊</div>2号</div>
          <div class="ph-chip"><div class="ph-chip-avatar">😎</div>5号</div>
          <div class="ph-chip" style="opacity:.4">+1</div>
        </div>
        <div class="ph-confirm-btn">确认组队</div>
      </div>
    </div>`;
  } else {
    // Role card view
    const roleId = currentAsset && ASSETS.find(a=>a.id===currentAsset && (a.tag==='good'||a.tag==='evil')) ? currentAsset : 'merlin';
    const roleAsset = ASSETS.find(a=>a.id===roleId) || ASSETS.find(a=>a.tag==='good');
    const roleUrl = getRoleUrl(currentSkin, roleAsset.id);
    const isEvil = roleAsset.tag === 'evil';
    const factionColor = isEvil ? '#f87171' : '#4ade80';
    const roleImgHtml = roleUrl
      ? `<img src="${roleUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentElement.textContent='👤'">`
      : '👤';
    const bgUrl2 = getBgUrl(currentSkin, 'game');
    const bgHtml2 = bgUrl2
      ? `<img class="ph-bg" src="${bgUrl2}" onerror="this.style.display='none'">`
      : `<div class="ph-bg-color" style="background:${skin.vars['--aw-bg']||'#000'}"></div>`;

    frame.innerHTML = `

        <div class="ph-nav-title">我的身份</div>

      <div class="ph-content" style="justify-content:center;align-items:center">
        <div style="width:140px;height:140px;border-radius:50%;border:3px solid ${factionColor};overflow:hidden;box-shadow:0 0 20px ${factionColor}44;display:flex;align-items:center;justify-content:center;font-size:50px;background:var(--aw-bg-2)">${roleImgHtml}</div>
        <div style="text-align:center;margin-top:12px">
          <div style="font-size:18px;font-weight:700;color:var(--aw-accent)">${roleAsset.name}</div>

          <div style="font-size:10px;color:var(--aw-subtext);margin-top:8px;line-height:1.5;max-width:180px">
            ${roleAsset.id==='merlin'?'你知道所有邪恶玩家的身份，引导正义走向胜利，但不能暴露自己。':
              roleAsset.id==='assassin'?'游戏结束时，你可以猜测谁是梅林，若猜对则邪恶获胜。':
              '执行你的任务，不要暴露阵营。'}
          </div>
        </div>
      </div>
    </div>`;
  }
}
