const DD_ROLE_SEED_BASE = '/tools/skin-assets/dark-dungeon/roles/';
const DD_ROLE_SLOTS = ['merlin','percival','arthur_loyal','lancelot_good','assassin','morgana','mordred','oberon','minion','lancelot_evil'];
const DD_ROLE_SEED_VERSION = 'v3'; // bump this to force-reseed all roles

async function seedDarkDungeonRoles() {
  // Check stored seed version — if mismatch, force-reseed all roles
  let storedVer = null;
  try {
    const db = await idbOpen();
    storedVer = await new Promise(r => {
      const req = db.transaction('assets').objectStore('assets').get('dd-role-seed-version');
      req.onsuccess = e => r(e.target.result || null);
      req.onerror = () => r(null);
    });
  } catch(_) {}
  const forceReseed = storedVer !== DD_ROLE_SEED_VERSION;

  for (const id of DD_ROLE_SLOTS) {
    const key = `dark-dungeon:${id}`;
    if (!forceReseed && (generatedAssets[key] || versionedAssets[key]?.length)) continue;
    try {
      const res = await fetch(DD_ROLE_SEED_BASE + id + '.jpeg?v=' + DD_ROLE_SEED_VERSION);
      if (!res.ok) continue;
      const blob = await res.blob();
      const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(blob); });
      pushVersion(key, dataUrl);
      generatedAssets[key] = dataUrl;
      idbSave(key, dataUrl);
    } catch(_) {}
  }

  // Save version so next load skips unless bumped again
  try {
    const db = await idbOpen();
    db.transaction('assets', 'readwrite').objectStore('assets').put(DD_ROLE_SEED_VERSION, 'dd-role-seed-version');
  } catch(_) {}
  if (forceReseed) renderPreview();
}

const DD_MEDAL_SEED_BASE  = '/tools/skin-assets/dark-dungeon/medals/';
const DD_ASSET_SEED_BASE  = '/tools/skin-assets/dark-dungeon/assets/';
const DD_MEDAL_IDS = ['merlin_survivor','good_blocker','good_clean_captain','good_clean_trust',
  'good_wolf_trust','good_first_round_clean_captain','good_three_evil_team_captain','good_three_fail_lose',
  'merlin_three_fail_lose','percival_morgana_trust','good_comeback_win','good_three_success_participant',
  'assassin_early_hit_merlin','morgana_percival_fail_master','oberon_no_fail_with_evil','oberon_double_fail_with_evil',
  'evil_protect_round_fail','evil_three_fail_win','evil_hide_votes_master','evil_all_fail_non_protect',
  'evil_first_three_fail_win','evil_three_fail_participant','evil_no_fail_win','evil_fake_good_voter'];
const DD_ASSET_IDS = ['home-bg','in-game-bg','table','quest-success','quest-fail',
  'kill-icon','history-icon','stats-icon','panel-frame','panel-texture','btn-texture','divider',
  'leader-badge','icon-good','icon-evil'];

const DD_EXTRAS_SEED_VERSION = 'v6'; // bump to force-reseed medals + assets

async function seedDarkDungeonExtras() {
  // Check stored version — if mismatch, force-reseed all extras
  let storedVer = null;
  try {
    const db = await idbOpen();
    storedVer = await new Promise(r => {
      const req = db.transaction('assets').objectStore('assets').get('dd-extras-seed-version');
      req.onsuccess = e => r(e.target.result || null);
      req.onerror = () => r(null);
    });
  } catch(_) {}
  const forceReseed = storedVer !== DD_EXTRAS_SEED_VERSION;

  let _anyAssetLoaded = false;
  async function seedOne(key, url) {
    if (!forceReseed && (generatedAssets[key] || versionedAssets[key]?.length)) return;
    try {
      const res = await fetch(url + '?v=' + DD_EXTRAS_SEED_VERSION);
      if (!res.ok) return;
      const blob = await res.blob();
      const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(blob); });
      // On force-reseed: replace all existing versions with just this new seeded one
      if (forceReseed) {
        versionedAssets[key] = [dataUrl];
        idbSaveVersions(key, versionedAssets[key]);
      } else {
        pushVersion(key, dataUrl);
      }
      generatedAssets[key] = dataUrl;
      idbSave(key, dataUrl);
      _anyAssetLoaded = true;
    } catch(_) {}
  }

  // Seed assets first (parallel) so preview loads immediately, medals after
  await Promise.all(DD_ASSET_IDS.map(id =>
    seedOne(`dark-dungeon:${id}`, DD_ASSET_SEED_BASE + id + '.jpeg')
  ));
  if (_anyAssetLoaded || forceReseed) renderPreview(); // show assets right away

  // Medals in parallel batches of 6 (avoid too many concurrent requests)
  for (let i = 0; i < DD_MEDAL_IDS.length; i += 6) {
    await Promise.all(DD_MEDAL_IDS.slice(i, i + 6).map(id =>
      seedOne(`dark-dungeon:${id}`, DD_MEDAL_SEED_BASE + id + '.jpeg')
    ));
  }

  try {
    const db = await idbOpen();
    db.transaction('assets', 'readwrite').objectStore('assets').put(DD_EXTRAS_SEED_VERSION, 'dd-extras-seed-version');
  } catch(_) {}
}

const DG_SEED_VERSION = 'v1'; // bump to force-reseed

async function seedDarkGoldAssets() {
  let storedVer = null;
  try {
    const db = await idbOpen();
    storedVer = await new Promise(r => {
      const req = db.transaction('assets').objectStore('assets').get('dg-seed-version');
      req.onsuccess = e => r(e.target.result || null);
      req.onerror = () => r(null);
    });
  } catch(_) {}
  const forceReseed = storedVer !== DG_SEED_VERSION;

  let anyLoaded = false;
  async function seedOne(key, url) {
    if (!forceReseed && (generatedAssets[key] || versionedAssets[key]?.length)) return;
    try {
      const res = await fetch(url + '?v=' + DG_SEED_VERSION);
      if (!res.ok) return;
      const blob = await res.blob();
      const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(blob); });
      if (forceReseed) {
        versionedAssets[key] = [dataUrl];
        idbSaveVersions(key, versionedAssets[key]);
      } else {
        pushVersion(key, dataUrl);
      }
      generatedAssets[key] = dataUrl;
      idbSave(key, dataUrl);
      anyLoaded = true;
    } catch(_) {}
  }

  // Assets + roles in parallel
  await Promise.all([
    ...Object.entries(DG_ASSET_MAP).map(([id, url]) => seedOne(`dark-gold:${id}`, url)),

  try {
    const db = await idbOpen();
    db.transaction('assets', 'readwrite').objectStore('assets').put(DG_SEED_VERSION, 'dg-seed-version');
  } catch(_) {}
}

// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const DEFAULT_KEY = 'ark-760ac07f-94d8-4b50-9759-2ec350b69521-3e5ad';
  const saved = localStorage.getItem('api_key') || localStorage.getItem('openai_key') || DEFAULT_KEY;
  if (saved) {
    localStorage.setItem('api_key', saved);
    document.getElementById('apiKey').value = saved;
    document.getElementById('mobApiKey').value = saved;
    updateKeyStatus();
  }
  renderSkinTabs();

  // Restore persisted assets first, then render
  idbLoadAll().then(async persisted => {
    // Separate version arrays, ref images, and asset dataURLs
    for (const [k, v] of Object.entries(persisted)) {
      if (k.startsWith('versions:')) {
        if (Array.isArray(v)) versionedAssets[k.slice(9)] = v;
      } else if (k.startsWith('ref-imgs:')) {
        if (Array.isArray(v) && v.length) refImgsCache[k.slice(9)] = v;
      } else {
        generatedAssets[k] = v;
      }
    }
    // Migrate any legacy localStorage ref-imgs (one-time)
    for (const skinId of Object.keys(SKINS)) {
      const legacyOne = localStorage.getItem(`ref-img:${skinId}`);
      const legacyArr = localStorage.getItem(`ref-imgs:${skinId}`);
      const src = legacyOne ? [legacyOne] : (legacyArr ? (() => { try { return JSON.parse(legacyArr); } catch(_) { return null; } })() : null);
      if (src?.length) {
        refImgsCache[skinId] = src;
        saveRefImgs(skinId, src);
        localStorage.removeItem(`ref-img:${skinId}`);
        localStorage.removeItem(`ref-imgs:${skinId}`);
      }
    }
    // Seed dark-gold default assets (non-blocking)
    seedDarkGoldAssets();
    // Seed pre-generated dark-dungeon images as v1 in background (non-blocking)
    seedDarkDungeonRoles();
    seedDarkDungeonExtras();
    // Sync ref images from server (merges with IDB, non-blocking)
    syncRefImgsFromServer();
    renderAssets();
    selectAsset('home-bg');
    if (isMobile()) {
      switchMobilePanel('preview');
    }
    renderSubtabs();
    renderPreview();
    // Auto-load all skins' generated assets from server on startup (non-blocking)
    autoLoadAllSkinsFromServer();
    initQAHistoryBtn();
  });
});

// ── Mobile panel switching ──
let currentMobilePanel = 'preview';
const MOB_PANELS = {assets:'assetPanel', prompt:'promptPanel', preview:'previewPanel'};
const MOB_TABS   = {assets:'mobTabAssets', preview:'mobTabPreview'};
function switchMobilePanel(panel) {
  if (currentMobilePanel === panel) return; // already on this panel, do nothing
  currentMobilePanel = panel;
  Object.keys(MOB_PANELS).forEach(p => {
    const el  = document.getElementById(MOB_PANELS[p]);
    const tab = document.getElementById(MOB_TABS[p]);
    if (el)  { if (p === panel) el.classList.add('mob-active');  else el.classList.remove('mob-active'); }
    if (tab) { if (p === panel) tab.classList.add('active'); else tab.classList.remove('active'); }
  });
  // Show/hide preview action buttons on mobile
  const btns = document.getElementById('previewBtns');
  if (btns && isMobile()) btns.style.display = panel === 'preview' ? 'flex' : 'none';
  if (panel === 'preview') requestAnimationFrame(scalePhoneFrame);
}
function isMobile() { return window.innerWidth <= 768; }

function scalePhoneFrame() {
  const frame = document.getElementById('phoneFrame');
  if (!frame) return;
  if (!isMobile()) { frame.style.transform = ''; frame.style.marginBottom = ''; return; }
  const panel = document.getElementById('previewPanel');
  if (!panel) return;
  // Panel has padding-top:36px (tab bar) + padding-bottom:56px (mob-nav) applied via CSS
  // Available visual area for the phone
  const availW = panel.clientWidth;
  const availH = panel.clientHeight - 36 - 56;
  const scaleW = availW / 280;
  const scaleH = availH / 560;
  const scale  = Math.min(scaleW, scaleH, 3.0);
  frame.style.transform = `scale(${scale})`;
  frame.style.transformOrigin = 'top center';
  frame.style.marginBottom = Math.max(0, Math.round(560 * (scale - 1))) + 'px';
}
window.addEventListener('resize', () => { if (isMobile() && currentMobilePanel === 'preview') scalePhoneFrame(); });

function getAssetUrl(skinId, asset) {
  const key = `${skinId}:${asset.id}`;
  if (generatedAssets[key]) return generatedAssets[key];
  if (skinId === 'dark-gold' || asset.cdnAlways) return `${CDN}/${asset.cdnFile || asset.file}`;
  return null;
}

// Ref images: stored as server URLs on awalon.top/api/ref-imgs/:skinId
// Cache also persisted in IDB (URLs are tiny, no quota issue)
const refImgsCache = {}; // skinId → [url, ...] — populated from IDB + server at startup

function getRefImgs(skinId) {
  return refImgsCache[skinId] || [];
}

function saveRefImgs(skinId, arr) {
  if (arr.length) refImgsCache[skinId] = arr;
  else delete refImgsCache[skinId];
  idbOpen().then(db => {
    const tx = db.transaction('assets', 'readwrite');
    if (arr.length) tx.objectStore('assets').put(arr, `ref-imgs:${skinId}`);
    else            tx.objectStore('assets').delete(`ref-imgs:${skinId}`);
  }).catch(() => {});
}

async function syncRefImgsFromServer() {
  for (const skinId of Object.keys(SKINS)) {
    try {
      const res = await fetch(`/api/ref-imgs/${skinId}`);
      if (!res.ok) continue;
      const { urls } = await res.json();
      if (!urls?.length) continue;
      // Merge: add any server URLs not already in cache
      const existing = refImgsCache[skinId] || [];
      const merged = [...existing];
      for (const u of urls) {
        if (!merged.includes(u)) merged.push(u);
      }
      if (merged.length !== existing.length) {
        saveRefImgs(skinId, merged);
      }
    } catch (_) {}
  }
  renderAssets();
}

function triggerRefImgUpload() {
  document.getElementById('refImgInput').value = '';
  document.getElementById('refImgInput').click();
}

async function handleRefImgUpload(event) {
  const files = [...event.target.files];
  if (!files.length) return;
  const imgs = getRefImgs(currentSkin);
  // Upload one image at a time to avoid body size limits
  for (const file of files) {
    const dataUrl = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
    let uploaded = false;
    try {
      const res = await fetch(`/api/ref-imgs/${currentSkin}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: [dataUrl] }),
      });
      if (res.ok) {
        const { urls } = await res.json();
        if (urls?.length) { imgs.push(urls[0]); uploaded = true; }
      }
    } catch (_) {}
    // Fallback: store base64 in IDB if server upload fails
    if (!uploaded) imgs.push(dataUrl);
  }
  saveRefImgs(currentSkin, imgs);
  renderAssets();
}

function removeRefImg(idx) {
  const imgs = getRefImgs(currentSkin);
  const url = imgs[idx];
  // If it's a server URL, delete from server too
  if (url && url.startsWith('/tools/skin-assets/ref-imgs/')) {
    const parts = url.split('/');
    const filename = parts[parts.length - 1];
    fetch(`/api/ref-imgs/${currentSkin}/${filename}`, { method: 'DELETE' }).catch(() => {});
  }
  imgs.splice(idx, 1);
  saveRefImgs(currentSkin, imgs);
  renderAssets();
}

function openRefImg(idx) {
  const imgs = getRefImgs(currentSkin);
  const url = imgs[typeof idx === 'number' ? idx : 0];
  if (!url) return;
  const w = window.open('', '_blank');
  w.document.write(`<html><body style="margin:0;background:#000"><img src="${url}" style="max-width:100%;height:auto"></body></html>`);
  w.document.close();
}

function renderAssets() {
  const container = document.getElementById('assetPanel');
  const cats = [...new Set(ASSETS.map(a => a.cat))];
  container.innerHTML = renderRefImgSection() + cats.map(cat => {
    const items = ASSETS.filter(a => a.cat === cat);
    return `<div class="asset-cat">${cat}</div>` + items.map(a => {
      const key = `${currentSkin}:${a.id}`;
      const hasGen = !!generatedAssets[key];

      if (a.slots) {
        // ── Atlas parent row ──
        const slotCount = a.slots.filter(s => s).length;
        const doneCount = a.slots.filter(s => s && generatedAssets[`${currentSkin}:${s.id}`]).length;
        const atlasUrl  = generatedAssets[key];
        const firstSlot = a.slots.find(s => s);
        const thumbUrl  = atlasUrl
          || (firstSlot ? (generatedAssets[`${currentSkin}:${firstSlot.id}`]
              || (firstSlot.cdnFile ? `${CDN}/${firstSlot.cdnFile}` : null)) : null);
        const thumbHtml = thumbUrl
          ? `<img src="${thumbUrl}" onerror="this.style.display='none'"/>`
          : `<span style="font-size:16px">🗂️</span>`;
        const isExpanded = expandedAtlases.has(a.id);
        const isActive   = currentAsset === a.id && !currentSlot;

        let html = `<div class="asset-item ${isActive?'active':''}" onclick="selectAsset('${a.id}')">
          <div class="asset-thumb">${thumbHtml}</div>
          <div class="asset-info">
            <div class="asset-name">${a.name}</div>
            <div class="asset-file">${a.file.split('/').pop()}</div>
            <div style="font-size:9px;color:${doneCount===slotCount&&slotCount>0?'#4ade80':'var(--c-sub)'};margin-top:1px">${doneCount}/${slotCount} 已裁切</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            ${hasGen ? '<div class="asset-badge"></div>' : ''}
            <div class="atlas-toggle" onclick="event.stopPropagation();toggleAtlas('${a.id}')" title="${isExpanded?'收起':'展开'}">${isExpanded?'▾':'▸'}</div>
          </div>
        </div>`;

        // ── Child slot rows (shown when expanded) ──
        if (isExpanded) {
          html += '<div class="slot-children">' + a.slots.map((slot, idx) => {
            if (!slot) return '';
            const slotKey = `${currentSkin}:${slot.id}`;
            const slotUrl = generatedAssets[slotKey]
              || (currentSkin === 'dark-dungeon' && slot.ddPregen)
              || (slot.cdnFile ? `${CDN}/${slot.cdnFile}` : null)
              || (a.id === 'medals-atlas' ? `${CDN}/medals/${slot.id === 'good_first_round_clean_captain' ? 'good_protect_round_fail_captain' : slot.id}.png` : null);
            const slotThumb = slotUrl
              ? `<img src="${slotUrl}" onerror="this.style.display='none'"/>`
              : `<span style="font-size:11px">·</span>`;
            const isSlotActive = currentAsset === a.id && currentSlot === slot.id;
            const hasCrop = !!generatedAssets[slotKey];
            return `<div class="asset-item slot-item ${isSlotActive?'active':''}" onclick="selectSlot('${a.id}','${slot.id}')">
              <div class="asset-thumb slot-thumb">${slotThumb}</div>
              <div class="asset-info">
                <div class="asset-name" style="font-size:11px">${slot.name}</div>
                <div class="asset-file" style="font-size:9px">${slot.id}</div>
              </div>
              ${hasCrop ? '<div class="asset-badge"></div>' : ''}
            </div>`;
          }).join('') + '</div>';
        }
        return html;

      } else {
        // ── Regular asset row ──
        const url = getAssetUrl(currentSkin, a);
        const thumbContent = url
          ? `<img src="${url}" onerror="this.parentElement.textContent='${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':'🗡️'}'"/>`
          : `<span style="font-size:16px">${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':'🗡️'}</span>`;
        const isActive = currentAsset === a.id && !currentSlot;
        return `<div class="asset-item ${isActive?'active':''}" onclick="selectAsset('${a.id}')">
          <div class="asset-thumb">${thumbContent}</div>
          <div class="asset-info">
            <div class="asset-name">${a.name}</div>
            <div class="asset-file">${a.file.split('/').pop()}</div>
          </div>
          <div class="tag-dot" style="background:${a.tagColor}"></div>
          ${hasGen ? '<div class="asset-badge"></div>' : ''}
        </div>`;
      }
    }).join('');
  }).join('');
}

function selectAsset(id) {
  currentAsset = id;
  currentSlot  = null;

  if (isMobile()) switchMobilePanel('prompt');
  document.getElementById('ppName').textContent = asset.name;
  document.getElementById('ppSpec').textContent = asset.spec;
  document.getElementById('btnCopy').style.display = '';

  const isAtlas = !!asset.slots;
  const isFont  = !!asset.isFont;
  document.getElementById('atlasView').style.display = isAtlas ? '' : 'none';
  document.getElementById('promptArea').style.display = '';  // always visible

  if (isFont) {
    document.getElementById('ppPrompt').value = '字体文件需手动下载并上传。推荐字体：Zpix 像素字体（中文像素风格）或 Cinzel Decorative（拉丁字符哥特风格）。上传至 CDN 路径后填写 URL。';
    document.getElementById('btnGenerate').disabled = true;
    document.getElementById('btnStitch').style.display = 'none';
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnDownload').style.display = 'none';
    const ri = document.getElementById('ppResultImg');
    ri.classList.remove('visible');
    renderAssets();
    return;
  }

  document.getElementById('ppPrompt').value = prompt;        // atlas prompt also shown

  if (isAtlas) {
    // Clear any leftover result image from a previously selected slot
    const ri = document.getElementById('ppResultImg');
    ri.classList.remove('visible');
    document.getElementById('ppVersions').classList.remove('visible');
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnDownload').style.display = 'none';
    const alreadyStitched = !!generatedAssets[`${currentSkin}:${id}`];
    renderAtlasView(asset);
    if (!alreadyStitched) {
      stitchFromCDN();
    }
  } else {
    const key = `${currentSkin}:${id}`;
    const resultImg = document.getElementById('ppResultImg');
    if (generatedAssets[key]) {
      resultImg.src = generatedAssets[key];
      resultImg.classList.add('visible');
      lastGeneratedUrl = generatedAssets[key];
      document.getElementById('btnApply').style.display = '';
      document.getElementById('btnDownload').style.display = '';
    } else {
      resultImg.classList.remove('visible');
      lastGeneratedUrl = null;
      document.getElementById('btnApply').style.display = 'none';
      document.getElementById('btnDownload').style.display = 'none';
    }
    renderVersions(key);
  }

  const k = document.getElementById('apiKey').value.trim();
  document.getElementById('btnGenerate').disabled = isAtlas || !isValidKey(k);
  if (isAtlas) {
    const alreadyDone = !!generatedAssets[`${currentSkin}:${id}`];
    const stitchBtn = document.getElementById('btnStitch');
    stitchBtn.style.display = '';
    stitchBtn.textContent = alreadyDone ? '🔄 重新拼接' : '🧩 拼接现有素材';
  } else {
    document.getElementById('btnStitch').style.display = 'none';
  }
  document.getElementById('btnApply').style.display  = isAtlas ? 'none' : (generatedAssets[`${currentSkin}:${id}`] ? '' : 'none');
  document.getElementById('btnDownload').style.display = isAtlas ? 'none' : (generatedAssets[`${currentSkin}:${id}`] ? '' : 'none');
  renderAssets();
}

// STITCH FROM CDN
// ══════════════════════════════════════════════════════════════
function slotCdnUrl(atlasId, slot) {
  if (atlasId === 'roles-atlas') return CDN + '/' + slot.cdnFile;
  const fc = slot.id === 'good_first_round_clean_captain' ? 'good_protect_round_fail_captain' : slot.id;
  return CDN + '/medals/' + fc + '.png';
}

async function loadImgBlob(url) {
  // fetch as blob → objectURL avoids canvas CORS taint
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(resp.status);
  const blob = await resp.blob();
  return URL.createObjectURL(blob);
}

async function stitchFromCDN() {
  const asset = ASSETS.find(a => a.id === currentAsset);
  if (!asset || !asset.slots) return;

  const slots = asset.slots.filter(s => s);
  const { cols, rows } = asset.grid;
  const CELL = 256;

  const progressEl = document.getElementById('stitchProgress');
  const btn = document.getElementById('btnStitch');
  btn.disabled = true;
  progressEl.style.display = '';
  progressEl.textContent = '正在加载…';

  // Try canvas path (fetch → blob → objectURL → drawImage, no CORS taint)
  let canvasOk = false;
  try {
    const canvas = document.createElement('canvas');
    canvas.width  = cols * CELL;
    canvas.height = rows * CELL;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0b11';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let idx = 0; idx < asset.slots.length; idx++) {
      const slot = asset.slots[idx];
      if (!slot) continue;
      progressEl.textContent = `加载 ${slot.name}… (${Math.round(idx/asset.slots.length*100)}%)`;
      const slotKey = `${currentSkin}:${slot.id}`;
      const slotSrc = generatedAssets[slotKey]
        || (currentSkin === 'dark-dungeon' && slot.ddPregen ? slot.ddPregen : null)
        || slotCdnUrl(asset.id, slot);
      // dataURLs can be drawn directly; HTTP URLs need blob→objectURL to avoid CORS taint
      const isDataUrl = slotSrc.startsWith('data:');
      const objUrl = isDataUrl ? slotSrc : await loadImgBlob(slotSrc);
      await new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => {
          const col = idx % cols, row = Math.floor(idx / cols);
          // Square crop: center horizontally, top-align vertically for portrait images
          const size = Math.min(img.naturalWidth, img.naturalHeight);
          const sx = (img.naturalWidth  - size) / 2;
          const sy = img.naturalHeight > img.naturalWidth
            ? Math.floor(img.naturalHeight * 0.05)   // portrait: 5% from top keeps head in frame
            : (img.naturalHeight - size) / 2;         // square/landscape: center
          ctx.drawImage(img, sx, sy, size, size, col * CELL, row * CELL, CELL, CELL);
          if (!isDataUrl) URL.revokeObjectURL(objUrl);
          res();
        };
        img.onerror = rej;
        img.src = objUrl;
      });
    }

    const dataUrl = canvas.toDataURL('image/png');
    generatedAssets[`${currentSkin}:${currentAsset}`] = dataUrl;
    idbSave(`${currentSkin}:${currentAsset}`, dataUrl);
    lastGeneratedUrl = dataUrl;
    pushVersion(`${currentSkin}:${currentAsset}`, dataUrl);
    // Do NOT call splitAtlas — slot images already have user's custom versions

    canvasOk = true;
    progressEl.textContent = `✓ 拼接完成，已裁切 ${slots.length} 个子资源`;

  } catch(e) {
    console.warn('canvas path failed:', e);
  }

  // Fallback: canvas path failed — just report error, don't overwrite slot images
  if (!canvasOk) {
    progressEl.textContent = `✗ 拼接失败，请检查网络`;
  }

  document.getElementById('btnApply').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';
  btn.disabled = false;
  btn.textContent = '🔄 重新拼接';
  expandedAtlases.add(currentAsset);
  // Refresh atlas grid view
  const stitchedAsset = ASSETS.find(a => a.id === currentAsset);
  if (stitchedAsset) renderAtlasView(stitchedAsset);
}

// ── Generic batch generation ──────────────────────────────────
let bvSelected   = new Set(); // keys selected for generation
let bvAllKeys    = [];        // all task keys in current batch view
let bvGroupMap   = {};        // groupName → [key, ...]
let bvBatchSkinId = '';
let bvBatchApiKey = '';
let bvBatchTasks  = [];

function getDoubaoSizeForAsset(asset) {
  if (asset.doubaoSize) return asset.doubaoSize;
  const d = asset.dalleSize || '1024x1024';
  if (d === '1024x1024') return '1920x1920';
  if (d === '1024x1792') return '1440x2560';
  if (d === '1792x1024') return '2560x1440';
  return '1920x1920';
}

function getMedalPromptForBatch(skinId, slotId, slotName) {
  if (skinId === 'dark-dungeon' && DD_MEDAL_DESCS[slotId]) {
    const p = PROMPTS['dark-dungeon']?.['medals-atlas'] || '';
    const end = p.indexOf('Row 1:');
    const header = end > 0 ? p.slice(0, end).trim() : p.slice(0, 400);
    return `Single icon only. ${header} Single icon cell: [${DD_MEDAL_DESCS[slotId]}]. Square 1:1, icon centered with even margins, no other icons, no grid, no text.`;
  }
  return getMedalSlotPrompt(skinId, slotId, slotName);
}

function buildSkinTasks(skinId, apiKey) {
  const doubao = isDoubaoKey(apiKey);
  const tasks = [];
  for (const asset of ASSETS) {
    if (asset.isFont) continue;
    if (asset.slots) {
      for (const slot of asset.slots) {
        if (!slot) continue;
        const prompt = asset.id === 'roles-atlas'
          ? getRoleSlotPrompt(skinId, slot.id)
          : getMedalPromptForBatch(skinId, slot.id, slot.name);
        if (!prompt) continue;
        tasks.push({ key:`${skinId}:${slot.id}`, name:slot.name, group:asset.name, prompt, size: doubao ? '1920x1920' : '1024x1024' });
      }
    } else {
      const prompt = PROMPTS[skinId]?.[asset.id];
      if (!prompt) continue;
      const size = doubao ? getDoubaoSizeForAsset(asset) : asset.dalleSize;
      if (!size) continue;
      tasks.push({ key:`${skinId}:${asset.id}`, name:asset.name, group:asset.cat, prompt, size });
    }
  }
  return tasks;
}

function bvKey(key) { return 'bv-' + key.replace(/[^a-z0-9]/gi, '-'); }

// Best available thumb for a key: active image or latest version
function bvThumbUrl(key) {
  return generatedAssets[key]
    || (versionedAssets[key]?.length ? versionedAssets[key][versionedAssets[key].length - 1] : null);
}

function bvHasAny(key) { return !!(generatedAssets[key] || versionedAssets[key]?.length); }

function openBatchView() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!isValidKey(apiKey)) { alert('请先输入有效的 API Key'); return; }
  const skinId = currentSkin;
  const skin   = SKINS[skinId];
  const tasks  = buildSkinTasks(skinId, apiKey);
  if (!tasks.length) { alert('当前皮肤没有可生成的素材'); return; }

  // Default: select only items without existing assets
  bvSelected = new Set(tasks.filter(t => !bvHasAny(t.key)).map(t => t.key));
  // If everything already has assets, select all
  if (bvSelected.size === 0) bvSelected = new Set(tasks.map(t => t.key));

  renderBatchSelectionView(skinId, skin, tasks, apiKey);
}

function renderBatchSelectionView(skinId, skin, tasks, apiKey) {
  bvAllKeys     = tasks.map(t => t.key);
  bvBatchSkinId = skinId;
  bvBatchApiKey = apiKey;
  bvBatchTasks  = tasks;
  const groups = {};
  for (const t of tasks) { if (!groups[t.group]) groups[t.group] = []; groups[t.group].push(t); }

  // Build bvGroupMap for group-level toggle
  bvGroupMap = {};
  for (const [grp, items] of Object.entries(groups)) {
    bvGroupMap[grp] = items.map(t => t.key);
  }

  let listHtml = '';
  for (const [grp, items] of Object.entries(groups)) {
    const grpHas = items.filter(t => bvHasAny(t.key)).length;
    const grpSel = items.filter(t => bvSelected.has(t.key)).length;
    const grpAllSel = grpSel === items.length;
    const grpId = 'bvg-' + grp.replace(/[^a-z0-9]/gi, '_');
    listHtml += `<div class="bv-group" onclick="bvGroupToggle('${grp}')">
      <input type="checkbox" class="bv-cb" id="${grpId}-cb" ${grpAllSel ? 'checked' : ''} onclick="event.stopPropagation();bvGroupToggle('${grp}')">
      <span class="bv-group-label">${grp}</span>
      <span class="bv-group-count">${grpSel}/${items.length}${grpHas ? ' · ' + grpHas + ' 已有图' : ''}</span>
    </div>`;
    for (const t of items) {
      const id = bvKey(t.key);
      const thumb = bvThumbUrl(t.key);
      const hasAny = bvHasAny(t.key);
      const sel = bvSelected.has(t.key);
      listHtml += `
        <div class="bv-item ${sel ? '' : 'bv-unselected'}" id="${id}" onclick="bvToggle('${t.key}')">
          <div class="bv-cb-wrap"><input type="checkbox" class="bv-cb" id="${id}-cb" ${sel ? 'checked' : ''} onclick="event.stopPropagation();bvToggle('${t.key}')"></div>
          <div class="bv-thumb" id="${id}-th">${thumb ? `<img src="${thumb}" style="width:100%;height:100%;object-fit:cover;border-radius:5px">` : ''}</div>
          <div class="bv-info">
            <div class="bv-iname">${t.name}</div>
            <div class="bv-istatus" id="${id}-st">
              <span class="bv-dot ${hasAny ? 'bv-dot-done' : 'bv-dot-idle'}"></span>
              ${hasAny ? '已有图' : '未生成'}
            </div>
          </div>
          ${hasAny ? '<span class="bv-has-badge">已有</span>' : ''}
        </div>`;
    }
  }

  const selCount = bvSelected.size;
  const view = document.getElementById('batchView');
  view.innerHTML = `
    <div class="bv-header">
      <button class="bv-back" onclick="closeBatchView()">← 返回</button>
      <div class="bv-title">
        <div class="bv-skin-chip" style="background:${skin.chip};border-color:${skin.chipBorder}"></div>
        批量生成 · ${skin.name}
      </div>
    </div>
    <div class="bv-sel-bar" id="bvSelBar">
      <span class="bv-sel-info">已选 <b id="bvSelCount">${selCount}</b> / ${tasks.length} 项</span>
      <button class="bv-filter-btn" onclick="bvSelectAll()">全选</button>
      <button class="bv-filter-btn" onclick="bvSelectNone()">全不选</button>
      <button class="bv-filter-btn" onclick="bvSelectMissing()">只选未生成</button>
      <button class="bv-start-btn" id="bvStartBtn" onclick="bvStartGenerate()" ${selCount === 0 ? 'disabled' : ''}>开始生成 (${selCount})</button>
    </div>
    <div class="bv-list" id="bvList">${listHtml}</div>`;

  view.style.display = 'flex';
}

function bvToggle(key) {
  if (bvSelected.has(key)) bvSelected.delete(key); else bvSelected.add(key);
  const id = bvKey(key);
  const itemEl = document.getElementById(id);
  const cbEl   = document.getElementById(id + '-cb');
  if (itemEl) itemEl.classList.toggle('bv-unselected', !bvSelected.has(key));
  if (cbEl)   cbEl.checked = bvSelected.has(key);
  bvSyncGroupCheckboxes();
  bvUpdateSelBar();
}

function bvSelectAll() {
  bvSelected = new Set(bvAllKeys);
  bvSyncCheckboxes();
  bvUpdateSelBar();
}

function bvSelectNone() {
  bvSelected = new Set();
  bvSyncCheckboxes();
  bvUpdateSelBar();
}

function bvSelectMissing() {
  bvSelected = new Set(bvAllKeys.filter(k => !bvHasAny(k)));
  if (bvSelected.size === 0) bvSelected = new Set(bvAllKeys);
  bvSyncCheckboxes();
  bvUpdateSelBar();
}

function bvGroupToggle(grp) {
  const keys = bvGroupMap[grp] || [];
  const allSel = keys.every(k => bvSelected.has(k));
  if (allSel) keys.forEach(k => bvSelected.delete(k));
  else        keys.forEach(k => bvSelected.add(k));
  bvSyncCheckboxes();
  bvUpdateSelBar();
}

function bvSyncGroupCheckboxes() {
  for (const [grp, keys] of Object.entries(bvGroupMap)) {
    const grpId = 'bvg-' + grp.replace(/[^a-z0-9]/gi, '_');
    const cbEl = document.getElementById(grpId + '-cb');
    if (!cbEl) continue;
    const selCount = keys.filter(k => bvSelected.has(k)).length;
    cbEl.checked       = selCount === keys.length;
    cbEl.indeterminate = selCount > 0 && selCount < keys.length;
    // update count label
    const countEl = cbEl.parentElement?.querySelector('.bv-group-count');
    if (countEl) {
      const grpHas = keys.filter(k => bvHasAny(k)).length;
      countEl.textContent = `${selCount}/${keys.length}${grpHas ? ' · ' + grpHas + ' 已有图' : ''}`;
    }
  }
}

function bvSyncCheckboxes() {
  for (const key of bvAllKeys) {
    const id = bvKey(key);
    const itemEl = document.getElementById(id);
    const cbEl   = document.getElementById(id + '-cb');
    if (itemEl) itemEl.classList.toggle('bv-unselected', !bvSelected.has(key));
    if (cbEl)   cbEl.checked = bvSelected.has(key);
  }
  bvSyncGroupCheckboxes();
}

function bvUpdateSelBar() {
  const n = bvSelected.size;
  const countEl = document.getElementById('bvSelCount');
  const startBtn = document.getElementById('bvStartBtn');
  if (countEl)  countEl.textContent = n;

function bvStartGenerate() {
  const skinId = bvBatchSkinId, apiKey = bvBatchApiKey;

  if (!selectedTasks.length) return;

    <button class="bv-stop" id="bvStop" onclick="batchStop=true;this.disabled=true;this.textContent='停止中…'">停止</button>`;

function closeBatchView() {

async function runBatchTasks(skinId, selectedTasks, apiKey) {
  const total   = selectedTasks.length;
  let done      = 0;
  let idx       = 0;
  const CONCUR  = 3;
  const doubao  = isDoubaoKey(apiKey);

  function updateBar() {
    const pct    = Math.round(done / total * 100);
    const fillEl = document.getElementById('bvFill');
    const doneEl = document.getElementById('bvDone');
    const pctEl  = document.getElementById('bvPct');
    if (fillEl) fillEl.style.width = pct + '%';
    if (doneEl) doneEl.textContent = done;
    if (pctEl)  pctEl.textContent  = pct + '%';
  }

  async function runOne(task) {
    if (batchStop) return;
    const id     = bvKey(task.key);
    const itemEl = document.getElementById(id);
    const stEl   = document.getElementById(id + '-st');
    const thEl   = document.getElementById(id + '-th');

    if (itemEl) { itemEl.classList.add('active'); itemEl.classList.remove('bv-unselected'); }
    if (stEl)   stEl.innerHTML = '<span class="bv-dot bv-dot-active"></span>生成中…';
    if (thEl)   thEl.innerHTML = '<div class="bv-thumb-spin">⚡</div>';

    try {
      let dataUrl;
      if (doubao) {
        const { b64, mimeType } = await callDoubao(apiKey, task.prompt, task.size);
        const ext = (mimeType || '').split('/')[1] || 'jpeg';
        dataUrl = await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`);
      } else {
        const { b64, mimeType } = await callOpenAI(apiKey, task.prompt, task.size);
        const ext = (mimeType || '').split('/')[1] || 'png';
        dataUrl = `data:image/${ext};base64,${b64}`;
      }
      // Push to server → store URL instead of base64
      let storeUrl = dataUrl;
      try {
        const [bSkin, bAsset] = task.key.split(':');
        const svRes = await fetch('/api/save-asset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ skinId: bSkin, assetId: bAsset, dataUrl }),
        });
        if (svRes.ok) { const sv = await svRes.json(); if (sv.assetUrl) storeUrl = sv.assetUrl; }
      } catch(_) {}
      generatedAssets[task.key] = storeUrl;
      idbSave(task.key, storeUrl);
      pushVersion(task.key, storeUrl);
      if (stEl)  stEl.innerHTML = '<span class="bv-dot bv-dot-done"></span>完成';
      if (thEl)  thEl.innerHTML = `<img src="${storeUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:5px">`;
      const badge = itemEl?.querySelector('.bv-has-badge');
      if (!badge && itemEl) { const b = document.createElement('span'); b.className='bv-has-badge'; b.textContent='已有'; itemEl.appendChild(b); }
    } catch(e) {
      console.error('[batch]', task.key, e);
      if (stEl) stEl.innerHTML = `<span class="bv-dot bv-dot-err"></span>失败`;
      if (thEl) thEl.innerHTML = '<div class="bv-thumb-err">✕</div>';
    }

    if (itemEl) itemEl.classList.remove('active');
    done++;
    updateBar();
  }

  // Concurrency pool: keep CONCUR workers running until queue is empty
  async function worker() {
    while (idx < selectedTasks.length && !batchStop) {
      const task = selectedTasks[idx++];
      await runOne(task);
    }
  }

  const workers = Array.from({ length: Math.min(CONCUR, total) }, worker);
  await Promise.all(workers);

  const stopBtn = document.getElementById('bvStop');
  if (stopBtn) stopBtn.style.display = 'none';
}

// ══════════════════════════════════════════════════════════════
// ATLAS SPLITTING
// ══════════════════════════════════════════════════════════════
function splitAtlas(skinId, asset, dataUrl, onDone) {
  if (!asset.slots || !asset.grid) return;
  const { cols, rows } = asset.grid;
  const image = new Image();
  image.onload = () => {
    const cw = image.naturalWidth  / cols;
    const ch = image.naturalHeight / rows;
    // Center-square crop so non-4:3 source images still produce square avatars
    const size = Math.round(Math.min(cw, ch));
    asset.slots.forEach((slot, idx) => {
      if (!slot) return;
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const sx = col * cw + (cw - size) / 2;
      const sy = row * ch + (ch - size) / 2;
      const canvas = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      canvas.getContext('2d').drawImage(image, sx, sy, size, size, 0, 0, size, size);
      const slotKey = skinId + ':' + slot.id;
      const slotDataUrl = canvas.toDataURL('image/png');
      generatedAssets[slotKey] = slotDataUrl;
      idbSave(slotKey, slotDataUrl);
    });
    if (onDone) onDone();
  };
  image.src = dataUrl;
}

// ══════════════════════════════════════════════════════════════
// GENERATION
// ══════════════════════════════════════════════════════════════
const DOUBAO_MODEL    = 'doubao-seedream-5-0-260128';
const DOUBAO_ENDPOINT = 'https://ark.cn-beijing.volces.com/api/v3/images/generations';

async function callOpenAI(key, prompt, size) {
  const res = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({ model: 'dall-e-3', prompt, n: 1, size, quality: 'hd', response_format: 'b64_json' })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || res.status); }
  const data = await res.json();
  return { b64: data.data[0].b64_json };
}

// Crop bottom 6% to remove Doubao's "AI生成" watermark (bottom-right corner)
function cropDoubaoWatermark(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const cropH = Math.floor(img.height * 0.20); // watermark sits in bottom ~20%
      const canvas = document.createElement('canvas');
      canvas.width  = img.width;
      canvas.height = img.height - cropH;
      canvas.getContext('2d').drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.93));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function callDoubao(key, prompt, size) {
  // Seedream 5.0 requires total pixels >= 3,686,400 if size is specified
  const body = { model: DOUBAO_MODEL, prompt, n: 1 };
  if (size) body.size = size;
  const res = await fetch(DOUBAO_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || e.error || e.message || res.status); }
  const data = await res.json();
  const item = data.data[0];
  if (item.b64_json) return { b64: item.b64_json };
  if (item.url) {
    // Doubao TOS URLs lack CORS headers — proxy through awalon server
    const proxyRes = await fetch('https://www.awalon.top/api/proxy-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: item.url })
    });
    if (!proxyRes.ok) { const e = await proxyRes.json(); throw new Error(e.error || proxyRes.status); }
    const pd = await proxyRes.json();
    return { b64: pd.b64, mimeType: pd.mimeType };
  }
  throw new Error('响应中没有图片数据');
}

async function generate() {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key) || !currentAsset) return;

  const asset = ASSETS.find(a => a.id === currentAsset);
  const prompt = document.getElementById('ppPrompt').value.trim();
  if (!prompt) return;

  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('ppLoading').classList.add('visible');
  document.getElementById('ppResultImg').classList.remove('visible');
  document.getElementById('btnApply').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';

  try {
    const { b64, mimeType } = isDoubaoKey(key)
      ? await callDoubao(key, prompt, asset.doubaoSize)
      : await callOpenAI(key, prompt, asset.dalleSize);

    const ext = mimeType ? mimeType.split('/')[1] : (asset.file.endsWith('.png') ? 'png' : 'jpeg');
    const rawUrl = `data:image/${ext};base64,${b64}`;
    // Remove Doubao watermark from bottom-right corner
    const dataUrl = isDoubaoKey(key) ? await cropDoubaoWatermark(rawUrl) : rawUrl;

    // Slot-level generation: store directly as the slot id
    const storeKey = currentSlot ? `${currentSkin}:${currentSlot}` : `${currentSkin}:${currentAsset}`;
    const assetId  = currentSlot || currentAsset;
    // Push to server → store URL instead of base64 (tiny IDB, cross-device)
    let storeUrl = dataUrl;
    try {
      const svRes = await fetch('/api/save-asset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skinId: currentSkin, assetId, dataUrl }),
      });
      if (svRes.ok) { const sv = await svRes.json(); if (sv.assetUrl) storeUrl = sv.assetUrl; }
    } catch(_) {}
    generatedAssets[storeKey] = storeUrl;
    idbSave(storeKey, storeUrl);
    pushVersion(storeKey, storeUrl);
    lastGeneratedUrl = storeUrl;

    if (!currentSlot && asset.slots) {
      splitAtlas(currentSkin, asset, dataUrl, () => renderAtlasView(asset));
    } else {
      const img = document.getElementById('ppResultImg');
      img.src = dataUrl;
      img.classList.add('visible');
      document.getElementById('btnApply').style.display = '';
      document.getElementById('btnDownload').style.display = '';
      renderVersions(storeKey);
    }
    renderAssets();
  } catch(e) {
    console.error('[generate] failed:', e);
    const msg = e?.message || (typeof e === 'string' ? e : JSON.stringify(e)) || '未知错误';
    alert('生成失败: ' + msg);
  } finally {
    document.getElementById('ppLoading').classList.remove('visible');
    const k = document.getElementById('apiKey').value.trim();
    document.getElementById('btnGenerate').disabled = !isValidKey(k);
  }
}

async function autoLoadAllSkinsFromServer() {
  // On page load, quietly pull server-saved generated assets for ALL skins.
  // This ensures the preview is always up-to-date without the user needing
  // to click the "↓ 从服务器加载" button.
  let anyNew = false;
  for (const skinId of Object.keys(SKINS)) {
    try {
      const res = await fetch(`/api/skin-generated/${skinId}`);
      if (!res.ok) continue;
      const { assets } = await res.json();
      if (!assets) continue;
      for (const [assetId, assetUrl] of Object.entries(assets)) {
        const key = `${skinId}:${assetId}`;
        if (generatedAssets[key] === assetUrl) continue;
        generatedAssets[key] = assetUrl;
        idbSave(key, assetUrl);
        // Only push to versions if not already there
        const vers = versionedAssets[key] || (versionedAssets[key] = []);
        if (!vers.includes(assetUrl)) { vers.push(assetUrl); idbSaveVersions(key, vers); }
        anyNew = true;
      }
    } catch(_) {}
  }
  if (anyNew) { renderPreview(); renderAssets(); }
}

async function loadFromServer() {
  const btn = document.getElementById('btnLoadServer');
  btn.disabled = true; btn.textContent = '加载中…';
  try {
    const res = await fetch(`/api/skin-generated/${currentSkin}`);
    const { assets } = await res.json();
    if (!assets || !Object.keys(assets).length) { alert('服务器上还没有此皮肤的生成图'); return; }
    let loaded = 0;
    for (const [assetId, assetUrl] of Object.entries(assets)) {
      const key = `${currentSkin}:${assetId}`;
      const existing = generatedAssets[key];
      // 只有服务器上是新的才覆盖（服务器路径 vs 本地 base64）
      if (existing === assetUrl) continue;
      generatedAssets[key] = assetUrl;
      idbSave(key, assetUrl);
      pushVersion(key, assetUrl);
      loaded++;
    }
    btn.disabled = false; btn.textContent = '↓ 加载';
    alert(`已加载 ${loaded} 张新图，刷新预览中`);
    renderPreview(); renderAssets();
  } catch(e) {
    btn.disabled = false; btn.textContent = '↓ 加载';
    alert('加载失败: ' + e.message);
  }
}

async function aiAnalyzeSkin(type = 'theme') {
  if (!currentSkin) { alert('请先选择一个皮肤'); return; }
  const btnId    = type === 'qa' ? 'btnAiQA' : 'btnAiColor';
  const label    = type === 'qa' ? '🔍 质检' : '🎨 主题';
  const skinId   = currentSkin;

  // 读取皮肤风格描述（供质检使用）
  const cs = JSON.parse(localStorage.getItem('customSkins') || '{}');
  const styleDesc = (cs[skinId] && cs[skinId].styleDesc) || (SKINS[skinId] && SKINS[skinId].styleDesc) || '';

  setAiBtn(btnId, `${label} 提交中…`, { disabled: true });

  try {
    const submitRes = await fetch('/api/ai-analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skinId, type, styleDesc }),
    });
    const submitData = await submitRes.json();
    if (!submitData.ok) throw new Error(submitData.error || '提交失败');

    const deadline = Date.now() + 300000;  // 最多等 5 分钟（质检图多）
    let dots = 0;

    const result = await new Promise((resolve, reject) => {
      const timer = setInterval(async () => {
        if (Date.now() > deadline) {
          clearInterval(timer);
          return reject(new Error('超时：请确认本地 AI 客户端正在运行（node scripts/skin-ai-server.js）'));
        }
        dots = (dots + 1) % 4;
        try {
          const r = await fetch(`/api/ai-result/${skinId}?type=${type}`).then(x => x.json());
          if (r.status === 'done')  { clearInterval(timer); resolve(r.result); return; }
          if (r.status === 'error') { clearInterval(timer); reject(new Error(r.error || '分析失败')); return; }
          // 显示服务器上报的进度
          const prog = r.progress ? r.progress.replace(/^第\s*/, '') : `分析中${'.'.repeat(dots + 1)}`;
          setAiBtn(btnId, `${label.split(' ')[0]} ${prog}`, { disabled: true });
        } catch(_) {
          setAiBtn(btnId, `${label.split(' ')[0]} 分析中${'.'.repeat(dots + 1)}`, { disabled: true });
        }
      }, 2000);
    });

    if (type === 'theme') {
      // ── 主题模式：应用 CSS 变量 ──────────────────────────────────────────
      const { suggestion, entry } = result;

      // 记录变更前的值（用于对比）
      const root = document.documentElement;
      const oldVars = {};
      Object.keys(entry.vars).forEach(k => {
        oldVars[k] = root.style.getPropertyValue(k) ||
          getComputedStyle(root).getPropertyValue(k).trim() || '（默认）';
      });

      // 应用新 vars
      Object.entries(entry.vars).forEach(([k, v]) => root.style.setProperty(k, v));
      if (cs[skinId]) {
        Object.assign(cs[skinId], { ...suggestion, chip: entry.chip, chipBorder: entry.chipBorder, vars: entry.vars });
        localStorage.setItem('customSkins', JSON.stringify(cs));
      }
      if (SKINS[skinId]) SKINS[skinId].vars = entry.vars;
      renderPreview(); renderAssets();
      setAiBtn(btnId, '✅ 主题已更新', { disabled: true, borderColor: 'rgba(74,222,128,.5)', color: '#4ade80' });
      setTimeout(() => setAiBtn(btnId, label, { disabled: false }), 3000);

      // 展示对比面板
      showThemeDiff(skinId, suggestion, oldVars, entry.vars);

    } else {
      // ── 质检模式：显示质检报告面板 ──────────────────────────────────────
      showQAReport(skinId, result);
      setAiBtn(btnId, label, { disabled: false });
    }

  } catch(e) {
    setAiBtn(btnId, label, { disabled: false });
    alert(`${label}失败: ${e.message}`);
  }
}

// ── 主题变更对比面板 ──────────────────────────────────────────────────────────
function showThemeDiff(skinId, suggestion, oldVars, newVars) {
  const existing = document.getElementById('themeDiffOverlay');
  if (existing) existing.remove();

  // 判断一个 CSS 值是否是颜色（用于显示色块）
  function isColor(v) { return /^#[0-9a-f]{3,8}$/i.test(v) || /^rgba?\(/.test(v); }
  function swatch(val, size = 14) {
    if (!isColor(val)) return '';
    return `<span style="display:inline-block;width:${size}px;height:${size}px;border-radius:3px;background:${val};border:1px solid rgba(255,255,255,.2);vertical-align:middle;flex-shrink:0"></span>`;
  }

  // 分组
  const groups = {
    '背景 & 面板': ['--aw-bg','--aw-bg-2','--aw-panel','--aw-panel-border','--aw-nav-bg','--aw-nav-border'],

// ── 质检报告持久化 ────────────────────────────────────────────────────────────
const QA_HISTORY_MAX = 10; // 每个皮肤最多保存条数

function qaHistoryKey(skinId) { return `qa-history:${skinId}`; }

async function saveQAReport(skinId, report) {
  try {
    const db = await idbOpen();
    const key = qaHistoryKey(skinId);
    const existing = await new Promise(r => {
      const req = db.transaction('assets').objectStore('assets').get(key);
      req.onsuccess = e => r(e.target.result || []);
      req.onerror = () => r([]);
    });
    const entry = { ts: Date.now(), report };
    const updated = [entry, ...existing].slice(0, QA_HISTORY_MAX);
    db.transaction('assets', 'readwrite').objectStore('assets').put(updated, key);
    updateQAHistoryBtn(skinId, updated.length);
  } catch(_) {}
}

async function loadQAHistory(skinId) {
  try {
    const db = await idbOpen();
    return await new Promise(r => {
      const req = db.transaction('assets').objectStore('assets').get(qaHistoryKey(skinId));
      req.onsuccess = e => r(e.target.result || []);
      req.onerror = () => r([]);
    });
  } catch(_) { return []; }
}

async function deleteQAEntry(skinId, ts) {
  try {
    const db = await idbOpen();
    const key = qaHistoryKey(skinId);
    const list = await new Promise(r => {
      const req = db.transaction('assets').objectStore('assets').get(key);
      req.onsuccess = e => r(e.target.result || []);
      req.onerror = () => r([]);
    });
    const updated = list.filter(e => e.ts !== ts);
    db.transaction('assets', 'readwrite').objectStore('assets').put(updated, key);
    updateQAHistoryBtn(skinId, updated.length);
    return updated;
  } catch(_) { return []; }
}

function updateQAHistoryBtn(skinId, count) {
  if (skinId !== currentSkin) return;
  const btn = document.getElementById('btnQAHistory');
  if (!btn) return;
  btn.textContent = count > 0 ? `📋${count}` : '📋';
  btn.style.color = count > 0 ? '#fbbf24' : '#9ca3af';
}

async function initQAHistoryBtn() {
  const list = await loadQAHistory(currentSkin);
  updateQAHistoryBtn(currentSkin, list.length);
}

// 用改进 prompt 重新生成指定资产
async function regenWithImprovedPrompt(skinId, assetId, btn) {
  // 从按钮所在卡片里拿到 improvedPrompt
  const card = btn.closest('div[style*="rgba(251,146,60"]');
  const promptEl = card && card.querySelector('details > div');
  const improvedPrompt = promptEl ? promptEl.textContent.trim() : null;
  if (!improvedPrompt) { alert('未找到改进 Prompt'); return; }

  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('请先在 ⚙配置 里填入有效的 API Key'); return; }

  btn.textContent = '⏳ 生成中…'; btn.disabled = true;
  try {
    const asset = ASSETS.find(a => a.id === assetId);
    const size  = asset ? (isDoubaoKey(key) ? asset.doubaoSize : asset.dalleSize) : undefined;

    const { b64, mimeType } = isDoubaoKey(key)
      ? await callDoubao(key, improvedPrompt, size)
      : await callOpenAI(key, improvedPrompt, size);

    const ext    = mimeType ? mimeType.split('/')[1] : 'jpeg';
    const rawUrl = `data:image/${ext};base64,${b64}`;
    const dataUrl = isDoubaoKey(key) ? await cropDoubaoWatermark(rawUrl) : rawUrl;

    // 存到 generatedAssets + IDB + 推服务器
    const gKey = `${skinId}:${assetId}`;
    generatedAssets[gKey] = dataUrl;
    idbSave(gKey, dataUrl);
    pushVersion(gKey, dataUrl);

    btn.textContent = '✅ 已重新生成'; btn.disabled = false;
    renderAssets(); renderPreview();
  } catch(e) {
    alert('生成失败: ' + e.message);
    btn.textContent = '🔄 用改进 Prompt 重新生成'; btn.disabled = false;
  }
}

async function syncLocalToServer() {
  const btn = document.getElementById('btnSyncServer');
  const keys = Object.keys(generatedAssets).filter(k => k.startsWith(currentSkin + ':'));
  if (!keys.length) { alert('当前皮肤没有已生成的图'); return; }
  btn.disabled = true;
  btn.textContent = '同步中…';
  let ok = 0, skip = 0, fail = 0;
  for (const key of keys) {
    const val = generatedAssets[key];
    // Already a server URL — skip
    if (val && val.startsWith('/tools/')) { skip++; continue; }
    // base64 data URL — upload
    if (val && val.startsWith('data:')) {
      const [skinId, assetId] = key.split(':');
      try {
        const res = await fetch('/api/save-asset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ skinId, assetId, dataUrl: val }),
        });
        if (res.ok) {
          const { assetUrl } = await res.json();
          if (assetUrl) {
            generatedAssets[key] = assetUrl;
            idbSave(key, assetUrl);
            // Update version history too
            const vers = versionedAssets[key];
            if (vers) {
              const idx = vers.lastIndexOf(val);
              if (idx >= 0) { vers[idx] = assetUrl; idbSaveVersions(key, vers); }
            }
            ok++;
          } else { fail++; }
        } else { fail++; }
      } catch(_) { fail++; }
    }
  }
  btn.disabled = false;
  btn.textContent = '☁ 同步';
  alert(`同步完成：${ok} 张上传，${skip} 张已在服务器，${fail} 张失败`);
  renderPreview();
  renderAssets();
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file || !currentAsset) return;
  input.value = ''; // reset so same file can be re-uploaded
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const key = `${currentSkin}:${currentAsset}`;
    generatedAssets[key] = dataUrl;
    idbSave(key, dataUrl);
    lastGeneratedUrl = dataUrl;
    const asset = ASSETS.find(a => a.id === currentAsset);
    if (asset.slots) {
      // Atlas: auto-split — renderAtlasView called in callback after crops ready
      splitAtlas(currentSkin, asset, dataUrl, () => renderAtlasView(asset));
    } else {
      // Single asset: show preview and enable apply/download
      const img = document.getElementById('ppResultImg');
      img.src = dataUrl;
      img.classList.add('visible');
      document.getElementById('btnApply').style.display = '';
      document.getElementById('btnDownload').style.display = '';
    }
    renderAssets();
    renderPreview();
  };
  reader.readAsDataURL(file);
}

function downloadResult() {
  if (!lastGeneratedUrl) return;
  const asset = ASSETS.find(a => a.id === currentAsset);
  const a = document.createElement('a');
  a.href = lastGeneratedUrl;
  a.download = `${currentSkin}-${asset.file.split('/').pop()}`;
  a.click();
}

function copyPrompt() {
  const t = document.getElementById('ppPrompt').value;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制 Prompt', 2000);
  });
}

    const gem   = `<span style="color:rgba(192,148,53,0.85);font-size:5px;line-height:1;flex-shrink:0">◆</span>`;
    if (celDivUrl && !label) {
      return `<div style="width:100%;height:8px;background:url('${celDivUrl}') no-repeat center/contain;margin:2px 0;mix-blend-mode:multiply"></div>`;
    }
    if (celDivUrl && label) {
      return `<div style="display:flex;align-items:center;gap:4px;padding:3px 0 5px">
        <div style="flex:1;height:8px;background:url('${celDivUrl}') no-repeat left center/contain;mix-blend-mode:multiply;opacity:0.8"></div>
        <span style="font-size:6.5px;color:rgba(138,95,22,0.90);letter-spacing:2px;font-weight:600;flex-shrink:0">${label}</span>
        <div style="flex:1;height:8px;background:url('${celDivUrl}') no-repeat right center/contain;mix-blend-mode:multiply;opacity:0.8;transform:scaleX(-1)"></div>
      </div>`;
    }
    if (label) {
      return `<div style="display:flex;align-items:center;gap:4px;padding:3px 0 5px">
        ${lineL}${gem}
        <span style="font-size:6.5px;color:rgba(138,95,22,0.90);letter-spacing:2px;font-weight:600;flex-shrink:0">${label}</span>
        ${gem}${lineR}
      </div>`;
    }
    return `<div style="display:flex;align-items:center;gap:4px;padding:2px 0 3px;opacity:0.75">
      ${lineL}${gem}${lineR}
    </div>`;
  }
  return '';
}

// Shared in-frame left-center state switcher
function makeSwitcher(items) {
  const isCelestialSkin = currentSkin === 'celestial';
  const btns = items.map(({lbl, act, fn}) => {
    let style;
    if (isCelestialSkin) {
      if (act) {
        style = [
          'padding:4px 8px 4px 5px',
          'border-radius:2px',
          'font-size:6.5px',
          'cursor:pointer',
          'white-space:nowrap',
          'background:linear-gradient(90deg,rgba(242,230,200,0.97),rgba(235,222,195,0.92))',
          'border:1px solid rgba(192,144,53,0.50)',
          'border-left:2.5px solid rgba(192,144,53,0.92)',
          'color:rgba(108,72,12,1)',
          'font-weight:700',
          'letter-spacing:0.5px',
          'box-shadow:0 1px 5px rgba(130,100,40,0.18),inset 0 1px 0 rgba(255,252,230,0.85)',
          'backdrop-filter:blur(8px)',
          '-webkit-backdrop-filter:blur(8px)',
        ].join(';');
      } else {
        style = [
          'padding:4px 8px 4px 7px',
          'border-radius:2px',
          'font-size:6.5px',
          'cursor:pointer',
          'white-space:nowrap',
          'background:rgba(242,235,218,0.68)',
          'border:1px solid rgba(180,148,60,0.22)',
          'color:rgba(110,80,30,0.62)',
          'backdrop-filter:blur(4px)',
          '-webkit-backdrop-filter:blur(4px)',
        ].join(';');
      }
    } else {
      const bg  = act ? 'rgba(201,156,70,0.22)' : 'rgba(0,0,0,0.4)';
      const bdr = act ? 'rgba(201,156,70,0.55)' : 'rgba(255,255,255,0.18)';
      const clr = act ? 'rgba(220,175,80,1)'    : 'rgba(255,255,255,0.45)';
      style = `padding:3px 6px;border-radius:3px;font-size:6px;cursor:pointer;white-space:nowrap;background:${bg};border:1px solid ${bdr};color:${clr};${act?'font-weight:700;':''}`;
    }
    return `<div onclick="event.stopPropagation();${fn};renderPreview()" style="${style}">${lbl}</div>`;
  }).join('');
  return `<div style="position:absolute;left:4px;top:50%;transform:translateY(-50%);z-index:25;display:flex;flex-direction:column;gap:3px">${btns}</div>`;
}

function renderPreview() {
  const frame = document.getElementById('phoneFrame');
  const skin = SKINS[currentSkin];
  const vars = inlineVars(currentSkin);
  const isDark = skin.isDark;

  // ── Inject skin-specific CSS into <head> (innerHTML strips <style> tags) ──
  let skinStyleEl = document.getElementById('skin-extra-styles');
  if (skinStyleEl) skinStyleEl.remove();
  const extraCss = skinExtraStyles(currentSkin);
  if (extraCss) {
    skinStyleEl = document.createElement('style');
    skinStyleEl.id = 'skin-extra-styles';
    skinStyleEl.textContent = extraCss;
    document.head.appendChild(skinStyleEl);
    // Force-load custom fonts so they render immediately (not on next paint)
    document.fonts.load('16px "DotGothic16"').then(() => {
      if (currentSkin === 'dark-dungeon') {
        // Re-render once fonts are ready (only if skin hasn't changed)
        const frame = document.getElementById('phoneFrame');
        if (frame) frame.querySelectorAll('*').forEach(el => {
          el.style.fontFamily = el.style.fontFamily; // trigger reflow
        });
      }
    });
  }

  // Resolve background image: prefer generated → CDN (dark-gold) → CSS color
  function bgLayer(type) {
    const id = type === 'home' ? 'home-bg' : 'in-game-bg';
    const gen = generatedAssets[`${currentSkin}:${id}`];
    const fallback = currentSkin === 'dark-gold'
      ? DG_BASE_ASSETS + (type === 'home' ? 'home-bg.jpg' : 'in-game-bg.jpg')
      : null;
    const url = gen || fallback;
    if (url) {
      // dark-dungeon: show bg behind a heavy opaque overlay to keep the gothic mood
      const ddOverlay = currentSkin === 'dark-dungeon'
        ? `<div style="position:absolute;inset:0;z-index:1;background:rgba(8,4,2,0.52)"></div>`
        : '';
      const imgFilter = currentSkin === 'celestial' ? 'filter:brightness(0.82);' : '';
      return `<img src="${url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;${imgFilter}" onerror="this.style.display='none'">${ddOverlay}`;
    }
    return `<div style="position:absolute;inset:0;z-index:0;background:${skin.vars['--aw-bg']||'#090b11'}"></div>`;
  }

  // Dark overlay mask (matches production gradient)
  const maskDiv = isDark
    ? `<div style="position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(180deg,${currentSkin==='dark-dungeon'?'rgba(8,4,2,.42) 0%,rgba(8,4,2,.72)':'rgba(10,12,18,.58) 0%,rgba(10,12,18,.86)'} 100%)"></div>`

    } else {

        <div class="ph-content">
          <!-- User panel -->
          <div class="ph-panel">

              <div class="ph-act-btn"><img src="${generatedAssets[currentSkin+':stats-icon']||CDN+'/ui-icons/stats_bars.png'}" style="width:18px;height:18px;object-fit:contain" onerror="this.outerHTML='<span style=font-size:11px>📊</span>'"><span style="font-size:6px;color:var(--aw-subtext)">角色统计</span></div>
              <div class="ph-act-btn"><img src="${generatedAssets[currentSkin+':kill-icon']||CDN+'/ui-icons/kill.png'}" style="width:18px;height:18px;object-fit:contain" onerror="this.outerHTML='<span style=font-size:9px;font-weight:700;opacity:.6>规</span>'"><span style="font-size:6px;color:var(--aw-subtext)">游戏规则</span></div>

                {id:'percival',    name:'派西',    cls:'good-chip'},
