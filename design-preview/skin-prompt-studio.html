    const vNClr = isDDSkin ? '#c85848' : '#f87171';
    const voteResults = isSuccess
      ? [{e:'🌙',v:'✓'},{e:'🦊',v:'✓'},{e:'🐉',v:'✓'}]
      : [{e:'🌙',v:'✓'},{e:'🦊',v:'✗'},{e:'🐉',v:'✗'}];
    const votesHtml = voteResults.map(v =>
      '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">'
      + '<div style="font-size:12px;line-height:1">' + v.e + '</div>'
      + '<div style="font-size:8px;font-weight:700;color:' + (v.v==='✓'?vYClr:vNClr) + '">' + v.v + '</div>'
      + '</div>'
    ).join('');

    frame.innerHTML = `
    <div class="phone-screen" style="${vars};position:relative;display:flex;flex-direction:column">
      ${skinExtraStyles(currentSkin)}${bgLayer('game')}${maskDiv}
      <div class="ph-nav">
        <div class="ph-nav-back">← 返回</div>
        <div class="ph-nav-title">第 ${evRound} 轮任务</div>
        <!-- Toggle: success / fail -->
        <div style="margin-left:auto;display:flex;gap:2px;background:rgba(255,255,255,.06);border-radius:5px;padding:2px">
          <div onclick="currentEventView='success';renderPreview()" style="padding:2px 5px;border-radius:3px;font-size:7px;cursor:pointer;background:${isSuccess?'rgba(74,222,128,.18)':'transparent'};color:${isSuccess?'#4ade80':'rgba(255,255,255,.4)'}">成功</div>
          <div onclick="currentEventView='fail';renderPreview()" style="padding:2px 5px;border-radius:3px;font-size:7px;cursor:pointer;background:${!isSuccess?'rgba(248,113,113,.18)':'transparent'};color:${!isSuccess?'#f87171':'rgba(255,255,255,.4)'}">失败</div>
        </div>
      </div>
      <div class="ph-content" style="align-items:center;justify-content:center;gap:8px">
        <!-- Mission result banner -->
        <div class="ph-ev-banner" style="width:100%;border-radius:8px;overflow:hidden;border:1px solid ${evBdr};background:${evBg}">
          ${evUrl ? `<img src="${evUrl}" style="width:100%;display:block;object-fit:cover;max-height:72px" onerror="this.style.display='none'">` : ''}
          <div style="padding:6px 8px;text-align:center">
            <div class="ph-ev-label" style="font-size:13px;font-weight:800;color:${evColor};letter-spacing:2px">${evLabel}</div>
            <div class="ph-ev-sublabel" style="font-size:7px;color:rgba(255,255,255,.4);margin-top:2px">第 ${evRound} 轮 · ${voteResults.length} 人出行</div>
          </div>
        </div>
        <!-- Vote breakdown -->
        <div class="ph-panel" style="width:100%">
          <div style="font-size:7px;color:var(--aw-subtext);margin-bottom:6px">任务票型</div>
          <div style="display:flex;justify-content:center;gap:16px">${votesHtml}</div>
          <div style="margin-top:8px;font-size:7px;color:var(--aw-subtext);text-align:center">
            ${isSuccess ? '全员投出成功票' : `${voteResults.filter(v=>v.v==='✗').length} 票失败`}
          </div>
        </div>
        <!-- Mission progress pills (compact) -->
        <div class="ph-panel" style="width:100%">
          <div style="font-size:7px;color:var(--aw-subtext);margin-bottom:4px">任务进度</div>
          <div class="ph-pills-row">
            ${[1,2,3,4,5].map(i => {
              const st = i<evRound ? (i===2?'fail':'success') : i===evRound ? (isSuccess?'success':'fail') : 'future';
              const ic = st==='success'?'✓':st==='fail'?'✗':'·';
              return `<div class="ph-pill ${st}"><div class="ph-pill-icon">${ic}</div></div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>`;

  // ── END-GAME REVEAL SCREEN ──────────────────────────────────
  } else if (currentPreviewTab === 'endgame') {
    const isGoodWin = currentEndgame === 'good';
    const resultClass = isGoodWin ? 'good-win' : 'evil-win';
    const resultTitle = isGoodWin ? '正义阵营胜利' : '邪恶阵营胜利';
    const resultSub   = isGoodWin ? '三轮任务成功 · 刺客未能击中梅林' : '任务连续失败 · 邪恶阵营称霸圆桌';

    const revealPlayers = [
      {e:'🦊', nm:'光影',  role:'梅林',     roleId:'merlin',       faction:'good'},
      {e:'🐉', nm:'龙影',  role:'派西维尔', roleId:'percival',     faction:'good'},
      {e:'🦅', nm:'鹰眼',  role:'忠臣',     roleId:'arthur_loyal', faction:'good'},
      {e:'🌙', nm:'月影',  role:'莫甘娜',   roleId:'morgana',      faction:'evil'},
      {e:'🦋', nm:'蝶舞',  role:'忠臣',     roleId:'arthur_loyal', faction:'good'},
      {e:'⚡', nm:'雷鸣',  role:'刺客',     roleId:'assassin',     faction:'evil'},
      {e:'🌊', nm:'海浪',  role:'爪牙',     roleId:'minion',       faction:'evil'},
    ];

    const revealCardsHtml = revealPlayers.map(p => {
      const rUrl = roleImgUrl(p.roleId);
      const avHtml = rUrl
        ? `<img src="${rUrl}" onerror="this.style.display='none'">`
        : p.e;
      return `<div class="ph-reveal-card ${p.faction}">
        <div class="ph-reveal-av ${p.faction}">${avHtml}</div>
        <div class="ph-reveal-nm">${p.nm}</div>
        <div class="ph-reveal-role ${p.faction}">${p.role}</div>
      </div>`;
    }).join('');

    // Assassination section (only relevant when good side wins)
    const assassinSection = isGoodWin ? `
      <div class="ph-panel" style="width:100%;padding:6px 8px">
        <div style="font-size:7px;color:var(--aw-subtext,#aeb6c7);margin-bottom:5px">刺客行动</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="font-size:13px">⚡</div>
          <div style="flex:1">
            <div style="font-size:7.5px;font-weight:700;color:var(--aw-text,#eef1f7)">雷鸣 猜测梅林为：</div>
            <div style="font-size:6.5px;color:var(--aw-subtext,#aeb6c7);margin-top:1px">🐉 龙影 · 派西维尔</div>
          </div>
          <div style="padding:2px 6px;border-radius:999px;background:rgba(80,220,140,.12);border:1px solid rgba(80,220,140,.32);font-size:6.5px;font-weight:700;color:#50dc8c">猜错</div>
        </div>
      </div>` : `
      <div class="ph-panel" style="width:100%;padding:6px 8px">
        <div style="font-size:7px;color:var(--aw-subtext,#aeb6c7);margin-bottom:5px">刺客行动</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="font-size:13px">⚡</div>
          <div style="flex:1">
            <div style="font-size:7.5px;font-weight:700;color:var(--aw-text,#eef1f7)">雷鸣 正确识别梅林</div>
            <div style="font-size:6.5px;color:var(--aw-subtext,#aeb6c7);margin-top:1px">🦊 光影 · 梅林 被刺杀</div>
          </div>
          <div style="padding:2px 6px;border-radius:999px;background:rgba(220,80,80,.12);border:1px solid rgba(220,80,80,.32);font-size:6.5px;font-weight:700;color:#f87171">刺杀成功</div>
        </div>
      </div>`;

    frame.innerHTML = `
    <div class="phone-screen" style="${vars};position:relative;display:flex;flex-direction:column">
      ${skinExtraStyles(currentSkin)}${bgLayer('game')}${maskDiv}
      <div class="ph-nav">
        <div class="ph-nav-back">← 返回</div>
        <div class="ph-nav-title">游戏结束</div>
        <div style="margin-left:auto;display:flex;gap:2px;background:rgba(255,255,255,.06);border-radius:5px;padding:2px">
          <div onclick="currentEndgame='good';renderPreview()" style="padding:2px 5px;border-radius:3px;font-size:6.5px;cursor:pointer;background:${isGoodWin?'rgba(78,158,255,.18)':'transparent'};color:${isGoodWin?'#7ac7ff':'rgba(255,255,255,.4)'}">正义胜</div>
          <div onclick="currentEndgame='evil';renderPreview()" style="padding:2px 5px;border-radius:3px;font-size:6.5px;cursor:pointer;background:${!isGoodWin?'rgba(220,60,60,.18)':'transparent'};color:${!isGoodWin?'#ff8a8a':'rgba(255,255,255,.4)'}">邪恶胜</div>
        </div>
      </div>
      <div class="ph-content" style="gap:5px">
        <!-- Result banner -->
        <div class="ph-end-banner ${resultClass}">
          <div class="ph-end-title">${resultTitle}</div>
          <div class="ph-end-sub" style="color:${isGoodWin?'rgba(120,180,255,.65)':'rgba(220,120,120,.65)'}">${resultSub}</div>
          <div style="display:flex;justify-content:center;gap:12px;margin-top:5px">
            <div style="text-align:center"><div style="font-size:9px;font-weight:700;color:${isGoodWin?'#7ac7ff':'#ff8a8a'}">3</div><div style="font-size:5px;color:rgba(255,255,255,.35);letter-spacing:1px">任务胜</div></div>
            <div style="width:1px;background:rgba(255,255,255,.1)"></div>
            <div style="text-align:center"><div style="font-size:9px;font-weight:700;color:${isGoodWin?'#ff8a8a':'#7ac7ff'}">2</div><div style="font-size:5px;color:rgba(255,255,255,.35);letter-spacing:1px">任务败</div></div>
          </div>
        </div>
        ${skinDivider(currentSkin)}
        <!-- Reveal grid -->
        <div class="ph-sec-chip">身份揭示</div>
        <div class="ph-reveal-grid">${revealCardsHtml}</div>
        ${skinDivider(currentSkin)}
        <!-- Assassination result -->
        ${assassinSection}
        <!-- Play again button -->
        <div class="ph-btn-row" style="padding:0 2px">
          <div class="ph-btn-p">再来一局</div>
          <div class="ph-btn-g">返回主页</div>
        </div>
      </div>
    </div>`;

  // ── UI COMPONENTS SCREEN ────────────────────────────────────
  } else if (currentPreviewTab === 'ui') {
    const acc    = skin.vars['--aw-accent']      || '#d9b36b';
    const accTxt = skin.vars['--aw-accent-text'] || '#1a1200';
    const ghost  = skin.vars['--aw-btn-ghost-border'] || 'rgba(255,255,255,.22)';
    const ghTxt  = skin.vars['--aw-btn-ghost-text']   || '#eef1f7';
    const inpBg  = skin.vars['--aw-input-bg']    || 'rgba(255,255,255,.06)';
    const inpBdr = skin.vars['--aw-input-border']|| 'rgba(255,255,255,.14)';
    const pnl    = skin.vars['--aw-panel']       || 'rgba(19,23,31,.82)';
    const pnlBdr = skin.vars['--aw-panel-border']|| 'rgba(255,255,255,.10)';
    const tx     = skin.vars['--aw-text']        || '#eef1f7';
    const sub    = skin.vars['--aw-subtext']     || '#aeb6c7';

    const killUrl    = getAssetUrl(currentSkin, ASSETS.find(a=>a.id==='kill-icon'));
    const histUrl    = getAssetUrl(currentSkin, ASSETS.find(a=>a.id==='history-icon'));
    const statsUrl   = getAssetUrl(currentSkin, ASSETS.find(a=>a.id==='stats-icon'));

    frame.innerHTML = `
    <div class="phone-screen" style="${vars};position:relative;display:flex;flex-direction:column">
      ${skinExtraStyles(currentSkin)}${bgLayer('home')}${maskDiv}
      <div class="ph-nav"><div class="ph-nav-title">UI 组件预览</div></div>
      <div class="ph-content" style="gap:7px">

        <!-- Buttons -->
        <div class="ph-panel">
          <div style="font-size:7px;font-weight:700;color:${sub};letter-spacing:2px;margin-bottom:6px">BUTTONS</div>
          <div style="display:flex;flex-direction:column;gap:5px">
            <div style="background:${acc};color:${accTxt};border-radius:7px;padding:7px;text-align:center;font-size:10px;font-weight:700;letter-spacing:1px">组队出发</div>
            <div style="border:1px solid ${ghost};color:${ghTxt};border-radius:7px;padding:6px;text-align:center;font-size:10px;background:rgba(255,255,255,.03)">查看详情</div>
            <div style="display:flex;gap:4px">
              <div style="flex:1;background:rgba(74,222,128,.14);border:1px solid rgba(74,222,128,.35);border-radius:7px;padding:6px;text-align:center;font-size:9px;color:#4ade80;font-weight:700">✓ 同意</div>
              <div style="flex:1;background:rgba(248,113,113,.14);border:1px solid rgba(248,113,113,.35);border-radius:7px;padding:6px;text-align:center;font-size:9px;color:#f87171;font-weight:700">✗ 拒绝</div>
            </div>
          </div>
        </div>

        <!-- Input + Chips -->
        <div class="ph-panel">
          <div style="font-size:7px;font-weight:700;color:${sub};letter-spacing:2px;margin-bottom:6px">INPUTS &amp; CHIPS</div>
          <div style="background:${inpBg};border:1px solid ${inpBdr};border-radius:7px;padding:6px 8px;font-size:8px;color:${sub}">输入房间号…</div>
          <div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap">
            <div style="padding:3px 10px;border-radius:999px;background:${acc};color:${accTxt};font-size:8px;font-weight:700">5人</div>
            <div style="padding:3px 10px;border-radius:999px;border:1px solid ${ghost};color:${ghTxt};font-size:8px">7人</div>
            <div style="padding:3px 10px;border-radius:999px;border:1px solid ${ghost};color:${ghTxt};font-size:8px">10人</div>
          </div>
        </div>

        <!-- Dialog -->
        <div style="background:${pnl};border:1px solid ${pnlBdr};border-radius:10px;padding:10px 10px 8px;position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,${acc},transparent)"></div>
          <div style="font-size:10px;font-weight:700;color:${tx};text-align:center;margin-bottom:4px">确认刺杀梅林？</div>
          <div style="font-size:7px;color:${sub};text-align:center;margin-bottom:8px">此操作不可撤销，请谨慎确认</div>
          <div style="display:flex;gap:4px">
            <div style="flex:1;border:1px solid ${ghost};color:${ghTxt};border-radius:6px;padding:5px;text-align:center;font-size:9px">取消</div>
            <div style="flex:1;background:rgba(248,113,113,.18);border:1px solid rgba(248,113,113,.4);color:#f87171;border-radius:6px;padding:5px;text-align:center;font-size:9px;font-weight:700">确认刺杀</div>
          </div>
        </div>

        <!-- Nav icons -->
        <div class="ph-panel">
          <div style="font-size:7px;font-weight:700;color:${sub};letter-spacing:2px;margin-bottom:6px">NAV ICONS</div>
          <div style="display:flex;gap:10px;align-items:center">
            ${killUrl  ? `<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><img src="${killUrl}"  style="width:24px;height:24px;object-fit:contain" onerror="this.style.display='none'"><span style="font-size:6px;color:${sub}">刺杀</span></div>` : ''}
            ${histUrl  ? `<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><img src="${histUrl}"  style="width:24px;height:24px;object-fit:contain" onerror="this.style.display='none'"><span style="font-size:6px;color:${sub}">历史</span></div>` : ''}
            ${statsUrl ? `<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><img src="${statsUrl}" style="width:24px;height:24px;object-fit:contain" onerror="this.style.display='none'"><span style="font-size:6px;color:${sub}">统计</span></div>` : ''}
            <div style="margin-left:auto;display:flex;flex-direction:column;align-items:center;gap:2px">
              <div style="width:24px;height:24px;border-radius:50%;background:${acc};display:flex;align-items:center;justify-content:center;font-size:11px;color:${accTxt}">⚔</div>
              <span style="font-size:6px;color:${sub}">主色</span>
            </div>
          </div>
        </div>

      </div>
    </div>`;
  }

  // After rendering, sync fullscreen if open
  if (_fsOpen) _fsUpdate();
}

// ══════════════════════════════════════════════════════════════
// FULLSCREEN PREVIEW
// ══════════════════════════════════════════════════════════════
const _FS_TABS  = ['home','game','stats','history','role','event','endgame','ui'];
const _FS_NAMES = ['主页','游戏中','角色统计','历史对战','身份牌','任务结果','终局','UI组件'];
let _fsOpen = false;
let _fsTx = 0, _fsTt = 0;

function enterFullscreen() {
  _fsOpen = true;
  document.getElementById('fsOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  _fsUpdate();
  requestAnimationFrame(_fsScale);
}
function exitFullscreen() {
  _fsOpen = false;
  document.getElementById('fsOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function _fsScale() {
  const scr = document.getElementById('fsPhoneScreen');
  const wrap = document.getElementById('fsContent');
  if (!scr || !wrap) return;
  const scale = Math.min(wrap.clientWidth / 280, wrap.clientHeight / 560) * 0.97;
  scr.style.transform = `scale(${scale})`;
}
function _fsUpdate() {
  // Copy phone-screen HTML into fullscreen container
  const src = document.querySelector('#phoneFrame .phone-screen');
  const dst = document.getElementById('fsPhoneScreen');
  if (!src || !dst) return;
  dst.innerHTML = src.innerHTML;
  // Copy inline style vars (skin colors etc.)
  dst.setAttribute('style', src.getAttribute('style') || '');
  dst.className = src.className;
  // Restore fixed dimensions and transform
  dst.style.width = '280px';
  dst.style.height = '560px';
  dst.style.flexShrink = '0';
  dst.style.transformOrigin = 'center center';

  // Tab label
  const idx = _FS_TABS.indexOf(currentPreviewTab);
  const lbl = document.getElementById('fsTabLabel');
  if (lbl) lbl.textContent = _FS_NAMES[idx] || '';

  // Dot indicators
  const dots = document.getElementById('fsDots');
  if (dots) dots.innerHTML = _FS_TABS.map((_, i) =>
    `<div class="fs-dot${i===idx?' active':''}" onclick="fsGoTab(${i});event.stopPropagation()"></div>`
  ).join('');

  _fsScale();
}
function fsGoTab(i) {
  const tab = _FS_TABS[i];
  if (!tab) return;
  currentPreviewTab = tab;
  // Sync main tab bar
  document.querySelectorAll('.preview-tab').forEach((el, j) =>
    el.classList.toggle('active', j === i)
  );
  renderPreview(); // renderPreview() calls _fsUpdate() at end since _fsOpen is true
}

// Swipe handling on fullscreen overlay
(function() {
  const ov = document.getElementById('fsOverlay');
  ov.addEventListener('touchstart', e => {
    _fsTx = e.touches[0].clientX;
    _fsTt = Date.now();
  }, {passive:true});
  ov.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _fsTx;
    const dt = Date.now() - _fsTt;
    if (Math.abs(dx) > 45 && dt < 450) {
      const cur = _FS_TABS.indexOf(currentPreviewTab);
      const next = dx < 0
        ? Math.min(cur + 1, _FS_TABS.length - 1)
        : Math.max(cur - 1, 0);
      if (next !== cur) fsGoTab(next);
    }
  }, {passive:true});
  // Scale on resize
  window.addEventListener('resize', () => { if (_fsOpen) _fsScale(); }, {passive:true});
})();
</script>
