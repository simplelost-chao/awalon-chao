<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Avalon · Skin Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b11;--surface:#10131c;--card:#161b28;--border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --text:#e8eaf0;--sub:#7a8aa0;--muted:#3a4555;
  --good:#4ade80;--evil:#f87171;--accent:#d9b36b;
  --r:10px;--font:-apple-system,'PingFang SC',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ─── Header ─── */
.hd{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0}
.hd-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--text)}
.hd-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good)}
.hd-sep{width:1px;height:20px;background:var(--border)}
.hd-key-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.hd-key-label{font-size:11px;color:var(--sub)}
.hd-key{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--mono);padding:5px 10px;width:260px;outline:none}
.hd-key:focus{border-color:var(--border-hi)}
.hd-key::placeholder{color:var(--muted)}
.hd-key-status{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.hd-key-status.ok{background:var(--good);box-shadow:0 0 6px var(--good)}

/* ─── Skin tabs ─── */
.skin-tabs{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:2px;padding:0 12px;flex-shrink:0;overflow-x:auto}
.skin-tabs::-webkit-scrollbar{display:none}
.stab{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:7px;border:1px solid transparent;cursor:pointer;white-space:nowrap;background:none;transition:all .15s}
.stab:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.stab.active{background:rgba(255,255,255,.07);border-color:var(--border-hi)}
.stab-chip{width:18px;height:18px;border-radius:5px;flex-shrink:0;border:1px solid rgba(255,255,255,.15)}
.stab-name{font-size:12px;font-weight:600;color:var(--text)}
.stab-id{font-size:10px;color:var(--sub);font-family:var(--mono)}

/* ─── Workspace ─── */
.workspace{flex:1;display:grid;grid-template-columns:230px 1fr 360px;overflow:hidden}

/* ─── Assets Panel ─── */
.panel-assets{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
.panel-assets::-webkit-scrollbar{width:4px}
.panel-assets::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.asset-cat{padding:10px 12px 6px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.asset-item{display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.asset-item:hover{background:rgba(255,255,255,.03)}
.asset-item.active{background:rgba(255,255,255,.06);border-left-color:var(--accent)}
.asset-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--card);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.asset-thumb img{width:100%;height:100%;object-fit:cover}
.asset-thumb.portrait{height:48px}
.asset-info{min-width:0}
.asset-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset-file{font-size:10px;color:var(--sub);font-family:var(--mono)}
.asset-badge{width:8px;height:8px;border-radius:50%;background:var(--good);flex-shrink:0;margin-left:auto;box-shadow:0 0 5px var(--good)}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* ─── Atlas tree ─── */
.atlas-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;color:var(--sub);flex-shrink:0;cursor:pointer}
.atlas-toggle:hover{background:rgba(255,255,255,.08);color:var(--text)}
.slot-children{border-left:2px solid rgba(255,255,255,.06);margin-left:20px}
.slot-item{padding:5px 10px}
.slot-thumb{width:32px;height:32px;border-radius:4px}
.slot-item .asset-name{font-size:11px}
.slot-item .asset-file{font-size:9px}

/* ─── Prompt Panel ─── */
.panel-prompt{display:flex;flex-direction:column;overflow:hidden;padding:0;background:var(--surface)}
.pp-top{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.pp-asset-label{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pp-asset-name{font-size:15px;font-weight:700}
.pp-spec{font-size:11px;color:var(--sub);font-family:var(--mono);padding:2px 8px;background:rgba(255,255,255,.05);border-radius:4px;border:1px solid var(--border)}
.pp-prompt-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.pp-prompt{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:12px;font-family:var(--mono);line-height:1.65;padding:14px;resize:none;outline:none;min-height:0}
.pp-prompt:focus{border-color:var(--border-hi)}
.pp-actions{display:flex;gap:8px;padding:12px 20px;flex-shrink:0;border-top:1px solid var(--border)}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all .15s;font-family:var(--font);display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#1a1200;border-color:var(--accent);font-weight:700}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-good{background:rgba(74,222,128,.12);color:var(--good);border-color:rgba(74,222,128,.3)}
.btn-good:hover{background:rgba(74,222,128,.18)}
.pp-result{flex-shrink:0;padding:0 20px 12px}
.pp-result-img{width:100%;max-height:200px;border-radius:var(--r);object-fit:contain;background:var(--card);border:1px solid var(--border);display:none}
.pp-result-img.visible{display:block}
.pp-loading{display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100px;color:var(--sub);font-size:12px}
.pp-loading.visible{display:flex}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pp-prompt-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:12px 20px;gap:10px;min-height:0}

/* ─── Phone Preview Panel ─── */
.panel-preview{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;padding:16px 12px;overflow-y:auto}
.panel-preview::-webkit-scrollbar{width:4px}
.panel-preview::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08)}
.preview-tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--card);padding:3px;border-radius:8px;border:1px solid var(--border);overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
.preview-tabs::-webkit-scrollbar{display:none}
.preview-tab{padding:5px 8px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--sub);transition:all .15s;white-space:nowrap;flex:0 0 auto;text-align:center}
.preview-tab.active{background:rgba(255,255,255,.08);color:var(--text)}

/* ─── Phone Frame ─── */
.phone-frame{width:280px;height:560px;border-radius:36px;border:8px solid #1a1e2a;box-shadow:0 0 0 1px rgba(255,255,255,.06),0 20px 60px rgba(0,0,0,.6);overflow:hidden;position:relative;flex-shrink:0}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ph-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.ph-bg-color{position:absolute;inset:0;z-index:0}
.ph-mask{position:absolute;inset:0;z-index:1;pointer-events:none}

/* ─── Phone UI: high-fidelity recreation ─── */

/* Nav bar  (44px real → ~28px preview, scale 0.65) */
.ph-nav{position:relative;z-index:10;height:28px;flex-shrink:0;display:flex;align-items:center;padding:0 8px;background:var(--aw-nav-bg,rgba(12,16,24,.88));border-bottom:1px solid var(--aw-nav-border,rgba(255,255,255,.08))}
.ph-nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--aw-text,#eef1f7);letter-spacing:2px;white-space:nowrap}
.ph-nav-back{font-size:8px;color:var(--aw-text,#eef1f7);padding:2px 5px;border-radius:999px;border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:var(--aw-input-bg,rgba(255,255,255,.06));display:flex;align-items:center;gap:2px;flex-shrink:0;white-space:nowrap}

/* Scrollable content */
.ph-content{position:relative;z-index:2;flex:1;overflow-y:auto;padding:6px 7px 8px;display:flex;flex-direction:column;gap:5px}
.ph-content::-webkit-scrollbar{display:none}

/* Panel card */
.ph-panel{background:var(--aw-panel,rgba(19,23,31,.82));border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));border-radius:7px;padding:7px}

/* User header row (left accent border) */
.ph-user-row{display:flex;align-items:center;gap:5px;padding:4px 5px;border-left:2px solid var(--aw-accent,#d9b36b);border-radius:3px;background:linear-gradient(90deg,rgba(216,176,107,0.14),transparent);margin-bottom:5px}
.ph-av{width:22px;height:22px;border-radius:50%;background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15)}
.ph-logout{margin-left:auto;font-size:6px;color:rgba(106,122,154,0.9);padding:1px 5px;border:1px solid rgba(106,122,154,0.3);border-radius:999px}

/* 3-button action grid */
.ph-act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:5px}
.ph-act-btn{background:transparent;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:2px}

/* Player count pills */
.ph-count-row{display:flex;gap:2px;margin-bottom:5px;overflow:hidden}
.ph-cnt{flex:1;padding:2px 0;border-radius:3px;font-size:6px;text-align:center;background:rgba(0,0,0,0.16);border:1px solid rgba(255,255,255,0.12);color:var(--aw-subtext,#aeb6c7);white-space:nowrap}
.ph-cnt.on{background:rgba(216,176,107,0.18);border-color:rgba(216,176,107,0.55);color:var(--aw-accent,#d9b36b);font-weight:700}

/* Role chips — vertical card layout matching real UI */
.ph-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.ph-rchip{padding:4px 5px;border-radius:4px;font-size:6px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:20px;line-height:1.3}
.ph-rchip-img{width:15px;height:15px;border-radius:3px;object-fit:cover;flex-shrink:0}
.good-chip{background:rgba(30,90,200,0.12);border:1px solid rgba(80,160,255,0.55);color:#d3daea}
.evil-chip{background:rgba(160,35,45,0.12);border:1px solid rgba(220,80,90,0.55);color:#d3daea}
.spec-chip{background:rgba(88,28,135,0.35);border:1px solid rgba(192,132,252,0.4);color:#d4aaff}

/* CTA buttons */
.ph-btn-row{display:flex;gap:4px}
.ph-btn-p{flex:1;padding:6px 0;border-radius:6px;font-size:8px;font-weight:700;text-align:center;background:linear-gradient(180deg,#e4c281,#c89b52);color:#1a1510}
.ph-btn-g{flex:1;padding:6px 0;border-radius:6px;font-size:8px;text-align:center;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--aw-text,#eef1f7)}

/* ── Round table (fills full width, square aspect via padding-bottom:100%) */
.ph-table-area{position:relative;width:100%;padding-bottom:90%;margin-bottom:2px;flex-shrink:0}
.ph-table-inner{position:absolute;inset:0}
.ph-table-circle-bg{position:absolute;width:55%;height:55%;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;overflow:hidden;opacity:0.38;pointer-events:none}
.ph-table-circle-bg img{width:100%;height:100%;object-fit:cover}
/* Seats positioned by % (same formula as production: cx=50,cy=50,r=39) */
.ph-seat{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;width:30px}
.ph-seat-av{width:22px;height:22px;border-radius:50%;position:relative;background:rgba(15,11,8,0.55);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:11px}
.ph-seat-no{position:absolute;right:-4px;bottom:-2px;min-width:11px;height:11px;padding:0 2px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:5.5px;font-weight:700;color:#e6c17d;background:rgba(10,8,20,0.95);border:1px solid rgba(180,140,60,0.42);z-index:5;line-height:1;box-sizing:border-box}
.ph-seat-name{font-size:5.5px;color:#d0d8e8;text-align:center;line-height:1.2;white-space:nowrap;overflow:hidden;max-width:30px}
.ph-crown{font-size:7px;line-height:1;margin-bottom:1px}
/* faction glow */
.ph-seat.good .ph-seat-av{border-color:rgba(78,158,255,0.85);box-shadow:0 0 6px rgba(78,158,255,0.45);background:rgba(7,50,120,0.35)}
.ph-seat.evil .ph-seat-av{border-color:rgba(220,60,60,0.8);box-shadow:0 0 5px rgba(200,40,40,0.38);background:rgba(35,6,6,0.92)}
.ph-seat.me .ph-seat-av{border-color:rgba(233,191,112,0.95)!important;box-shadow:0 0 0 2px rgba(233,191,112,0.22)!important}

/* Section chip label */
.ph-sec-chip{display:inline-flex;align-items:center;font-size:7px;font-weight:700;color:var(--aw-subtext,#aeb6c7);letter-spacing:1px;margin-bottom:3px;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid var(--aw-panel-border,rgba(255,255,255,.08))}

/* Mission pills */
.ph-pills-row{display:flex;gap:3px}
.ph-pill{flex:1;min-height:38px;border-radius:5px;border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));background:rgba(0,0,0,0.22);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 1px;gap:1px}
.ph-pill.success{background:rgba(60,160,100,0.18);border-color:rgba(100,220,150,0.55)}
.ph-pill.fail{background:rgba(160,40,40,0.18);border-color:rgba(230,90,90,0.55)}
.ph-pill.current{background:rgba(190,145,60,0.18);border-color:rgba(220,180,90,0.7)}
.ph-pill.future{opacity:0.6}
.ph-pill-icon{font-size:9px;font-weight:bold;line-height:1}
.ph-pill.success .ph-pill-icon{color:#72e0a0}
.ph-pill.fail .ph-pill-icon{color:#f07070}
.ph-pill-lbl{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);line-height:1}
.ph-pill-curnum{font-size:13px;font-weight:700;color:#f0e0a0;line-height:1}

/* Bottom action panel — fixed to bottom of phone */
.ph-action-panel{position:relative;z-index:10;flex-shrink:0;background:var(--aw-panel,rgba(19,23,31,.82));border-top:1px solid var(--aw-nav-border,rgba(255,255,255,.08));padding:7px 8px 9px}
.ph-vote-title{font-size:7px;color:var(--aw-subtext,#aeb6c7);text-align:center;margin-bottom:5px}
.ph-vote-team{display:flex;gap:14px;justify-content:center;margin-bottom:5px}
.ph-vote-av{width:22px;height:22px;border-radius:50%;background:rgba(12,10,8,0.5);border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));display:flex;align-items:center;justify-content:center;font-size:11px}
.ph-vote-name{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);text-align:center;margin-top:2px}
.ph-vote-divider{width:100%;height:1px;background:var(--aw-input-bg,rgba(255,255,255,.06));margin:4px 0}
.ph-vote-btns{display:flex;gap:3px}
.ph-vote-yes{flex:1;background:linear-gradient(180deg,#e4c281,#c89b52);color:#1a1510;border-radius:5px;padding:5px 0;font-size:8px;font-weight:700;text-align:center}
.ph-vote-no{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--aw-text,#eef1f7);border-radius:5px;padding:5px 0;font-size:8px;text-align:center}

/* Identity card */
.ph-role-big{display:flex;flex-direction:column;align-items:center;padding:8px 6px 6px}
.ph-role-img-big{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid var(--aw-accent,#d9b36b);margin-bottom:5px;background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ph-faction-tag{padding:2px 8px;border-radius:999px;font-size:6.5px;margin-bottom:7px}
.ph-role-desc{font-size:6.5px;color:var(--aw-subtext,#aeb6c7);line-height:1.6;text-align:center;max-width:220px;margin-bottom:6px}

/* Known players list */
.ph-known-list{display:flex;flex-direction:column;gap:3px}
.ph-known-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:4px;background:var(--aw-input-bg,rgba(255,255,255,.06));border:1px solid var(--aw-input-border,rgba(255,255,255,.14))}
.ph-known-av{width:18px;height:18px;border-radius:50%;background:var(--aw-bg-2,#161b24);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.ph-known-badge{min-width:14px;height:14px;padding:0 3px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(236,196,118,0.96);color:#20160d;font-size:6px;font-weight:700;line-height:1;margin-left:auto;flex-shrink:0}
.ph-known-role{padding:1px 5px;border-radius:999px;font-size:6px}
.ph-known-role.evil{background:rgba(110,12,12,0.5);border:1px solid rgba(220,60,60,0.4);color:#fca5a5}
.ph-known-role.good{background:rgba(7,50,120,0.4);border:1px solid rgba(78,158,255,0.4);color:#bfdbfe}

/* ── Panel header (gold left-border + gradient) used across stats/history ── */
.ph-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-left:2px solid #d8b06b;background:linear-gradient(90deg,rgba(216,176,107,0.16),transparent);border-bottom:1px solid rgba(216,176,107,0.10);margin-bottom:0;border-radius:0}
.ph-panel-title{color:#f2e5c8;font-size:8px;font-weight:700;letter-spacing:1px}
.ph-panel-sub{color:rgba(216,176,107,0.5);font-size:6.5px}

/* ── Mission vote table ── */
.ph-mission-table{width:100%;border-radius:5px;overflow:hidden;border:1px solid var(--aw-panel-border,rgba(255,255,255,.08))}
.ph-mt-head{display:grid;background:rgba(255,255,255,0.04);padding:3px 5px;font-size:5.5px;font-weight:700;color:var(--aw-subtext,#aeb6c7);letter-spacing:0.5px}
.ph-mt-row{display:grid;padding:3.5px 5px;border-top:1px solid rgba(255,255,255,0.05);align-items:center}
.ph-mt-row:nth-child(even){background:rgba(255,255,255,0.02)}
.ph-mt-round{font-size:5.5px;font-weight:700;color:var(--aw-subtext,#aeb6c7)}
.ph-mt-team{display:flex;gap:2px;align-items:center}
.ph-mt-av{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:6px;border:1px solid rgba(255,255,255,.12)}
.ph-mt-votes{display:flex;gap:2px;align-items:center}
.ph-mt-v{font-size:6px;font-weight:700;min-width:10px;text-align:center}
.ph-mt-v.y{color:#50dc8c}.ph-mt-v.n{color:#ff6b6b}
.ph-mt-result{font-size:6px;font-weight:700;padding:1px 4px;border-radius:999px}
.ph-mt-result.ok{background:rgba(80,220,140,0.15);color:#50dc8c;border:1px solid rgba(80,220,140,0.3)}
.ph-mt-result.ng{background:rgba(220,80,80,0.15);color:#ff6b6b;border:1px solid rgba(220,80,80,0.3)}

/* ── AI speak / chat section ── */
.ph-speak-list{display:flex;flex-direction:column;gap:4px}
.ph-speak-row{display:flex;align-items:flex-start;gap:4px}
.ph-speak-row.me{flex-direction:row-reverse}
.ph-speak-av{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;border:1px solid rgba(255,255,255,.12)}
.ph-speak-wrap{display:flex;flex-direction:column;gap:1px;max-width:76%}
.ph-speak-wrap.me{align-items:flex-end}
.ph-speak-nm{font-size:5px;color:var(--aw-subtext,#aeb6c7);margin:0 2px}
.ph-speak-bubble{padding:4px 6px;border-radius:5px;font-size:6px;line-height:1.55;color:var(--aw-text,#eef1f7)}
.ph-speak-bubble.other{background:var(--aw-input-bg,rgba(255,255,255,.07));border:1px solid var(--aw-input-border,rgba(255,255,255,.12))}
.ph-speak-bubble.me{background:linear-gradient(135deg,rgba(216,176,107,0.22),rgba(216,176,107,0.12));border:1px solid rgba(216,176,107,0.28);color:#f2e5c8}
.ph-speak-bubble.ai{background:rgba(78,158,255,0.10);border:1px solid rgba(78,158,255,0.22);color:#bfdbfe}

/* ── Stats overview ── */
.ph-ov-nums{display:flex;align-items:center;padding:8px 8px 6px}
.ph-ov-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.ph-ov-num{font-size:20px;font-weight:900;line-height:1;letter-spacing:-1px}
.ph-ov-lbl{font-size:5.5px;color:rgba(255,255,255,0.3);letter-spacing:2px}
.ph-ov-divider{width:1px;height:30px;background:rgba(216,176,107,0.15)}

/* Faction bar */
.ph-faction-wrap{padding:0 7px 8px}
.ph-faction-bar-labels{display:flex;justify-content:space-between;margin-bottom:3px}
.ph-faction-bar-track{height:4px;border-radius:999px;background:rgba(255,255,255,0.06);overflow:hidden;display:flex}
.ph-faction-bar-good{height:100%;background:linear-gradient(90deg,#2a6ab0,#4e9eff)}
.ph-faction-bar-evil{height:100%;background:linear-gradient(90deg,#c03030,#e05050)}
.ph-faction-cards{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px}
.ph-fc{border-radius:5px;padding:5px 6px}
.ph-fc.good{background:rgba(78,158,255,0.07);border:1px solid rgba(78,158,255,0.22)}
.ph-fc.evil{background:rgba(220,60,60,0.07);border:1px solid rgba(220,60,60,0.22)}
.ph-fc-title{display:block;font-size:6.5px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.ph-fc.good .ph-fc-title{color:#7ac7ff}.ph-fc.evil .ph-fc-title{color:#ff8080}
.ph-fc-big{font-size:13px;font-weight:900;line-height:1}
.ph-fc.good .ph-fc-big{color:#4e9eff}.ph-fc.evil .ph-fc-big{color:#e05050}
.ph-fc-small{font-size:5.5px;color:rgba(255,255,255,0.3)}
.ph-fc-rate{display:block;font-size:7px;font-weight:600;margin-top:1px}
.ph-fc.good .ph-fc-rate{color:#6edea8}.ph-fc.evil .ph-fc-rate{color:#ff9898}

/* Role grid */
.ph-role-grid{display:grid;grid-template-columns:1fr 1fr}
.ph-role-cell{padding:7px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border-right:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);position:relative}
.ph-role-cell:nth-child(2n){border-right:none}
.ph-role-cell:nth-last-child(1),.ph-role-cell:nth-last-child(2){border-bottom:none}
.ph-role-cell-topbar{position:absolute;top:0;left:0;right:0;height:1.5px}
.ph-role-cell-topbar.good{background:linear-gradient(90deg,transparent,rgba(78,158,255,0.7) 50%,transparent)}
.ph-role-cell-topbar.evil{background:linear-gradient(90deg,transparent,rgba(220,80,80,0.7) 50%,transparent)}
.ph-gauge{position:relative;width:36px;height:36px;margin-top:3px}
.ph-gauge-ring{position:absolute;top:0;left:0;width:36px;height:36px;border-radius:50%}
.ph-gauge-inner{position:absolute;top:4px;left:4px;width:28px;height:28px;border-radius:50%;background:rgba(14,18,28,0.96);overflow:hidden;display:flex;align-items:center;justify-content:center}
.ph-gauge-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ph-rs-name{font-size:7px;font-weight:700;text-align:center}
.ph-rs-name.good{color:#7ac7ff}.ph-rs-name.evil{color:#ff8a8a}
.ph-rs-games{font-size:5.5px;color:rgba(255,255,255,0.3)}
.ph-rs-rate{font-size:9px;font-weight:900;line-height:1}
.ph-rs-rate.hi{color:#50dc8c}.ph-rs-rate.lo{color:#ff8080}.ph-rs-rate.na{color:rgba(255,255,255,.18);font-size:8px}

/* Skin picker */
.ph-skin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:5px 5px 6px}
.ph-skin-card{border-radius:4px;border:1.5px solid rgba(255,255,255,0.1);padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;background:rgba(255,255,255,0.03)}
.ph-skin-card.on{border-color:var(--aw-accent,#d9b36b);background:rgba(217,179,107,0.06)}
.ph-skin-dots{display:flex;gap:2px;align-items:center;justify-content:center;height:12px}
.ph-skin-dot{width:7px;height:7px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.15)}
.ph-skin-name{font-size:5.5px;color:rgba(220,210,190,0.75);text-align:center}
.ph-skin-check{position:absolute;top:1px;right:2px;font-size:6px;color:var(--aw-accent,#d9b36b)}

/* ── History cards ── */
.ph-hc{position:relative;overflow:hidden;border-radius:9px;border:1px solid transparent;margin-bottom:4px}
.ph-hc.win{background:linear-gradient(135deg,rgba(20,60,36,0.88),rgba(10,14,24,0.94) 55%);border-color:rgba(80,220,140,0.38)}
.ph-hc.lose{background:linear-gradient(135deg,rgba(60,16,16,0.88),rgba(10,14,24,0.94) 55%);border-color:rgba(220,80,80,0.35)}
.ph-hc.spec{background:linear-gradient(135deg,rgba(54,40,14,0.88),rgba(10,14,24,0.94) 55%);border-color:rgba(216,176,107,0.32)}
.ph-hc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px}
.ph-hc.win::before{background:linear-gradient(180deg,rgba(80,220,140,0.9),rgba(80,220,140,0.15))}
.ph-hc.lose::before{background:linear-gradient(180deg,rgba(220,80,80,0.9),rgba(220,80,80,0.15))}
.ph-hc.spec::before{background:linear-gradient(180deg,rgba(216,176,107,0.8),rgba(216,176,107,0.12))}
.ph-hc-body{padding:6px 7px 5px 9px;position:relative}
.ph-hc-top{display:flex;align-items:flex-start;gap:5px}
.ph-hc-av{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:rgba(20,26,44,0.9);font-size:13px}
.ph-hc-av.good{border-color:#4e9eff;box-shadow:0 0 6px rgba(78,158,255,0.3)}
.ph-hc-av.evil{border-color:#e05050;box-shadow:0 0 6px rgba(220,80,80,0.3)}
.ph-hc-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ph-hc-info{flex:1;min-width:0}
.ph-hc-headrow{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:2px}
.ph-hc-rolename{font-size:8px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-hc-rolename.good{color:#7ac7ff}.ph-hc-rolename.evil{color:#ff8a8a}
.ph-hc-badge{display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:999px;border:1px solid transparent;flex-shrink:0}
.ph-hc-badge.win{background:rgba(80,220,140,0.12);border-color:rgba(80,220,140,0.35)}
.ph-hc-badge.lose{background:rgba(220,80,80,0.12);border-color:rgba(220,80,80,0.32)}
.ph-hc-badge-dot{width:4px;height:4px;border-radius:50%}
.ph-hc-badge.win .ph-hc-badge-dot{background:#50dc8c}
.ph-hc-badge.lose .ph-hc-badge-dot{background:#ff6b6b}
.ph-hc-badge-txt{font-size:6px;font-weight:700;letter-spacing:1px}
.ph-hc-badge.win .ph-hc-badge-txt{color:#50dc8c}
.ph-hc-badge.lose .ph-hc-badge-txt{color:#ff8080}
.ph-hc-meta{display:flex;align-items:center;gap:3px;line-height:1}
.ph-hc-metaitem{font-size:6px;color:rgba(200,210,230,0.42)}
.ph-hc-metasep{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.18);flex-shrink:0}
.ph-hc-bottom{display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin-top:5px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.055)}
.ph-hc-medal{display:flex;align-items:center;gap:2px;padding:2px 5px;border-radius:999px;background:rgba(216,176,107,0.06);border:1px solid rgba(216,176,107,0.16)}
.ph-hc-medal-txt{font-size:5.5px;color:rgba(216,176,107,0.72)}
/* medals in role stats */
.ph-medal-section{padding:6px 8px}
.ph-medal-section+.ph-medal-section{border-top:1px solid rgba(255,255,255,0.06);padding-top:6px}
.ph-medal-section-title{display:block;font-size:7px;font-weight:700;letter-spacing:1px;margin-bottom:5px;padding-left:4px}
.ph-medal-section-title.good{color:#7ac7ff;border-left:2px solid rgba(78,158,255,0.6)}
.ph-medal-section-title.evil{color:#ff8a8a;border-left:2px solid rgba(220,80,80,0.6)}
.ph-medal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.ph-medal-card{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 3px;border-radius:6px;background:rgba(216,176,107,0.05);border:1px solid rgba(216,176,107,0.14);text-align:center}
.ph-medal-zero{opacity:0.32}
.ph-medal-name{font-size:5.5px;color:rgba(242,229,200,0.75);line-height:1.3}
.ph-medal-cnt{font-size:8px;font-weight:800;color:#d8b06b}
.ph-hc-time{margin-left:auto;font-size:5.5px;color:rgba(200,210,230,0.3);white-space:nowrap}

/* pagination */
.ph-pagination{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:8px 14px 12px;background:linear-gradient(0deg,rgba(6,8,15,1) 55%,rgba(6,8,15,.6) 80%,transparent);display:flex;align-items:center;justify-content:center;gap:12px}

/* ── Bottom panel toggle (发言/投票/任务) ── */
.ph-panel-toggle{display:flex;gap:1px;padding:3px 8px 3px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;z-index:10}
.ph-toggle-btn{flex:1;text-align:center;padding:3px 0;font-size:6.5px;color:var(--aw-subtext,#aeb6c7);cursor:pointer;border-radius:3px;transition:all .1s}
.ph-toggle-btn.active{background:rgba(255,255,255,.09);color:var(--aw-text,#eef1f7);font-weight:700}

/* ── Speak panel (发言) ── */
.ph-spk-card{position:relative;z-index:10;flex-shrink:0;background:var(--aw-panel,rgba(19,23,31,.82));border-top:1px solid var(--aw-nav-border,rgba(255,255,255,.08));padding:6px 8px 8px}
.ph-spk-accent{height:2px;background:linear-gradient(90deg,transparent,var(--aw-accent,#d9b36b) 50%,transparent);margin:-6px -8px 5px}
.ph-spk-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ph-spk-av{width:22px;height:22px;border-radius:50%;background:rgba(12,10,8,.5);border:1px solid var(--aw-panel-border,rgba(255,255,255,.1));display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;position:relative}
.ph-spk-dot{position:absolute;right:-2px;top:-2px;width:6px;height:6px;border-radius:50%;background:#4ade80;border:1px solid rgba(0,0,0,.5)}
.ph-spk-info{flex:1;min-width:0}
.ph-spk-nm{font-size:8px;font-weight:700;color:var(--aw-text,#eef1f7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ph-spk-hint{font-size:5.5px;color:var(--aw-subtext,#aeb6c7);margin-top:1px}
.ph-spk-timer{font-size:9px;font-weight:700;color:var(--aw-accent,#d9b36b);flex-shrink:0}
.ph-spk-track{height:3px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin-bottom:5px}
.ph-spk-fill{height:100%;border-radius:999px;background:var(--aw-accent,#d9b36b)}
.ph-spk-divider{width:100%;height:1px;background:var(--aw-input-bg,rgba(255,255,255,.06));margin:4px 0}
.ph-spk-input-row{display:flex;gap:3px;margin-bottom:3px}
.ph-spk-input{flex:1;background:var(--aw-input-bg,rgba(255,255,255,.06));border:1px solid var(--aw-input-border,rgba(255,255,255,.14));border-radius:4px;color:var(--aw-subtext,#aeb6c7);font-size:7px;padding:3px 5px}
.ph-spk-send{background:linear-gradient(180deg,#e4c281,#c89b52);color:#1a1510;border-radius:4px;padding:3px 8px;font-size:7px;font-weight:700;flex-shrink:0}
.ph-spk-end{width:100%;background:transparent;border:1px solid var(--aw-btn-ghost-border,rgba(255,255,255,.2));color:var(--aw-btn-ghost-text,#eef1f7);border-radius:4px;padding:4px;font-size:7px;text-align:center}

/* ── End-game reveal grid ── */
.ph-reveal-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ph-reveal-card{border-radius:5px;padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;border:1px solid transparent;position:relative}
.ph-reveal-card.good{background:rgba(7,50,120,.22);border-color:rgba(78,158,255,.32)}
.ph-reveal-card.evil{background:rgba(100,15,15,.28);border-color:rgba(220,60,60,.32)}
.ph-reveal-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;flex-shrink:0}
.ph-reveal-av.good{border:1.5px solid rgba(78,158,255,.72);box-shadow:0 0 6px rgba(78,158,255,.28);background:rgba(7,40,110,.4)}
.ph-reveal-av.evil{border:1.5px solid rgba(220,60,60,.72);box-shadow:0 0 6px rgba(200,40,40,.28);background:rgba(45,6,6,.8)}
.ph-reveal-av img{width:100%;height:100%;object-fit:cover}
.ph-reveal-nm{font-size:6.5px;font-weight:700;color:var(--aw-text,#eef1f7)}
.ph-reveal-role{font-size:5.5px;padding:1px 5px;border-radius:999px}
.ph-reveal-role.good{background:rgba(7,50,120,.4);border:1px solid rgba(78,158,255,.4);color:#bfdbfe}
.ph-reveal-role.evil{background:rgba(100,15,15,.5);border:1px solid rgba(220,60,60,.4);color:#fca5a5}
.ph-reveal-dead{position:absolute;top:2px;right:3px;font-size:7px;opacity:.65}
/* Result banner */
.ph-end-banner{border-radius:8px;padding:8px 10px;text-align:center;margin-bottom:4px}
.ph-end-banner.good-win{background:linear-gradient(135deg,rgba(7,50,120,.55),rgba(12,14,30,.90));border:1px solid rgba(78,158,255,.42)}
.ph-end-banner.evil-win{background:linear-gradient(135deg,rgba(100,15,15,.60),rgba(16,6,6,.92));border:1px solid rgba(220,60,60,.40)}
.ph-end-title{font-size:14px;font-weight:900;letter-spacing:2px;line-height:1.2}
.ph-end-banner.good-win .ph-end-title{color:#7ac7ff;text-shadow:0 0 16px rgba(78,158,255,.6)}
.ph-end-banner.evil-win .ph-end-title{color:#ff8a8a;text-shadow:0 0 16px rgba(220,80,80,.6)}
.ph-end-sub{font-size:6.5px;margin-top:3px;opacity:.55}
.ph-pg-arrow{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(216,176,107,0.28);color:#d8b06b;font-size:12px;display:flex;align-items:center;justify-content:center}
.ph-pg-indicator{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:22px}
.ph-pg-num{font-size:11px;font-weight:700;line-height:1;color:#d8b06b}
.ph-pg-lbl{font-size:5px;letter-spacing:2px;color:rgba(200,210,230,0.35)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* ─── Mobile ─── */
.mob-nav{display:none}
@media(max-width:768px){
  body{overflow:hidden}
  /* Header: compact, hide subtitle and key input */
  .hd{padding:0 12px;gap:8px}
  .hd-sep,.hd-key-wrap{display:none}
  /* Show compact key button instead */
  .hd-key-btn{display:flex!important}
  /* Skin tabs: smaller */
  .stab{padding:5px 10px}
  .stab-id{display:none}
  /* Workspace: show one panel at a time via flex column */
  .workspace{
    display:flex;flex-direction:column;
    grid-template-columns:unset;
    overflow:hidden;
  }
  .panel-assets,.panel-prompt,.panel-preview{
    display:none;border:none;flex:1;min-height:0;overflow-y:auto;
    padding-bottom:64px; /* clear fixed mob-nav */
  }
  .panel-assets.mob-active,.panel-prompt.mob-active,.panel-preview.mob-active{
    display:flex;flex-direction:column;
  }
  /* Preview panel: full screen, tabs float as overlay, phone centered */
  .panel-preview.mob-active{
    padding:0;overflow:hidden;position:relative;
    padding-bottom:56px;/* clear mob-nav */
    align-items:center;justify-content:flex-start;
    padding-top:36px;/* clear floating tab bar */
  }
  /* Preview tabs: float at top as translucent overlay */
  .panel-preview .preview-tabs{
    position:absolute;top:0;left:0;right:0;z-index:50;
    width:100%;margin-bottom:0;border-radius:0;
    border:none;border-bottom:1px solid rgba(255,255,255,.08);
    background:rgba(9,11,17,.88);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;justify-content:flex-start;
    padding:5px 8px;
  }
  .panel-preview .preview-tabs::-webkit-scrollbar{display:none}
  .panel-preview .preview-tab{flex:0 0 auto;white-space:nowrap;font-size:11px;padding:5px 14px}
  /* Phone frame: strip chrome, keep natural size for transform-scale */
  /* pointer-events:none prevents scaled hit-area from blocking mob-nav taps */
  .phone-frame{
    border:none!important;border-radius:0!important;
    box-shadow:none!important;
    transform-origin:top center;
    flex-shrink:0;
    pointer-events:none;
  }
  /* Hide helper tip on mobile */
  .panel-preview > div:last-child{display:none}
  /* Prompt panel: block layout on mobile so overflow-y:auto actually scrolls */
  .panel-prompt.mob-active{display:block;overflow-y:auto;overflow-x:hidden}
  .pp-prompt-area{flex:none;overflow:visible;display:block;min-height:0}
  .pp-prompt-wrap{flex:none;overflow:visible;display:block}
  .pp-top{padding:12px 14px 10px}
  .pp-actions{flex-wrap:wrap;padding:10px 14px;gap:8px}
  .btn{padding:10px 14px;font-size:13px}
  .pp-result-img{max-height:260px}
  .pp-prompt{flex:none;width:100%;min-height:100px;height:auto;resize:vertical;box-sizing:border-box}
  /* Bottom nav */
  .mob-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    height:56px;background:var(--surface);border-top:1px solid var(--border);
  }
  .mob-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;cursor:pointer;color:var(--sub);font-size:10px;transition:color .15s;
    -webkit-tap-highlight-color:transparent;border:none;background:none;
  }
  .mob-nav-btn.active{color:var(--accent)}
  .mob-nav-icon{font-size:18px;line-height:1}
  /* Atlas grid slightly larger cells on mobile */
  #atlasGrid{gap:8px!important}
  /* Stitch progress text */
  #stitchProgress{padding:0 14px 8px}
  /* Asset panel padding */
  .panel-assets{padding-bottom:0}
  /* Key modal */
  .mob-key-modal{
    display:none;position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.7);align-items:flex-end;
  }
  .mob-key-modal.open{display:flex}
  .mob-key-sheet{
    width:100%;background:var(--surface);border-radius:16px 16px 0 0;
    padding:20px 16px 36px;border-top:1px solid var(--border);
  }
  .mob-key-sheet label{font-size:12px;color:var(--sub);display:block;margin-bottom:8px}
  .mob-key-sheet input{
    width:100%;background:var(--card);border:1px solid var(--border);
    border-radius:8px;color:var(--text);font-size:14px;padding:10px 12px;
    font-family:var(--mono);outline:none;
  }
  .mob-key-close{margin-top:12px;width:100%;padding:12px;border-radius:8px;
    background:var(--accent);color:#1a1200;font-weight:700;font-size:14px;
    border:none;cursor:pointer}
}
@media(min-width:769px){
  .hd-key-btn{display:none!important}
  .mob-key-modal{display:none!important}
}

/* ── Fullscreen preview overlay ──────────────────────────── */
#fsOverlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#000;flex-direction:column;align-items:center;
  justify-content:space-between;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
#fsOverlay.open{display:flex}
#fsClose{
  position:absolute;top:max(env(safe-area-inset-top,0px),14px);right:16px;
  width:36px;height:36px;border-radius:50%;z-index:10;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.22);
  color:#fff;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
#fsTabLabel{
  position:absolute;top:max(env(safe-area-inset-top,0px),16px);left:16px;
  color:rgba(255,255,255,.55);font-size:12px;z-index:10;
  pointer-events:none;letter-spacing:.5px;
}
#fsContent{
  flex:1;width:100%;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#fsPhoneScreen{
  width:280px;height:560px;
  transform-origin:center center;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  flex-shrink:0;
}
#fsDots{
  padding:10px 0 calc(10px + env(safe-area-inset-bottom,0px));
  display:flex;gap:5px;align-items:center;justify-content:center;
  flex-shrink:0;
}
.fs-dot{
  width:7px;height:7px;border-radius:4px;
  background:rgba(255,255,255,.25);cursor:pointer;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  -webkit-tap-highlight-color:transparent;
}
.fs-dot.active{width:24px;background:rgba(255,255,255,.9)}
/* Tap-to-fullscreen zone on phone frame */
#fsTapZone{
  display:none;position:absolute;inset:0;z-index:10;cursor:pointer;
}
/* Fullscreen entry button (desktop) */
#fsBtn{
  display:none;margin-top:8px;padding:5px 12px;border-radius:6px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--sub);font-size:11px;cursor:pointer;
  transition:background .15s;
}
#fsBtn:hover{background:rgba(255,255,255,.1)}
@media(max-width:768px){
  #fsTapZone{display:block}
  /* phone-frame: allow pointer events for tap-to-fullscreen */
  .phone-frame{pointer-events:auto!important;cursor:pointer}
}
@media(min-width:769px){
  #fsBtn{display:inline-flex;align-items:center;gap:4px}
}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-dot"></div>
  <span class="hd-title">AVALON · SKIN STUDIO</span>
  <div class="hd-sep"></div>
  <span style="font-size:11px;color:var(--sub)">左选素材 · 中间生成 · 右预览效果</span>
  <div class="hd-key-wrap">
    <span class="hd-key-label">OpenAI Key</span>
    <div class="hd-key-status" id="keyStatus"></div>
    <input class="hd-key" id="apiKey" type="password" placeholder="sk-..." oninput="onKeyInput()">
  </div>
  <!-- Mobile: compact key button -->
  <button class="hd-key-btn" style="display:none;margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:11px;padding:5px 10px;cursor:pointer" onclick="document.getElementById('mobKeyModal').classList.add('open')">
    🔑 <span id="mobKeyDot" style="width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;vertical-align:middle"></span>
  </button>
</div>

<!-- Mobile bottom nav -->
<div class="mob-nav" id="mobNav">
  <button class="mob-nav-btn active" id="mobTabAssets" onclick="switchMobilePanel('assets')">
    <span class="mob-nav-icon">🗂️</span>素材
  </button>
  <button class="mob-nav-btn" id="mobTabPrompt" onclick="switchMobilePanel('prompt')">
    <span class="mob-nav-icon">✏️</span>提示词
  </button>
  <button class="mob-nav-btn" id="mobTabPreview" onclick="switchMobilePanel('preview')">
    <span class="mob-nav-icon">📱</span>预览
  </button>
</div>

<!-- Mobile key input modal -->
<div class="mob-key-modal" id="mobKeyModal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="mob-key-sheet">
    <label>OpenAI API Key（用于生成图片）</label>
    <input type="password" id="mobApiKey" placeholder="sk-..." oninput="onMobKeyInput()">
    <button class="mob-key-close" onclick="document.getElementById('mobKeyModal').classList.remove('open')">完成</button>
  </div>
</div>

<div class="skin-tabs" id="skinTabs"></div>

<div class="workspace">
  <!-- ── Left: Asset list ── -->
  <div class="panel-assets" id="assetPanel"></div>

  <!-- ── Middle: Prompt + Generate ── -->
  <div class="panel-prompt" id="promptPanel">
    <div class="pp-top">
      <div class="pp-asset-label" id="ppLabel" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="min-width:0">
          <span class="pp-asset-name" id="ppName">← 选择左侧素材</span>
          <span class="pp-spec" id="ppSpec"></span>
        </div>
        <button class="btn btn-ghost" style="flex-shrink:0;padding:6px 12px;font-size:12px" onclick="document.getElementById('uploadInput').click()">📤 上传图片</button>
      </div>
    </div>
    <!-- Atlas grid view (shown when atlas parent selected) -->
    <div id="atlasView" style="display:none;padding:12px 14px 4px">
      <div id="atlasFullPreview"></div>
      <div id="atlasGrid" style="display:grid;gap:6px"></div>
    </div>
    <!-- Normal prompt + result (shown for non-atlas or slot selection) -->
    <div class="pp-prompt-area" id="promptArea">
      <textarea class="pp-prompt" id="ppPrompt" placeholder="点击左侧素材查看对应 Prompt…"></textarea>
      <div class="pp-loading" id="ppLoading">
        <div class="spinner"></div>
        <span>正在生成…</span>
      </div>
      <img class="pp-result-img" id="ppResultImg" alt="生成结果">
    </div>
    <div class="pp-actions">
      <button class="btn btn-primary" id="btnGenerate" onclick="generate()" disabled>⚡ 生成图片</button>
      <button class="btn btn-ghost" id="btnStitch" onclick="stitchFromCDN()" style="display:none">🧩 拼接现有素材</button>
      <button class="btn btn-ghost" id="btnCopy" onclick="copyPrompt()">复制 Prompt</button>
      <button class="btn btn-good" id="btnApply" onclick="applyToPreview()" style="display:none">✓ 应用到预览</button>
      <button class="btn btn-ghost" id="btnDownload" onclick="downloadResult()" style="display:none">↓ 下载</button>
    </div>
    <input type="file" id="uploadInput" accept="image/*" style="display:none" onchange="handleUpload(this)">
    <div id="stitchProgress" style="display:none;font-size:10px;color:var(--c-sub);margin-top:6px;text-align:center"></div>
  </div>

  <!-- ── Right: Phone Preview ── -->
  <div class="panel-preview" id="previewPanel">
    <div class="preview-tabs">
      <div class="preview-tab active" onclick="setPreviewTab('home',this)">主页</div>
      <div class="preview-tab" onclick="setPreviewTab('game',this)">游戏中</div>
      <div class="preview-tab" onclick="setPreviewTab('stats',this)">角色统计</div>
      <div class="preview-tab" onclick="setPreviewTab('history',this)">历史对战</div>
      <div class="preview-tab" onclick="setPreviewTab('role',this)">身份牌</div>
      <div class="preview-tab" onclick="setPreviewTab('event',this)">任务结果</div>
      <div class="preview-tab" onclick="setPreviewTab('endgame',this)">终局</div>
      <div class="preview-tab" onclick="setPreviewTab('ui',this)">UI组件</div>
    </div>
    <div style="position:relative;flex-shrink:0">
      <div class="phone-frame" id="phoneFrame" onclick="enterFullscreen()">
        <!-- Filled by JS -->
      </div>
      <!-- tap zone overlay for mobile (absorbs the click, enters fullscreen) -->
      <div id="fsTapZone" onclick="enterFullscreen()"></div>
    </div>
    <button id="fsBtn" onclick="enterFullscreen()">⛶ 全屏预览</button>
    <div style="margin-top:10px;font-size:10px;color:var(--muted);text-align:center">生成图片后点「应用到预览」即时生效</div>
  </div>
</div>

<!-- ── Fullscreen preview overlay ── -->
<div id="fsOverlay">
  <span id="fsTabLabel"></span>
  <button id="fsClose" onclick="exitFullscreen();event.stopPropagation()">✕</button>
  <div id="fsContent">
    <div id="fsPhoneScreen"></div>
  </div>
  <div id="fsDots"></div>
</div>

// ══════════════════════════════════════════════════════════════
let _idb = null;
function idbOpen() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open('skin-studio-v1', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('assets');
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror = () => rej(req.error);
  });
}
function idbSave(key, val) {
  if (!val || !val.startsWith('data:')) return; // skip plain CDN URLs
  idbOpen()
    .then(db => db.transaction('assets', 'readwrite').objectStore('assets').put(val, key))
    .catch(e => console.warn('idbSave failed', e));
}
function idbDelete(key) {
  idbOpen()
    .then(db => db.transaction('assets', 'readwrite').objectStore('assets').delete(key))
    .catch(() => {});
}
function idbLoadAll() {
  return idbOpen().then(db => new Promise(res => {
    const result = {};
    const req = db.transaction('assets').objectStore('assets').openCursor();
    req.onsuccess = e => {
      const cursor = e.target.result;
      if (cursor) { result[cursor.key] = cursor.value; cursor.continue(); }
      else res(result);
    };
    req.onerror = () => res({});
  })).catch(() => ({}));
}

// ── Mobile panel switching ──
let currentMobilePanel = 'assets';
const MOB_PANELS = {assets:'assetPanel', prompt:'promptPanel', preview:'previewPanel'};
const MOB_TABS   = {assets:'mobTabAssets', prompt:'mobTabPrompt', preview:'mobTabPreview'};
function switchMobilePanel(panel) {
  if (currentMobilePanel === panel) return; // already on this panel, do nothing
  currentMobilePanel = panel;
  Object.keys(MOB_PANELS).forEach(p => {
    const el  = document.getElementById(MOB_PANELS[p]);
    const tab = document.getElementById(MOB_TABS[p]);
    if (el)  { if (p === panel) el.classList.add('mob-active');  else el.classList.remove('mob-active'); }
    if (tab) { if (p === panel) tab.classList.add('active'); else tab.classList.remove('active'); }
  });
  if (panel === 'preview') requestAnimationFrame(scalePhoneFrame);
}
function isMobile() { return window.innerWidth <= 768; }

function scalePhoneFrame() {
  const frame = document.getElementById('phoneFrame');
  if (!frame) return;
  if (!isMobile()) { frame.style.transform = ''; frame.style.marginBottom = ''; return; }
  const panel = document.getElementById('previewPanel');
  if (!panel) return;
  // Panel has padding-top:36px (tab bar) + padding-bottom:56px (mob-nav) applied via CSS
  // Available visual area for the phone
  const availW = panel.clientWidth;
  const availH = panel.clientHeight - 36 - 56;
  const scaleW = availW / 280;
  const scaleH = availH / 560;
  const scale  = Math.min(scaleW, scaleH, 3.0);
  frame.style.transform = `scale(${scale})`;
  frame.style.transformOrigin = 'top center';
  // Compensate layout height: transform doesn't affect flow, add margin so panel scrolls correctly
  frame.style.marginBottom = Math.max(0, Math.round(560 * (scale - 1))) + 'px';
}
window.addEventListener('resize', () => { if (isMobile() && currentMobilePanel === 'preview') scalePhoneFrame(); });

function getAssetUrl(skinId, asset) {
  const key = `${skinId}:${asset.id}`;
  if (generatedAssets[key]) return generatedAssets[key];
  if (skinId === 'dark-gold' || asset.cdnAlways) return `${CDN}/${asset.cdnFile || asset.file}`;
  return null;
}

function renderAssets() {
  const container = document.getElementById('assetPanel');
  const cats = [...new Set(ASSETS.map(a => a.cat))];
  container.innerHTML = cats.map(cat => {
    const items = ASSETS.filter(a => a.cat === cat);
    return `<div class="asset-cat">${cat}</div>` + items.map(a => {
      const key = `${currentSkin}:${a.id}`;
      const hasGen = !!generatedAssets[key];

      if (a.slots) {
        // ── Atlas parent row ──
        const slotCount = a.slots.filter(s => s).length;
        const doneCount = a.slots.filter(s => s && generatedAssets[`${currentSkin}:${s.id}`]).length;
        const atlasUrl  = generatedAssets[key];
        const firstSlot = a.slots.find(s => s);
        const thumbUrl  = atlasUrl
          || (firstSlot ? (generatedAssets[`${currentSkin}:${firstSlot.id}`]
              || (firstSlot.cdnFile ? `${CDN}/${firstSlot.cdnFile}` : null)) : null);
        const thumbHtml = thumbUrl
          ? `<img src="${thumbUrl}" onerror="this.style.display='none'"/>`
          : `<span style="font-size:16px">🗂️</span>`;
        const isExpanded = expandedAtlases.has(a.id);
        const isActive   = currentAsset === a.id && !currentSlot;

        let html = `<div class="asset-item ${isActive?'active':''}" onclick="selectAsset('${a.id}')">
          <div class="asset-thumb">${thumbHtml}</div>
          <div class="asset-info">
            <div class="asset-name">${a.name}</div>
            <div class="asset-file">${a.file.split('/').pop()}</div>
            <div style="font-size:9px;color:${doneCount===slotCount&&slotCount>0?'#4ade80':'var(--c-sub)'};margin-top:1px">${doneCount}/${slotCount} 已裁切</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            ${hasGen ? '<div class="asset-badge"></div>' : ''}
            <div class="atlas-toggle" onclick="event.stopPropagation();toggleAtlas('${a.id}')" title="${isExpanded?'收起':'展开'}">${isExpanded?'▾':'▸'}</div>
          </div>
        </div>`;

        // ── Child slot rows (shown when expanded) ──
        if (isExpanded) {
          html += '<div class="slot-children">' + a.slots.map((slot, idx) => {
            if (!slot) return '';
            const slotKey = `${currentSkin}:${slot.id}`;
            const slotUrl = generatedAssets[slotKey]
              || (slot.cdnFile ? `${CDN}/${slot.cdnFile}` : null)
              || (a.id === 'medals-atlas' ? `${CDN}/medals/${slot.id === 'good_first_round_clean_captain' ? 'good_protect_round_fail_captain' : slot.id}.png` : null);
            const slotThumb = slotUrl
              ? `<img src="${slotUrl}" onerror="this.style.display='none'"/>`
              : `<span style="font-size:11px">·</span>`;
            const isSlotActive = currentAsset === a.id && currentSlot === slot.id;
            const hasCrop = !!generatedAssets[slotKey];
            return `<div class="asset-item slot-item ${isSlotActive?'active':''}" onclick="selectSlot('${a.id}','${slot.id}')">
              <div class="asset-thumb slot-thumb">${slotThumb}</div>
              <div class="asset-info">
                <div class="asset-name" style="font-size:11px">${slot.name}</div>
                <div class="asset-file" style="font-size:9px">${slot.id}</div>
              </div>
              ${hasCrop ? '<div class="asset-badge"></div>' : ''}
            </div>`;
          }).join('') + '</div>';
        }
        return html;

      } else {
        // ── Regular asset row ──
        const url = getAssetUrl(currentSkin, a);
        const thumbContent = url
          ? `<img src="${url}" onerror="this.parentElement.textContent='${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':'🗡️'}'"/>`
          : `<span style="font-size:16px">${a.tag==='bg'?'🌄':a.tag==='table'?'🪵':'🗡️'}</span>`;
        const isActive = currentAsset === a.id && !currentSlot;
        return `<div class="asset-item ${isActive?'active':''}" onclick="selectAsset('${a.id}')">
          <div class="asset-thumb">${thumbContent}</div>
          <div class="asset-info">
            <div class="asset-name">${a.name}</div>
            <div class="asset-file">${a.file.split('/').pop()}</div>
          </div>
          <div class="tag-dot" style="background:${a.tagColor}"></div>
          ${hasGen ? '<div class="asset-badge"></div>' : ''}
        </div>`;
      }
    }).join('');
  }).join('');
}

function selectAsset(id) {
  currentAsset = id;
  currentSlot  = null;
  const asset = ASSETS.find(a => a.id === id);
  const prompt = PROMPTS[currentSkin]?.[id] || '';

  if (isMobile()) switchMobilePanel('prompt');
  document.getElementById('ppName').textContent = asset.name;
  document.getElementById('ppSpec').textContent = asset.spec;
  document.getElementById('btnCopy').style.display = '';

  const isAtlas = !!asset.slots;
  const isFont  = !!asset.isFont;
  document.getElementById('atlasView').style.display = isAtlas ? '' : 'none';
  document.getElementById('promptArea').style.display = '';  // always visible

  if (isFont) {
    document.getElementById('ppPrompt').value = '字体文件需手动下载并上传。推荐字体：Zpix 像素字体（中文像素风格）或 Cinzel Decorative（拉丁字符哥特风格）。上传至 CDN 路径后填写 URL。';
    document.getElementById('btnGenerate').disabled = true;
    document.getElementById('btnStitch').style.display = 'none';
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnDownload').style.display = 'none';
    const ri = document.getElementById('ppResultImg');
    ri.classList.remove('visible');
    renderAssets();
    return;
  }

  document.getElementById('ppPrompt').value = prompt;        // atlas prompt also shown

  if (isAtlas) {
    // Clear any leftover result image from a previously selected slot
    const ri = document.getElementById('ppResultImg');
    ri.classList.remove('visible');
    document.getElementById('btnApply').style.display = 'none';
    document.getElementById('btnDownload').style.display = 'none';
    const alreadyStitched = !!generatedAssets[`${currentSkin}:${id}`];
    renderAtlasView(asset);
    if (!alreadyStitched) {
      stitchFromCDN();
    }
  } else {
    const key = `${currentSkin}:${id}`;
    const resultImg = document.getElementById('ppResultImg');
    if (generatedAssets[key]) {
      resultImg.src = generatedAssets[key];
      resultImg.classList.add('visible');
      lastGeneratedUrl = generatedAssets[key];
      document.getElementById('btnApply').style.display = '';
      document.getElementById('btnDownload').style.display = '';
    } else {
      resultImg.classList.remove('visible');
      lastGeneratedUrl = null;
      document.getElementById('btnApply').style.display = 'none';
      document.getElementById('btnDownload').style.display = 'none';
    }
  }

  const k = document.getElementById('apiKey').value.trim();
  document.getElementById('btnGenerate').disabled = isAtlas || !k.startsWith('sk-');
  if (isAtlas) {
    const alreadyDone = !!generatedAssets[`${currentSkin}:${id}`];
    const stitchBtn = document.getElementById('btnStitch');
    stitchBtn.style.display = '';
    stitchBtn.textContent = alreadyDone ? '🔄 重新拼接' : '🧩 拼接现有素材';
  } else {
    document.getElementById('btnStitch').style.display = 'none';
  }
  document.getElementById('btnApply').style.display  = isAtlas ? 'none' : (generatedAssets[`${currentSkin}:${id}`] ? '' : 'none');
  document.getElementById('btnDownload').style.display = isAtlas ? 'none' : (generatedAssets[`${currentSkin}:${id}`] ? '' : 'none');
  renderAssets();
}

// STITCH FROM CDN
// ══════════════════════════════════════════════════════════════
function slotCdnUrl(atlasId, slot) {
  if (atlasId === 'roles-atlas') return CDN + '/' + slot.cdnFile;
  const fc = slot.id === 'good_first_round_clean_captain' ? 'good_protect_round_fail_captain' : slot.id;
  return CDN + '/medals/' + fc + '.png';
}

async function loadImgBlob(url) {
  // fetch as blob → objectURL avoids canvas CORS taint
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(resp.status);
  const blob = await resp.blob();
  return URL.createObjectURL(blob);
}

async function stitchFromCDN() {
  const asset = ASSETS.find(a => a.id === currentAsset);
  if (!asset || !asset.slots) return;

  const slots = asset.slots.filter(s => s);
  const { cols, rows } = asset.grid;
  const CELL = 256;

  const progressEl = document.getElementById('stitchProgress');
  const btn = document.getElementById('btnStitch');
  btn.disabled = true;
  progressEl.style.display = '';
  progressEl.textContent = '正在加载…';

  // Try canvas path (fetch → blob → objectURL → drawImage, no CORS taint)
  let canvasOk = false;
  try {
    const canvas = document.createElement('canvas');
    canvas.width  = cols * CELL;
    canvas.height = rows * CELL;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0b11';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let idx = 0; idx < asset.slots.length; idx++) {
      const slot = asset.slots[idx];
      if (!slot) continue;
      progressEl.textContent = `加载 ${slot.name}… (${Math.round(idx/asset.slots.length*100)}%)`;
      const objUrl = await loadImgBlob(slotCdnUrl(asset.id, slot));
      await new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => {
          const col = idx % cols, row = Math.floor(idx / cols);
          ctx.drawImage(img, col * CELL, row * CELL, CELL, CELL);
          URL.revokeObjectURL(objUrl);
          res();
        };
        img.onerror = rej;
        img.src = objUrl;
      });
    }

    const dataUrl = canvas.toDataURL('image/png');
    generatedAssets[`${currentSkin}:${currentAsset}`] = dataUrl;
    idbSave(`${currentSkin}:${currentAsset}`, dataUrl);
    lastGeneratedUrl = dataUrl;
    splitAtlas(currentSkin, asset, dataUrl);

    canvasOk = true;
    progressEl.textContent = `✓ 拼接完成，已裁切 ${slots.length} 个子资源`;

  } catch(e) {
    console.warn('canvas path failed:', e);
  }

  // Fallback: store CDN URLs directly into generatedAssets per slot
  if (!canvasOk) {
    for (const slot of slots) {
      generatedAssets[`${currentSkin}:${slot.id}`] = slotCdnUrl(asset.id, slot);
    }
    // Store first slot as lastGeneratedUrl for download
    lastGeneratedUrl = slotCdnUrl(asset.id, slots[0]);
    progressEl.textContent = `✓ 已直接使用 CDN 素材（${slots.length}个）`;
  }

  document.getElementById('btnApply').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';
  btn.disabled = false;
  btn.textContent = '🔄 重新拼接';
  expandedAtlases.add(currentAsset);
  // Refresh atlas grid view
  const stitchedAsset = ASSETS.find(a => a.id === currentAsset);
  if (stitchedAsset) renderAtlasView(stitchedAsset);
  renderAssets();
  renderPreview();
}

// ══════════════════════════════════════════════════════════════
// ATLAS SPLITTING
// ══════════════════════════════════════════════════════════════
function splitAtlas(skinId, asset, dataUrl, onDone) {
  if (!asset.slots || !asset.grid) return;
  const { cols, rows } = asset.grid;
  const image = new Image();
  image.onload = () => {
    const cw = image.naturalWidth  / cols;
    const ch = image.naturalHeight / rows;
    // Center-square crop so non-4:3 source images still produce square avatars
    const size = Math.round(Math.min(cw, ch));
    asset.slots.forEach((slot, idx) => {
      if (!slot) return;
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const sx = col * cw + (cw - size) / 2;
      const sy = row * ch + (ch - size) / 2;
      const canvas = document.createElement('canvas');
      canvas.width  = size;
      canvas.height = size;
      canvas.getContext('2d').drawImage(image, sx, sy, size, size, 0, 0, size, size);
      const slotKey = skinId + ':' + slot.id;
      const slotDataUrl = canvas.toDataURL('image/png');
      generatedAssets[slotKey] = slotDataUrl;
      idbSave(slotKey, slotDataUrl);
    });
    if (onDone) onDone();
    renderAssets();
    renderPreview();
  };
  image.src = dataUrl;
}

// ══════════════════════════════════════════════════════════════
// GENERATION
// ══════════════════════════════════════════════════════════════
async function generate() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || !currentAsset) return;

  const asset = ASSETS.find(a => a.id === currentAsset);
  const prompt = document.getElementById('ppPrompt').value.trim();
  if (!prompt) return;

  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('ppLoading').classList.add('visible');
  document.getElementById('ppResultImg').classList.remove('visible');
  document.getElementById('btnApply').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';

  try {
    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'dall-e-3',
        prompt,
        n: 1,
        size: asset.dalleSize,
        quality: 'hd',
        response_format: 'b64_json'
      })
    });
    if (!res.ok) {
      const err = await res.json();
      alert('API 错误: ' + (err.error?.message || res.status));
      return;
    }
    const data = await res.json();
    const b64 = data.data[0].b64_json;
    const ext = asset.file.endsWith('.png') ? 'png' : 'jpeg';
    const dataUrl = `data:image/${ext};base64,${b64}`;

    const key2 = `${currentSkin}:${currentAsset}`;
    generatedAssets[key2] = dataUrl;
    idbSave(key2, dataUrl);
    lastGeneratedUrl = dataUrl;

    if (asset.slots) {
      // Atlas: split and refresh grid — no big result image shown
      splitAtlas(currentSkin, asset, dataUrl, () => renderAtlasView(asset));
    } else {
      const img = document.getElementById('ppResultImg');
      img.src = dataUrl;
      img.classList.add('visible');
      document.getElementById('btnApply').style.display = '';
      document.getElementById('btnDownload').style.display = '';
    }
    renderAssets();
  } catch(e) {
    alert('请求失败: ' + e.message);
  } finally {
    document.getElementById('ppLoading').classList.remove('visible');
    const k = document.getElementById('apiKey').value.trim();
    document.getElementById('btnGenerate').disabled = !k.startsWith('sk-');
  }
}

function applyToPreview() {
  renderPreview();
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file || !currentAsset) return;
  input.value = ''; // reset so same file can be re-uploaded
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const key = `${currentSkin}:${currentAsset}`;
    generatedAssets[key] = dataUrl;
    idbSave(key, dataUrl);
    lastGeneratedUrl = dataUrl;
    const asset = ASSETS.find(a => a.id === currentAsset);
    if (asset.slots) {
      // Atlas: auto-split — renderAtlasView called in callback after crops ready
      splitAtlas(currentSkin, asset, dataUrl, () => renderAtlasView(asset));
    } else {
      // Single asset: show preview and enable apply/download
      const img = document.getElementById('ppResultImg');
      img.src = dataUrl;
      img.classList.add('visible');
      document.getElementById('btnApply').style.display = '';
      document.getElementById('btnDownload').style.display = '';
    }
    renderAssets();
    renderPreview();
  };
  reader.readAsDataURL(file);
}

function downloadResult() {
  if (!lastGeneratedUrl) return;
  const asset = ASSETS.find(a => a.id === currentAsset);
  const a = document.createElement('a');
  a.href = lastGeneratedUrl;
  a.download = `${currentSkin}-${asset.file.split('/').pop()}`;
  a.click();
}

function copyPrompt() {
  const t = document.getElementById('ppPrompt').value;
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ 已复制';

    const id = type === 'home' ? 'home-bg' : 'in-game-bg';

    const cdn = currentSkin === 'dark-gold'
      ? (type === 'home' ? 'https://www.awalon.top/mp-assets/home-bg-optimized.jpg' : 'https://www.awalon.top/mp-assets/in-game-bg-optimized.jpg')
