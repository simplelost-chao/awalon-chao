              ].map(r => `<span class="ph-rchip ${r.cls}">
                <img class="ph-rchip-img" src="${roleImgUrl(r.id) || ''}" onerror="this.style.display='none'">
                <span>${r.name}</span>
              </span>`).join('')}
            </div>
            <div class="ph-adv-row" style="margin-bottom:5px;padding:3px 6px;border-radius:calc(4px * var(--aw-r));border:1px solid var(--aw-panel-border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:space-between">
              <span style="font-size:7px;color:var(--aw-subtext)">高级设置</span>
              <span style="font-size:7px;color:var(--aw-subtext)">展开 ▼</span>
            </div>
            <div class="ph-btn-row">
              <div class="ph-btn-p">创建房间</div>
              <div class="ph-btn-g">加入房间</div>
            </div>
          </div>
          <!-- Room list -->
          <div class="ph-panel" style="padding:6px 7px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:7.5px;font-weight:700;color:var(--aw-subtext);letter-spacing:1px">当前房间</span>
              <span style="font-size:11px;color:var(--aw-subtext)">↻</span>
            </div>
            <div class="ph-room-item" style="background:var(--aw-input-bg);border:1px solid var(--aw-input-border);border-radius:calc(5px * var(--aw-r));padding:5px 6px;display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
              <div><div style="font-size:9px;font-weight:700;color:var(--aw-accent)">8821 号房</div><div style="font-size:6px;color:var(--aw-subtext);margin-top:1px">7人 · 进行中 · 5/7</div></div>
              <div class="ph-room-join" style="font-size:7px;background:var(--aw-accent);color:var(--aw-accent-text);padding:2px 7px;border-radius:calc(5px * var(--aw-r));font-weight:700">加入</div>
            </div>
            <div class="ph-room-item" style="background:var(--aw-input-bg);border:1px solid var(--aw-input-border);border-radius:calc(5px * var(--aw-r));padding:5px 6px;display:flex;align-items:center;justify-content:space-between">
              <div><div style="font-size:9px;font-weight:700;color:var(--aw-accent)">4413 号房</div><div style="font-size:6px;color:var(--aw-subtext);margin-top:1px">10人 · 等待中 · 3/10</div></div>
              <div class="ph-room-join" style="font-size:7px;background:var(--aw-accent);color:var(--aw-accent-text);padding:2px 7px;border-radius:calc(5px * var(--aw-r));font-weight:700">加入</div>
            </div>
          </div>
        </div>
      </div>`;
    }

  // ── IN-GAME SCREEN ───────────────────────────────────────────
  } else if (currentPreviewTab === 'game') {
    // Players with faction + role (identity mode) + status badge
    const players = [
      {nm:'光影',  faction:'merlin', role:'梅林',     roleId:'merlin',        badge:'speak',   isMe:true},
      {nm:'龙影',  faction:'good',   role:'派西维尔', roleId:'percival',      badge:'voted',   isMe:false},
      {nm:'鹰眼',  faction:'good',   role:'兰斯洛特', roleId:'lancelot_good', badge:'mission', isMe:false},
      {nm:'月影',  faction:'evil',   role:'莫甘娜',   roleId:'morgana',       badge:'voting',  isMe:false},
      {nm:'蝶舞',  faction:'good',   role:'忠臣',     roleId:'arthur_loyal',  badge:'',        isMe:false},
      {nm:'雷鸣',  faction:'evil',   role:'刺客',     roleId:'assassin',      badge:'',        isMe:false},
      {nm:'海浪',  faction:'evil',   role:'爪牙',     roleId:'minion',        badge:'',        isMe:false},
      {nm:'烈焰',  faction:'good',   role:'忠臣',     roleId:'arthur_loyal',  badge:'',        isMe:false},
      {nm:'暗影',  faction:'evil',   role:'莫德雷德', roleId:'mordred',       badge:'',        isMe:false},
      {nm:'星辰',  faction:'merlin', role:'奥伯伦',   roleId:'oberon',        badge:'',        isMe:false},
    ];
    const n = players.length;

    function seatBadge(badge) {
      if (!badge) return '';
      const bars = badge === 'speak'
        ? `<div style="display:flex;gap:1px;align-items:flex-end;height:9px"><div style="width:3px;background:#fbbf24;height:3px;border-radius:calc(1px * var(--aw-r))"></div><div style="width:3px;background:#fbbf24;height:7px;border-radius:calc(1px * var(--aw-r))"></div><div style="width:3px;background:#fbbf24;height:4px;border-radius:calc(1px * var(--aw-r))"></div></div>`
        : badge === 'voted'
        ? `<div style="width:9px;height:7px;border:1px solid rgba(52,211,153,.7);border-radius:calc(1px * var(--aw-r))"></div>`
        : badge === 'voting'
        ? `<div style="width:8px;height:9px;border:1px solid rgba(251,191,36,.7);border-radius:calc(1px * var(--aw-r));overflow:hidden"><div style="width:5px;height:4px;background:#fbbf24;margin:0 auto;border-radius:calc(1px * var(--aw-r));transform:rotate(-4deg)"></div></div>`
        : badge === 'mission'
        ? `<div style="width:9px;height:9px;border-radius:calc(50% * var(--aw-r,1));border:1px solid rgba(251,191,36,.7);display:flex;align-items:center;justify-content:center"><div style="width:3px;height:3px;border-radius:calc(50% * var(--aw-r,1));background:#fbbf24"></div></div>`
        : '';
      return `<div class="ph-seat-badge ${badge}">${bars}</div>`;
    }

    // Show role pills when in reveal sub-tab
    const showRoles = currentGameView === 'reveal';

    const isDungeon   = currentSkin === 'dark-dungeon';
    const isCelestial = currentSkin === 'celestial';

    // Scale seat size and orbit for player count
    // 10 players on a pure circle clusters top/bottom; ellipse spreads them horizontally
    const isLarge = n >= 8;
    const rx = isLarge ? 43 : 39; // horizontal orbit radius %
    const ry = isLarge ? 36 : 39; // vertical orbit radius %
    const avSz  = isLarge ? (isCelestial ? 40 : 22) : (isCelestial ? 56 : 30);
    const seatW = isLarge ? (isCelestial ? 44 : 32) : (isCelestial ? 60 : 44);
    const nameFz = isLarge ? 5.5 : 7; // name font-size px
    const cardW  = isLarge ? 25 : 34; // dungeon portrait card width px
    const cardFz = isLarge ? 5 : 6.5; // dungeon font-size px

    // Identity mode: simulate Merlin's vision on the round table
    // players[] is 0-indexed; Merlin(0) sees evil except Mordred(8): Morgana(3),Assassin(5),Minion(6),Oberon(9)
    const isIdentityMode = currentGameView === 'identity';
    const _merlinVisEvil = new Set([3, 5, 6, 9]);

    const seatsHtml = players.map((p, idx) => {
      const angle = (2 * Math.PI * idx) / n - Math.PI / 2;
      const left = (50 + rx * Math.cos(angle)).toFixed(1);
      const top  = (50 + ry * Math.sin(angle)).toFixed(1);
      const isLeader = idx === 1;
      const inTeam = idx === 0 || idx === 2;
      const teamBorder = !isIdentityMode && (currentCenterState === 'mission-progress' || currentCenterState === 'success' || currentCenterState === 'fail') && inTeam
        ? 'border-color:rgba(100,220,140,0.92)!important;box-shadow:0 0 10px rgba(80,200,120,0.5)!important;background:rgba(10,45,20,0.88)!important;'
        : '';
      const rImg = roleImgUrl(p.roleId);
      const isVisEvil = isIdentityMode && _merlinVisEvil.has(idx);
      const isHidden  = isIdentityMode && !p.isMe && !_merlinVisEvil.has(idx);

      if (isDungeon) {
        const borderCol = isIdentityMode
          ? (p.isMe       ? 'rgba(201,156,70,0.95)'
            : isVisEvil   ? 'rgba(220,50,40,0.88)'
            :               'rgba(45,45,45,0.5)')
          : (p.isMe       ? 'rgba(201,156,70,0.95)'
            : inTeam && teamBorder ? 'rgba(80,200,120,0.8)'
            : p.faction === 'evil'   ? 'rgba(200,70,60,0.55)'
            : p.faction === 'merlin' ? 'rgba(170,130,220,0.6)'
            :                          'rgba(55,100,190,0.5)');
        const glow = isIdentityMode
          ? (p.isMe     ? 'box-shadow:0 0 5px rgba(201,156,70,0.45);'
            : isVisEvil ? 'box-shadow:0 0 7px rgba(220,50,40,0.55);'
            :             '')
          : (p.isMe ? 'box-shadow:0 0 5px rgba(201,156,70,0.45);'
            : inTeam && teamBorder ? 'box-shadow:0 0 5px rgba(80,200,120,0.4);' : '');
        const badgeTxt = isIdentityMode ? '' : (p.badge === 'speak' ? '►' : p.badge === 'voted' ? '✓' : p.badge === 'voting' ? '…' : p.badge === 'mission' ? '⚑' : '');
        const badgeClr = p.badge === 'voted' ? 'rgba(52,211,153,0.95)' : 'rgba(251,191,36,0.95)';
        const roleClr = p.faction === 'evil' ? 'rgba(220,100,90,0.9)' : p.faction === 'merlin' ? 'rgba(195,160,255,0.9)' : 'rgba(100,160,255,0.9)';
        const cardBg = isIdentityMode
          ? (p.isMe     ? (rImg ? 'background:rgba(8,4,2,0.4);' : 'background:rgba(8,4,2,0.92);')
            : isVisEvil ? 'background:rgba(45,4,2,0.88);'
            :             'background:rgba(8,8,8,0.78);')
          : (rImg ? 'background:rgba(8,4,2,0.4);' : 'background:rgba(8,4,2,0.92);');
        const dungeonImgHtml = isIdentityMode && !p.isMe
          ? (isVisEvil
            ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span style="font-size:${Math.round(cardW*0.44)}px;font-weight:700;color:rgba(220,70,60,0.88);font-family:'DotGothic16',monospace;text-shadow:0 0 8px rgba(200,40,30,0.6)">邪</span></div>`
            : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span style="font-size:${Math.round(cardW*0.38)}px;color:rgba(70,70,70,0.55);font-family:'DotGothic16',monospace">?</span></div>`)
          : (rImg ? `<img src="${rImg}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;image-rendering:pixelated" onerror="this.style.display='none'">` : '');
        const seatOpacity = isHidden ? 'opacity:0.38;' : '';
        const _bsz = Math.max(3, Math.round(cardW * 0.15)); // L-bracket arm length scales with card
        const _bclr = 'rgba(210,158,48,0.85)';
        const _corners = `
          <div style="position:absolute;top:1px;left:1px;width:${_bsz}px;height:${_bsz}px;border-top:1.5px solid ${_bclr};border-left:1.5px solid ${_bclr};z-index:6;pointer-events:none"></div>
          <div style="position:absolute;top:1px;right:1px;width:${_bsz}px;height:${_bsz}px;border-top:1.5px solid ${_bclr};border-right:1.5px solid ${_bclr};z-index:6;pointer-events:none"></div>
          <div style="position:absolute;bottom:1px;left:1px;width:${_bsz}px;height:${_bsz}px;border-bottom:1.5px solid ${_bclr};border-left:1.5px solid ${_bclr};z-index:6;pointer-events:none"></div>
          <div style="position:absolute;bottom:1px;right:1px;width:${_bsz}px;height:${_bsz}px;border-bottom:1.5px solid ${_bclr};border-right:1.5px solid ${_bclr};z-index:6;pointer-events:none"></div>`;
        const _leaderBadgeUrl = generatedAssets['dark-dungeon:leader-badge'] || '';
        return `<div class="ph-seat" style="left:${left}%;top:${top}%;width:${cardW}px;${seatOpacity}">
          ${isLeader && !isIdentityMode ? (isDungeon
            ? (_leaderBadgeUrl
              ? `<div class="ph-crown" style="left:50%;transform:translateX(-50%);width:${cardW}px;height:13px;padding:0"><img src="${_leaderBadgeUrl}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.innerHTML='长'"></div>`
              : `<div class="ph-crown" style="left:50%;transform:translateX(-50%)">长</div>`)
            : `<div class="ph-crown" style="left:50%;transform:translateX(-50%)">👑</div>`) : ''}
          <div style="width:${cardW}px;aspect-ratio:3/5;${cardBg}border:1.5px solid ${borderCol};${glow}position:relative;overflow:hidden">
            ${dungeonImgHtml}
            ${_corners}
            <span style="position:absolute;left:0;bottom:0;background:rgba(6,3,0,0.85);border-top:1px solid rgba(185,138,52,0.5);border-right:1px solid rgba(185,138,52,0.5);color:#c8982a;font-size:${cardFz}px;font-family:'DotGothic16',monospace;padding:0 2px;line-height:1.6;z-index:2">${idx+1}</span>
            ${badgeTxt ? `<span style="position:absolute;right:0;top:0;background:${badgeClr};color:#000;font-size:${cardFz}px;font-family:'DotGothic16',monospace;padding:0 2px;line-height:1.6;z-index:2">${badgeTxt}</span>` : ''}
          </div>
          <div style="font-size:${cardFz}px;font-family:'DotGothic16',monospace;color:${p.isMe?'#c8982a':'var(--aw-text)'};text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nm}</div>
          ${showRoles && !isLarge && !isIdentityMode ? `<div style="font-size:${cardFz-0.5}px;font-family:'DotGothic16',monospace;color:${roleClr};text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.role}</div>` : ''}
        </div>`;
      }
      // Normal skin
      const avInner = isIdentityMode && !p.isMe
        ? (isVisEvil
          ? `<span style="font-size:${Math.round(avSz*0.4)}px;font-weight:700;color:rgba(220,80,70,0.9)">邪</span>`
          : `<span style="font-size:${Math.round(avSz*0.35)}px;color:rgba(90,90,90,0.5)">?</span>`)
        : (rImg ? `<img src="${rImg}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%" onerror="this.remove()">` : '');
      const avExtra = isIdentityMode
        ? (p.isMe     ? 'border:2px solid rgba(201,156,70,0.85)!important;'
          : isVisEvil ? 'border:2px solid rgba(220,55,45,0.85)!important;background:rgba(50,5,5,0.6)!important;'
          : '')
        : teamBorder;

      // ── 仙境皮肤：大单圆头像 ─────────────────────────────────
      if (isCelestial) {
        const fClr = isIdentityMode && isVisEvil ? 'rgba(210,55,50,0.92)'
          : isIdentityMode && p.isMe ? 'rgba(192,148,53,0.95)'
          : p.faction === 'evil'   ? 'rgba(210,55,50,0.85)'
          : p.faction === 'merlin' ? 'rgba(148,80,210,0.85)'
          :                          'rgba(50,138,215,0.85)';
        const fBg = isIdentityMode && isVisEvil ? 'rgba(255,215,210,0.75)'
          : p.faction === 'evil'   ? 'rgba(255,218,215,0.72)'
          : p.faction === 'merlin' ? 'rgba(235,218,255,0.75)'
          :                          'rgba(210,232,255,0.72)';
        const glowStyle = p.isMe
          ? ';box-shadow:0 0 10px rgba(192,148,53,0.60),0 0 3px rgba(255,245,180,0.50)'
          : isVisEvil
          ? ';box-shadow:0 0 10px rgba(210,50,45,0.50)'
          : `;box-shadow:0 2px 8px rgba(0,0,0,0.18)`;
        const innerContent = isIdentityMode && !p.isMe
          ? (isVisEvil
            ? `<span style="font-size:${Math.round(avSz*0.40)}px;font-weight:700;color:rgba(210,60,55,0.90)">邪</span>`
            : `<span style="font-size:${Math.round(avSz*0.32)}px;color:rgba(90,90,90,0.40)">?</span>`)
          : (rImg ? `<img src="${rImg}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.remove()">` : '');
        return `<div class="ph-seat ${isIdentityMode?'':p.faction}${p.isMe?' me':''}" style="left:${left}%;top:${top}%;width:${avSz+4}px;${isHidden?'opacity:0.38;':''}">
          ${isLeader && !isIdentityMode ? `<div class="ph-crown" style="left:50%;transform:translateX(-50%);font-size:9px;color:rgba(200,155,40,0.95);text-shadow:0 1px 4px rgba(160,110,10,0.40)">✦</div>` : ''}
          <div class="ph-seat-av-wrap" style="width:${avSz}px;height:${avSz}px;position:relative">
            ${isIdentityMode ? '' : seatBadge(p.badge)}
            <!-- single faction circle with role image -->
            <div style="position:absolute;inset:0;border-radius:50%;overflow:hidden;border:2px solid ${fClr};background:${fBg};display:flex;align-items:center;justify-content:center${glowStyle}">
              ${innerContent}
            </div>
            <span class="ph-seat-no" style="z-index:4">${idx+1}</span>
          </div>
          <div class="ph-seat-name" style="font-size:${nameFz}px;max-width:${avSz+4}px;margin-top:3px;font-weight:${p.isMe?'700':'500'};color:${p.isMe?'rgba(140,95,20,0.95)':'rgba(55,38,15,0.82)'};text-shadow:0 1px 3px rgba(255,248,220,0.90)">${p.nm}</div>
          ${showRoles && !isLarge && !isIdentityMode ? `<div class="ph-seat-below"><div class="ph-seat-role-pill ${p.faction}">${p.role}</div></div>` : ''}
        </div>`;
      }

      return `<div class="ph-seat ${isIdentityMode?'':p.faction}${p.isMe?' me':''}" style="left:${left}%;top:${top}%;width:${seatW}px;${isHidden?'opacity:0.38;':''}">
        ${isLeader && !isIdentityMode ? `<div class="ph-crown" style="left:50%;transform:translateX(-50%)">👑</div>` : ''}
        <div class="ph-seat-av-wrap" style="width:${avSz}px;height:${avSz}px">
          ${isIdentityMode ? '' : seatBadge(p.badge)}
          <div class="ph-seat-av" style="width:${avSz}px;height:${avSz}px;font-size:${Math.round(avSz*0.5)}px;${avExtra};overflow:hidden;position:relative">${avInner}</div>
          <span class="ph-seat-no">${idx+1}</span>
        </div>
        <div class="ph-seat-name" style="font-size:${nameFz}px;max-width:${seatW}px">${p.nm}</div>
        ${showRoles && !isLarge && !isIdentityMode ? `<div class="ph-seat-below"><div class="ph-seat-role-pill ${p.faction}">${p.role}</div></div>` : ''}
      </div>`;
    }).join('');

    const tUrl = tableImgUrl();
    const tableCircleHtml = tUrl
      ? `<div class="ph-table-circle-bg"><img src="${tUrl}" onerror="this.style.display='none'"></div>`
      : `<div class="ph-table-circle-bg" style="background:var(--aw-bg-2);border:1px solid var(--aw-panel-border)"></div>`;

    const pillsHtml = isCelestial ? [
      {cls:'success', n:1, sz:'2人'},
      {cls:'fail',    n:2, sz:'3人'},
      {cls:'current', n:3, sz:'2'},
      {cls:'future',  n:4, sz:'3人'},

// FULLSCREEN PREVIEW
// ══════════════════════════════════════════════════════════════
const _FS_TABS  = ['home','game','animation','history','detail','profile','ui'];
const _FS_NAMES = ['首页','游戏中','过程动画','历史对战','对战详情','我的主页','其他组件'];
let _fsOpen = false;
let _fsTx = 0, _fsTt = 0;

function forceRefreshPreview() {
  const btns = ['refreshBtn','hdRefreshBtn'].map(id => document.getElementById(id)).filter(Boolean);
  btns.forEach(b => { b.textContent = '↺…'; b.disabled = true; });
  const fontLoads = ['DotGothic16', 'Noto Serif SC'].map(f =>
    document.fonts.load(`16px "${f}"`).catch(() => {})
  );
  Promise.all(fontLoads).then(() => {
    renderPreview();
    const hdBtn = document.getElementById('hdRefreshBtn');
    const rfBtn = document.getElementById('refreshBtn');
    if (hdBtn) { hdBtn.textContent = '↺'; hdBtn.disabled = false; }
    if (rfBtn) { rfBtn.textContent = '↺ 刷新渲染'; rfBtn.disabled = false; }
  });
}

function enterFullscreen() {
  _fsOpen = true;
  document.getElementById('fsOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  _fsUpdate();
  requestAnimationFrame(_fsScale);
  _fsShowClose();
  // Also request native browser fullscreen to hide address bar / tabs
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
function exitFullscreen() {
  _fsOpen = false;
  document.getElementById('fsOverlay').classList.remove('open');
  document.body.style.overflow = '';
  // Exit native fullscreen if active
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document).catch(()=>{});
  }
}
// Sync overlay close if user presses Esc to exit native fullscreen
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && _fsOpen) exitFullscreen();
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement && _fsOpen) exitFullscreen();
});
let _fsCloseTimer = null;
function _fsShowClose() {
  const btn = document.getElementById('fsClose');
  if (!btn) return;
  btn.style.opacity = '1';
  clearTimeout(_fsCloseTimer);
  _fsCloseTimer = setTimeout(() => { btn.style.opacity = '0'; }, 2200);
}
function _fsScale() {
  const scr = document.getElementById('fsPhoneScreen');
  if (!scr) return;
  // Fill viewport width; height follows aspect ratio naturally
  const scale = Math.max(window.innerWidth / 280, window.innerHeight / 560);
  scr.style.transform = `scale(${scale})`;
}
function _fsUpdate() {
  // Copy phone-screen HTML into fullscreen container
  const src = document.querySelector('#phoneFrame .phone-screen');
  const dst = document.getElementById('fsPhoneScreen');
  if (!src || !dst) return;
  dst.innerHTML = src.innerHTML;
  // Copy inline style vars (skin colors etc.)
  dst.setAttribute('style', src.getAttribute('style') || '');
  dst.className = src.className;
  // Restore fixed dimensions (phone-screen interior, not frame outer)
  dst.style.width = '264px';
  dst.style.height = '544px';
  dst.style.flexShrink = '0';
  dst.style.transformOrigin = 'center center';

  _fsScale();
}
function fsGoTab(i) {
  const tab = _FS_TABS[i];
  if (!tab) return;
  currentPreviewTab = tab;
  // Sync main tab bar
  document.querySelectorAll('.preview-tab').forEach((el, j) =>
    el.classList.toggle('active', j === i)
  );
  renderPreview(); // renderPreview() calls _fsUpdate() at end since _fsOpen is true
}

// Swipe handling on fullscreen overlay
(function() {
  const ov = document.getElementById('fsOverlay');
  ov.addEventListener('touchstart', e => {
    _fsTx = e.touches[0].clientX;
    _fsTt = Date.now();
  }, {passive:true});
  ov.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _fsTx;
    const dy = Math.abs(e.changedTouches[0].clientY - (e.target._fsTy || 0));
    const dt = Date.now() - _fsTt;
    if (Math.abs(dx) > 45 && dt < 450) {
      // Horizontal swipe → change tab
      const cur = _FS_TABS.indexOf(currentPreviewTab);
      const next = dx < 0
        ? Math.min(cur + 1, _FS_TABS.length - 1)
        : Math.max(cur - 1, 0);
      if (next !== cur) fsGoTab(next);
    } else if (Math.abs(dx) < 10 && dt < 300) {
      // Tap → show close button briefly
      _fsShowClose();
    }
  }, {passive:true});
  // Scale on resize
  window.addEventListener('resize', () => { if (_fsOpen) _fsScale(); }, {passive:true});
})();

let nwGenToken = 0; // 每次新生成递增，用于取消僵尸异步任务

// ── 颜色工具 ─────────────────────────────────────────────────
function _hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function nwRgba(hex, a) {
  const [r,g,b] = _hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function nwShift(hex, amt) {
  return '#' + _hexToRgb(hex).map(v => Math.max(0,Math.min(255,v+amt)).toString(16).padStart(2,'0')).join('');
}
function nwLuminance(hex) {
  return _hexToRgb(hex).reduce((s,v,i)=>s+v*[0.2126,0.7152,0.0722][i],0) / 255;
}

function openNewSkin() {
  nwState = {
    step: 1,
    skinId: '',
    skinName: '',
    styleDesc: '',
    accentColor: '#d9b36b',
    bgColor: '#0f1115',      // 背景主色（用户可自定义）
    borderStyle: 'round',    // 'round' | 'sharp'
    isDark: true,
    refImages: [],
    previews: {},
    allAssets: {},
  };
  document.getElementById('nwOverlay').classList.add('open');
  nwRender();
}

function closeNewSkin() {
  document.getElementById('nwOverlay').classList.remove('open');
  nwState = null;
}

function nwRender() {
  const { step } = nwState;
  // Step dots
  document.getElementById('nwDots').innerHTML = Array.from({length:NW_STEPS}, (_,i) =>
    `<div class="nw-dot${i+1===step?' active':i+1<step?' done':''}"></div>`).join('');
  document.getElementById('nwTitle').textContent = NW_STEP_TITLES[step-1];
  // Body + footer
  const bodyFns = [nwStep1Body, nwStep2Body, nwStep3Body, nwStep4Body];
  const ftFns   = [nwStep1Ft,   nwStep2Ft,   nwStep3Ft,   nwStep4Ft];
  document.getElementById('nwBody').innerHTML = bodyFns[step-1]();
  document.getElementById('nwFt').innerHTML   = ftFns[step-1]();
  if (step === 2) nwGeneratePreviews();
  if (step === 4) nwGenerateAll();
}

function nwAutoId() {

  const id = nwState.skinName.toLowerCase()
    .replace(/[\u4e00-\u9fa5]/g, c => '')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,20)
    || ('skin-' + Date.now().toString(36).slice(-4));
  nwState.skinId = id;
  const el = document.getElementById('nwId');
  if (el) el.value = id;
}
function nwHandleRefUpload(e) {
  const files = [...e.target.files];
  e.target.value = '';
  let pending = files.length;
  if (!pending) return;
  files.forEach(f => {
    const fr = new FileReader();
    fr.onload = ev => {
      nwState.refImages.push(ev.target.result);
      if (--pending === 0) {
        // 所有文件读完后一次性重渲染参考图条带
        const strip = document.getElementById('nwRefStrip');
        if (strip) strip.innerHTML =
          nwState.refImages.map((url,i) => `<img class="nw-ref-thumb" src="${url}" title="点击删除" onclick="nwRemoveRef(${i})">`).join('')
          + `<div class="nw-ref-add" onclick="document.getElementById('nwRefInput').click()">+</div>`;
      }
    };
    fr.readAsDataURL(f);
  });
}
function nwRemoveRef(i) {
  nwState.refImages.splice(i, 1);
  nwRender();
}
function nwGoStep2() {
  if (!nwState.skinName.trim()) { alert('请输入皮肤名称'); return; }
  if (!nwState.styleDesc.trim()) { alert('请输入风格描述'); return; }

  if (SKINS[nwState.skinId]) {
    const newId = nwState.skinId + '-' + Date.now().toString(36).slice(-3);
    if (!confirm(`皮肤 ID「${nwState.skinId}」已存在，将自动改为「${newId}」，继续？`)) return;

    if (el) el.value = newId;
  }
  // 清空上次生成数据，取消僵尸任务
  nwGenToken++;
  nwState.previews = {};
  nwState.allAssets = {};

  nwRender();
}

function nwStep2Body() {
  return `<p class="nw-hint" style="margin:0 0 14px">正在生成 ${NW_PREV_IDS.length} 张预览图，请稍候…</p>
    <div class="nw-prev-grid" id="nwPrevGrid">
      ${NW_PREV_IDS.map(id => `
        <div class="nw-prev-card" id="nwprev-${id}">

          <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>
        </div>`).join('')}
    </div>`;
}
function nwStep2Ft() {
  return `<span class="nw-hint" id="nwPrevStatus">生成中…</span>`;
}
async function nwGeneratePreviews() {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('请先在⚙配置里填入有效的 API Key'); nwState.step=1; nwRender(); return; }
  const myToken = ++nwGenToken; // 用于检测是否被取消
  const prompts = buildNWPrompts(nwState);
  const doubao = isDoubaoKey(key);
  let ok = 0;
  for (const id of NW_PREV_IDS) {
    if (nwGenToken !== myToken) return; // 已被取消（用户返回修改）
    const card = document.getElementById(`nwprev-${id}`);
    if (!card) continue; // fix: 原来是 break，导致后续图片全部跳过
    card.querySelector('.nw-spin-box').textContent = '🔄';
    try {
      const { b64, mimeType } = doubao
        ? await callDoubao(key, prompts[id], NW_SIZES[id])
        : await callOpenAI(key, prompts[id], NW_SIZES[id]);
      const ext = mimeType ? mimeType.split('/')[1] : 'jpeg';
      const dataUrl = doubao ? await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`) : `data:image/${ext};base64,${b64}`;
      nwState.previews[id] = dataUrl;
      if (nwGenToken !== myToken) return; // 生成完但已取消
      card.innerHTML = `<img src="${dataUrl}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block">
        <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
      ok++;
    } catch(e) {
      if (nwGenToken !== myToken) return;
      card.innerHTML = `<div style="padding:12px;font-size:10px;color:#f87171;text-align:center">❌ ${e.message.slice(0,60)}</div>
        <div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
    }
  }
  if (nwGenToken !== myToken) return;
  const st = document.getElementById('nwPrevStatus');
  if (st) st.textContent = `完成 ${ok}/${NW_PREV_IDS.length}`;
  if (ok > 0) { setTimeout(() => { if (nwState && nwGenToken === myToken) { nwState.step=3; nwRender(); } }, 600); }
}

// ── Step 3: 预览确认 ─────────────────────────────────────────

      <b style="color:#aeb6c7">ID：</b>${nwState.skinId} &nbsp;·&nbsp;
      <b style="color:#aeb6c7">基调：</b>${nwState.isDark?'深色':'浅色'} &nbsp;·&nbsp;
      <b style="color:#aeb6c7">强调色：</b><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${nwState.accentColor};vertical-align:middle;margin-right:3px"></span>${nwState.accentColor}

async function nwRegenOne(id) {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('需要 API Key'); return; }
  const prompts = buildNWPrompts(nwState);
  const doubao = isDoubaoKey(key);
  const card = document.getElementById(`nwprev-${id}`); // fix: 用 ID 直接查找，不靠文字内容匹配
  if (card) card.innerHTML = `<div class="nw-spin-box">🔄</div><div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
  try {
    const { b64, mimeType } = doubao
      ? await callDoubao(key, prompts[id], NW_SIZES[id])
      : await callOpenAI(key, prompts[id], NW_SIZES[id]);
    const ext = mimeType ? mimeType.split('/')[1] : 'jpeg';
    const dataUrl = doubao ? await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`) : `data:image/${ext};base64,${b64}`;
    nwState.previews[id] = dataUrl;
    nwRender();

    if (card) card.innerHTML = `<div style="padding:12px;font-size:10px;color:#f87171;text-align:center">❌ ${e.message.slice(0,60)}</div><button class="nw-prev-regen" style="display:block;position:static;margin:0 auto 6px" onclick="nwRegenOne('${id}')">重试</button><div class="nw-prev-card-lbl">${NW_NAMES[id]}</div>`;
  }
}

function nwStep4Body() {
  const rows = NW_ALL_IDS.map(id => {

}
function nwStep4Ft() {
  return `<span class="nw-hint" id="nwAllStatus">生成中，请勿关闭页面…</span>`;
}

async function nwGenerateAll() {
  const key = document.getElementById('apiKey').value.trim();
  if (!isValidKey(key)) { alert('需要 API Key'); return; }
  const prompts = buildNWPrompts(nwState);
  const doubao = isDoubaoKey(key);
  let done = 0;

  for (const id of NW_ALL_IDS) {
    // 如果预览阶段已生成，直接复用并持久化
    const existing = nwState.allAssets[id] || nwState.previews[id];
    if (existing) {
      nwState.allAssets[id] = existing;
      // fix: 预览图也必须写入 generatedAssets/IDB，否则皮肤刷新后丢失
      const gKey = `${nwState.skinId}:${id}`;
      generatedAssets[gKey] = existing;
      idbSave(gKey, existing);
      pushVersion(gKey, existing);
      nwSetRow(id, 'ok', '✅', '来自预览');
      done++;
      continue;
    }
    nwSetRow(id, 'run', '🔄', '生成中…');
    try {
      const { b64, mimeType } = doubao
        ? await callDoubao(key, prompts[id], NW_SIZES[id])
        : await callOpenAI(key, prompts[id], NW_SIZES[id]);
      const ext = mimeType ? mimeType.split('/')[1] : 'jpeg';
      const dataUrl = doubao ? await cropDoubaoWatermark(`data:image/${ext};base64,${b64}`) : `data:image/${ext};base64,${b64}`;
      // 上传到服务器
      let storeUrl = dataUrl;
      try {
        const sv = await fetch('/api/save-asset', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ skinId: nwState.skinId, assetId: id, dataUrl }) });
        if (sv.ok) { const sd = await sv.json(); if (sd.assetUrl) storeUrl = sd.assetUrl; }
      } catch(_) {}
      nwState.allAssets[id] = storeUrl;
      const gKey = `${nwState.skinId}:${id}`;
      generatedAssets[gKey] = storeUrl;
      idbSave(gKey, storeUrl);
      pushVersion(gKey, storeUrl);
      done++;
      nwSetRow(id, 'ok', '✅', '完成');
    } catch(e) {
      nwSetRow(id, 'err', '❌', e.message.slice(0,30));
    }
  }

  // Finalize skin
  const entry = buildNWSkinEntry(nwState);
  SKINS[nwState.skinId] = entry;
  try {
    const custom = JSON.parse(localStorage.getItem('customSkins') || '{}');
    custom[nwState.skinId] = entry;
    localStorage.setItem('customSkins', JSON.stringify(custom));
  } catch(_) {}
  setSkinActive(nwState.skinId, true);
  renderSkinTabs();

  const st = document.getElementById('nwAllStatus');
  if (st) st.textContent = `完成 ${done}/${NW_ALL_IDS.length}`;
  document.getElementById('nwFt').innerHTML =
    `<span class="nw-hint" style="color:var(--good)">✅ 皮肤「${nwState.skinName}」已创建！</span>
     <button class="btn btn-primary" onclick="closeNewSkin();selectSkin('${nwState.skinId}')">去查看皮肤</button>`;
}

function nwSetRow(id, cls, icon, txt) {
  const row = document.getElementById(`nwrow-${id}`);
  const st  = document.getElementById(`nwst-${id}`);
  if (row) { row.className = `nw-prog-row ${cls}`; row.querySelector('.nw-prog-icon').textContent = icon; }
  if (st) st.textContent = txt;
}

// ── 提示词构建 ───────────────────────────────────────────────

    'roles-atlas':   `Character portrait grid 4×4, style: ${s}. Each cell: square bust portrait, head+chest only, face centered, NO full body. Row1: [Merlin elderly sage white beard wise eyes ornate robes]; [Percival young earnest knight armor]; [Loyal Knight silver armor calm]; [Lancelot golden armor heroic]. Row2: [Assassin dark hood only sharp eyes]; [Morgana cold beauty dark gown violet eyes]; [Mordred dark armor cunning]; [Oberon worn traveler suspicious]. Row3: [Minion full hood only two glowing eyes visible]; [Evil Lancelot corrupted armor tormented]; [empty]; [empty]. Row4: 4×[empty]. ${tone}. Thin divider lines. No text.`,
    'merlin':        `${CH} Merlin — visibly elderly sage, long flowing white beard, wise kind eyes, elaborate ornate robes with mystical patterns.`,
    'percival':      `${CH} Percival — young earnest brave face, knight armor, bright sincere eyes, heroic bearing.`,
    'arthur_loyal':  `${CH} Loyal Knight — dependable angular face, plain silver armor, calm honest eyes, humble steady.`,
    'lancelot_good': `${CH} Lancelot champion — confident heroic face, gleaming golden armor, warm strong eyes.`,
    'assassin':      `${CH} The Assassin — dark hood drawn over lower face, ONLY sharp cold calculating eyes visible above hood.`,

    'minion':        `${CH} The Minion — hood fully over entire face, ONLY two glowing eyes visible inside dark void.`,
    'lancelot_evil': `${CH} Evil Lancelot — once-golden armor now blackened and cracked, tormented haunted grief-filled expression.`,

// ── 皮肤条目构建 ─────────────────────────────────────────────
function buildNWSkinEntry({ skinName, accentColor, bgColor, borderStyle, isDark }) {
  const acc = accentColor || '#d9b36b';
  const bg  = bgColor || (isDark ? '#0f1115' : '#f0f2f6');
  const r   = borderStyle === 'sharp' ? '0' : '1';
  const lum = nwLuminance(bg); // 0=纯黑 1=纯白
  const dark = lum < 0.35;     // 重新根据实际背景色判断深浅

  // 衍生色
  const bg2      = dark ? nwShift(bg, 10) : nwShift(bg, -10);
  const panelBg  = nwRgba(dark ? nwShift(bg, 8) : bg, dark ? 0.85 : 0.90);
  const navBg    = nwRgba(dark ? nwShift(bg, -4) : nwShift(bg, 4), dark ? 0.92 : 0.94);
  const textCol  = dark ? '#eef1f7' : '#1a1c24';
  const subCol   = dark ? '#aeb6c7' : '#6b7080';
  const mutedCol = dark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.08)';

  // 面板边框 & 按钮从强调色衍生 → 这是让皮肤「有风格」的关键
  const panelBorder    = nwRgba(acc, dark ? 0.45 : 0.30);
  const navBorder      = nwRgba(acc, dark ? 0.20 : 0.14);
  const inputBorder    = nwRgba(acc, dark ? 0.28 : 0.22);
  const btnBorder      = nwRgba(acc, dark ? 0.55 : 0.35);
  const inputBg        = dark ? nwRgba(acc, 0.05) : 'rgba(255,255,255,.75)';
  const accTextAuto    = nwLuminance(acc) > 0.45 ? '#1a1200' : '#ffffff';

  // Chip 渐变用真实背景色
  const chip       = `linear-gradient(135deg,${bg},${dark ? nwShift(bg,18) : nwShift(bg,-12)})`;
  const chipBorder = nwRgba(acc, 0.55);

  // ── 阵营色（从强调色衍生默认值，CC 分析后会覆盖为皮肤专属色） ──────────────
  // 好人：偏蓝，邪恶：偏红，保持语义清晰
  const goodColor    = '#4e9eff';
  const evilColor    = '#e05050';
  const successColor = dark ? '#72e0a0' : '#1a8c52';
  const failColor    = dark ? '#f07070' : '#c03030';
  const medalColor   = acc;  // 默认用强调色作为勋章色

  return {
    name: skinName, chip, chipBorder, isDark: dark, custom: true,
    vars: {
      // ── 基础 ──
      '--aw-bg':               bg,
      '--aw-bg-2':             bg2,
      '--aw-panel':            panelBg,
      '--aw-panel-border':     panelBorder,
      '--aw-text':             textCol,
      '--aw-subtext':          subCol,
      '--aw-accent':           acc,
      '--aw-accent-text':      accTextAuto,
      '--aw-nav-bg':           navBg,
      '--aw-nav-border':       navBorder,
      '--aw-input-bg':         inputBg,
      '--aw-input-border':     inputBorder,
      '--aw-btn-ghost-border': btnBorder,
      '--aw-btn-ghost-text':   textCol,
      '--aw-r':                r,
      // ── 主按钮（投票"是"） ──
      '--aw-btn-primary-bg':   `linear-gradient(180deg,${nwShift(acc,30)},${acc})`,
      '--aw-btn-primary-text': nwLuminance(acc) > 0.45 ? '#1a1200' : '#ffffff',
      // ── 好人阵营 ──
      '--aw-good-glow':        'rgba(78,158,255,0.85)',
      '--aw-good-shadow':      'rgba(78,158,255,0.45)',
      '--aw-good-seat-bg':     'rgba(7,50,120,0.35)',
      '--aw-good-chip-bg':     'rgba(7,50,120,.35)',
      '--aw-good-chip-border': 'rgba(78,158,255,.4)',
      '--aw-good-chip-text':   '#bfdbfe',
      '--aw-faction-good':     'linear-gradient(90deg,#2a6ab0,#4e9eff)',
      // ── 邪恶阵营 ──
      '--aw-evil-glow':        'rgba(220,60,60,0.8)',
      '--aw-evil-shadow':      'rgba(200,40,40,0.38)',
      '--aw-evil-seat-bg':     'rgba(35,6,6,0.92)',
      '--aw-evil-chip-bg':     'rgba(180,50,50,.25)',
      '--aw-evil-chip-border': 'rgba(220,90,90,.4)',
      '--aw-evil-chip-text':   '#fca5a5',
      '--aw-faction-evil':     'linear-gradient(90deg,#c03030,#e05050)',
      // ── 任务结果 ──
      '--aw-success':          successColor,
      '--aw-fail':             failColor,
      // ── 勋章 ──
      '--aw-medal-color':      medalColor,
      '--aw-medal-bg':         nwRgba(medalColor, 0.15),
      '--aw-medal-border':     nwRgba(medalColor, 0.35),
    }
  };
}
</script>
</body>
</html>
